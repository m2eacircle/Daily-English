<script>
  var EP_DATA = {
    title: 'The One with the Monkey',
    description: 'Ross gets a pet monkey named Marcel. Everyone brings a date to a New Year\'s party.',
    expressions: [
    {
      phrase: 'It\'s been kind of quiet since Carol left.',
      partOfSpeech: 'expression',
      meaning: '"Kind of quiet" is a gentle, understated way of describing loneliness or emptiness after someone leaves. "Since [person] left" establishes the cause. Together, the phrase communicates deep sadness without stating it directly — the quietness stands in for heartbreak, and using "kind of" makes it even more heartbreakingly casual.',
      meaning_ko: '"Kind of quiet"는 누군가가 떠난 후의 외로움이나 허전함을 부드럽고 절제된 방식으로 표현하는 말입니다. "Since [사람] left"는 그 원인을 설명합니다. 두 표현이 합쳐져 슬픔을 직접 말하지 않으면서도 깊은 슬픔을 전달합니다 — 조용함이 상실감을 대신하고, "kind of"를 쓰면 더욱 가슴 아프게 담담해집니다.',
      example: 'A: "How have you been since you moved to the new place?" B: "Honestly, it\'s been kind of quiet. I miss having people around."',
      example_ko: 'A: "새 집으로 이사한 후 어때?" B: "솔직히, 좀 조용해졌어. 주변에 사람들이 있던 게 그리워."',
      context: 'When the friends ask why Ross got a monkey, he explains with this quietly devastating line. He doesn\'t say he\'s lonely or heartbroken. He just says it\'s "been kind of quiet" — and somehow that makes it sadder. Getting a monkey is the most Ross possible response to a divorce.',
      context_ko: '친구들이 왜 원숭이를 데려왔냐고 묻자, 로스가 이 조용하고 처절한 대사로 설명하는 장면. 그는 외롭다거나 상심했다고 말하지 않습니다. 그냥 "좀 조용해졌어"라고 할 뿐 — 그게 더 슬프게 느껴집니다. 원숭이를 데려오는 건 이혼에 대한 가장 로스다운 반응입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X1'
    },
    {
      phrase: 'You reach a certain age, having a roommate is just kind of pathe...',
      partOfSpeech: 'expression',
      meaning: 'Ross is about to say "pathetic" but stops mid-word when he remembers Chandler and Joey — both adults with roommates — are sitting right there. "You reach a certain age" is a common phrase meaning "when you get to a particular stage in life." The genius of this joke is the dramatic backpedal: he invents the fake Sanskrit word "pathet" to cover his near-insult.',
      meaning_ko: '로스가 "pathetic(한심한)"을 말하려다가 룸메이트가 있는 찬들러와 조이가 바로 옆에 앉아 있다는 것을 깨닫고 중간에 멈추는 장면입니다. "You reach a certain age"는 "인생의 특정 단계에 이르면"을 의미하는 흔한 표현입니다. 이 농담의 천재성은 극적인 발뺌에 있습니다: 하마터면 모욕이 될 뻔한 말을 덮으려고 가짜 산스크리트어 단어 "pathet"를 지어냅니다.',
      example: 'A: "Are you really gonna say what I think you\'re gonna say?" B: "No, no. I was just going to say it\'s... completely normal. Great, actually."',
      example_ko: 'A: "내가 생각하는 그 말을 진짜 할 거야?" B: "아니, 아니. 그냥... 완전히 정상이라고 하려고 했어. 사실 좋은 거야."',
      context: 'Ross starts delivering what is clearly a judgemental opinion about adults with roommates — then catches himself when he realises he\'s insulting Chandler and Joey to their faces. His recovery ("pathet, Sanskrit for \'really cool way to live\'") is one of the episode\'s best jokes.',
      context_ko: '로스가 룸메이트가 있는 어른들에 대해 분명히 비판적인 의견을 말하기 시작하다가 찬들러와 조이의 면전에 모욕을 하고 있다는 것을 깨닫는 장면. 그의 수습 ("pathet, \'정말 멋진 생활 방식\'을 뜻하는 산스크리트어")이 에피소드 최고의 농담 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X2'
    },
    {
      phrase: 'Might want to open with the snowman.',
      partOfSpeech: 'expression',
      meaning: '"Open with" something means to start a performance, speech, or presentation with that particular item — to use it as your first piece. Chandler\'s advice to Phoebe is tactful: she has 12 dark songs about her mother\'s suicide and one cheerful snowman song. He gently suggests leading with the least depressing option.',
      meaning_ko: '무언가로 "open"한다는 것은 공연, 연설, 또는 발표를 그 특정 항목으로 시작한다는 뜻입니다. 피비에 대한 찬들러의 조언은 배려심이 있습니다: 그녀에게 어머니의 자살에 관한 어두운 노래 12곡과 눈사람에 관한 유쾌한 노래 1곡이 있습니다. 그는 가장 덜 우울한 것으로 시작하라고 부드럽게 제안합니다.',
      example: 'A: "I have a presentation on budget cuts and then one on the company picnic." B: "Might want to open with the picnic."',
      example_ko: 'A: "예산 삭감에 대한 발표 하나하고 회사 야유회에 대한 발표 하나 있어." B: "야유회로 시작하는 게 나을 것 같은데."',
      context: 'Phoebe announces she is debuting all-new material that evening: 12 songs about her mother\'s suicide and one about a snowman. Chandler\'s dry, deadpan suggestion to open with the snowman is perfectly timed and says everything without saying anything.',
      context_ko: '피비가 그날 저녁 완전히 새로운 곡들을 선보이겠다고 발표하는 장면: 어머니의 자살에 관한 노래 12곡과 눈사람에 관한 노래 1곡. 찬들러의 건조하고 무표정한 눈사람으로 시작하라는 제안이 타이밍이 완벽하고 아무 말도 하지 않으면서 모든 것을 말합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X3'
    },
    {
      phrase: 'It\'s just such a slap in the face.',
      partOfSpeech: 'expression',
      meaning: 'A "slap in the face" is an idiom meaning a deeply insulting or humiliating experience — something that feels like a direct personal affront or disrespect. It doesn\'t involve actual physical contact; it describes the emotional sting of being undervalued or dismissed.',
      meaning_ko: '"Slap in the face"는 깊이 모욕적이거나 굴욕적인 경험을 의미하는 관용어입니다 — 직접적인 개인적 모욕이나 무시처럼 느껴지는 것입니다. 실제 신체 접촉을 포함하지 않고, 가치를 인정받지 못하거나 무시당하는 감정적 충격을 묘사합니다.',
      example: 'A: "They gave the promotion to someone who just started." B: "After five years? That\'s just such a slap in the face."',
      example_ko: 'A: "방금 입사한 사람에게 승진을 줬어." B: "5년 일하고 나서? 완전 뺨 맞은 기분이겠다."',
      context: 'Joey applied for the department store Santa job he had last year, but was passed over — because a new guy is "sleeping with the store manager." Now Joey has to play one of Santa\'s helpers. Being demoted from Santa to elf is the humiliation that drives this line.',
      context_ko: '조이가 작년에 맡았던 백화점 산타 자리에 지원했지만 탈락하는 장면 — 새로운 사람이 "매장 매니저와 자고 있기 때문에"입니다. 이제 조이는 산타의 조수 중 하나가 됩니다. 산타에서 엘프로 강등되는 것이 이 대사의 배경이 되는 굴욕입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X4'
    },
    {
      phrase: 'No dates. We make a pact.',
      partOfSpeech: 'expression',
      meaning: 'A "pact" is a formal agreement between people — a commitment that everyone promises to honour. "We make a pact" elevates a simple group decision into something more binding and ceremonial. Here, Chandler uses it to propose a group agreement to spend New Year\'s together without dates, to avoid the pressure of the holiday.',
      meaning_ko: '"Pact"는 사람들 사이의 공식적인 합의, 즉 모든 사람이 지키겠다고 약속하는 다짐입니다. "We make a pact"는 단순한 그룹 결정을 더 구속력 있고 의식적인 것으로 격상시킵니다. 여기서 찬들러는 명절의 압박을 피하기 위해 데이트 없이 함께 새해를 보내자는 그룹 합의를 제안하기 위해 이것을 씁니다.',
      example: 'A: "Every year we say we\'re gonna exercise more." B: "This year we make a pact. No excuses."',
      example_ko: 'A: "매년 운동을 더 하겠다고 말하잖아." B: "올해는 약속 해. 변명 없이."',
      context: 'Chandler is fed up with the pressure of New Year\'s — the "desperate scramble to find anything with lips" — and proposes the group spend it together with no dates. The pact immediately and spectacularly falls apart as one by one every member admits they have already invited someone.',
      context_ko: '찬들러가 새해의 압박 — "뭔가 입술이 있는 것이면 뭐든 찾으려는 필사적인 몸부림" — 에 진절머리가 나서 친구들과 데이트 없이 함께 보내자고 제안하는 장면. 약속은 즉시 그리고 장렬하게 무너집니다. 한 명 한 명 이미 누군가를 초대했다고 인정하면서요.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X5'
    },
    {
      phrase: 'We had our first fight this morning.',
      partOfSpeech: 'expression',
      meaning: '"First fight" in a relationship marks the moment when initial harmony breaks down — the first real conflict between two people (or in this case, a person and a monkey). "We had our first fight" treats it as a significant milestone, which is funny here because Ross is talking about a pet.',
      meaning_ko: '관계에서 "first fight"는 초기의 화합이 무너지는 순간을 나타냅니다 — 두 사람(또는 이 경우, 사람과 원숭이) 사이의 첫 번째 진짜 갈등. "We had our first fight"는 이것을 중요한 이정표로 취급하는데, 로스가 애완동물에 대해 이야기하고 있기 때문에 웃깁니다.',
      example: 'A: "How are things with your new roommate?" B: "We had our first fight this morning. About dishes, of all things."',
      example_ko: 'A: "새 룸메이트랑 어때?" B: "오늘 아침에 처음 싸웠어. 하필 설거지 때문에."',
      context: 'Ross confides in Monica about his troubled relationship with Marcel. "I think it has to do with my working late. I said some things I didn\'t mean. He threw some feces." The deadpan delivery of "he threw some feces" as a natural consequence of a fight is perfectly timed.',
      context_ko: '로스가 마르셀과의 힘든 관계에 대해 모니카에게 털어놓는 장면. "내 야근 때문인 것 같아. 뜻하지 않은 말을 했어. 그가 변을 던졌어." "그가 변을 던졌어"를 싸움의 자연스러운 결과로 무표정하게 전달하는 것이 타이밍이 완벽합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X6'
    },
    {
      phrase: 'I couldn\'t handle the pressure and I snapped.',
      partOfSpeech: 'expression',
      meaning: '"Snap" in this context means to suddenly break under stress — to lose your composure and do something impulsive or extreme that you wouldn\'t normally do. "I snapped" is an admission that you acted out of character because the pressure became too much. It implies momentary loss of rational control.',
      meaning_ko: '이 맥락에서 "snap"은 스트레스 아래 갑자기 무너지는 것을 뜻합니다 — 평정심을 잃고 평소에는 하지 않을 충동적이거나 극단적인 행동을 하는 것입니다. "I snapped"은 압박이 너무 커져서 평소답지 않게 행동했다는 인정입니다. 순간적인 이성적 통제력 상실을 암시합니다.',
      example: 'A: "Why did you quit on the spot?" B: "I don\'t know. I couldn\'t handle the pressure and I snapped."',
      example_ko: 'A: "왜 즉석에서 그만뒀어?" B: "모르겠어. 압박을 못 견디고 그냥 폭발했어."',
      context: 'Chandler is being called out by the others for breaking the no-date pact by inviting Janice. He doesn\'t try to justify it — just admits it: "I couldn\'t handle the pressure and I snapped." The self-awareness makes it funnier than if he had made excuses.',
      context_ko: '찬들러가 재니스를 초대해서 데이트 없이 지내기로 한 약속을 어긴 것에 대해 다른 친구들에게 지적받는 장면. 그는 정당화하려 하지 않고 — 그냥 인정합니다: "압박을 못 견디고 폭발했어." 변명을 했을 때보다 자기 인식이 더 웃기게 만듭니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X7'
    },
    {
      phrase: 'He keeps shutting me out.',
      partOfSpeech: 'expression',
      meaning: 'To "shut someone out" means to deliberately exclude them emotionally — to keep your distance, be cold, or refuse to connect. "Keeps" emphasizes it\'s a repeated pattern, not a one-time thing. The phrase is usually used about human relationships, which is what makes it funny here since Ross is talking about a monkey.',
      meaning_ko: '누군가를 "shut out"한다는 것은 의도적으로 감정적으로 배제하다는 뜻입니다 — 거리를 두거나, 냉담하거나, 연결을 거부하는 것입니다. "Keeps"는 그것이 일회성이 아닌 반복되는 패턴임을 강조합니다. 이 표현은 보통 인간 관계에서 쓰이는데, 로스가 원숭이에 대해 이야기하고 있기 때문에 웃깁니다.',
      example: 'A: "Have you talked to him lately?" B: "No. He keeps shutting me out. Won\'t return my calls."',
      example_ko: 'A: "요즘 그 사람이랑 얘기했어?" B: "아니. 계속 나를 외면해. 전화도 안 받아."',
      context: 'Ross is genuinely concerned — and genuinely hurt — that Marcel has been distant with him but apparently bonded with Monica during a visit. Ross describes it with the full vocabulary of a human emotional relationship: Marcel is "shutting him out," walking around "dragging his hands." It\'s Ross at his most endearingly eccentric.',
      context_ko: '마르셀이 자신에게는 거리를 두면서 모니카 방문 중에는 친밀하게 지냈다는 것을 알고 로스가 진심으로 걱정하고 진심으로 상처받는 장면. 로스는 이것을 인간 감정 관계의 모든 어휘로 묘사합니다: 마르셀이 자신을 "외면하고" 있고, "손을 끌며" 돌아다니고 있다고. 가장 사랑스럽게 기이한 로스의 모습입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X8'
    },
    {
      phrase: 'Is it something you\'d like to share with the group?',
      partOfSpeech: 'expression',
      meaning: 'A classic teacher or authority figure phrase — said when someone is whispering or talking during a presentation and you call them out by publicly inviting them to share whatever they were saying. The implication is sharp: if it was worth saying privately, you should be willing to say it out loud. It\'s simultaneously polite and intimidating.',
      meaning_ko: '발표 중에 누군가가 속삭이거나 이야기할 때, 그들이 말하던 것을 공개적으로 공유하도록 초대함으로써 지적하는 전형적인 교사 또는 권위자의 표현입니다. 함의가 날카롭습니다: 개인적으로 말할 가치가 있었다면, 소리 내어 말할 의지가 있어야 합니다. 동시에 정중하고 위협적입니다.',

    {
      phrase: 'I wanted it to be this phenomenal kiss that happened at this phenomenal moment.',

      meaning_ko: '"Phenomenal"은 특별하고 예외적이며 인상적으로 놀라운 것을 의미합니다. 키스와 순간 모두에 두 번 사용하는 것은 데이비드가 상상 속에서 그 순간을 얼마나 부풀려왔는지를 보여줍니다. 아이러니는 완벽한 순간을 기다릴수록 더 많은 압박을 만들어, 키스를 더 어렵게 만든다는 것입니다.',

      context: 'David\'s confession that he wants the "phenomenal kiss" but admits he\'s "not really a sweeping sort of fella" is perfectly contradictory — he wants the dramatic moment but lacks the personality for it. Phoebe\'s warm reassurance that he is "a sweeper trapped inside a physicist\'s body" is one of the episode\'s sweetest exchanges.',
      context_ko: '데이비드가 "특별한 키스"를 원하지만 자신이 "그런 웅장한 타입이 아니다"라고 인정하는 완벽하게 모순적인 고백 장면. 극적인 순간을 원하지만 그에 맞는 성격이 없습니다. "물리학자의 몸 안에 갇힌 sweeper"라는 피비의 따뜻한 위로가 에피소드에서 가장 달콤한 교환 중 하나입니다.',

      context: 'Ross tries to argue that Marcel should be allowed into Monica\'s New Year\'s party by comparing him to a hypothetical girlfriend. Monica\'s razor-sharp counter — the girlfriend wouldn\'t have urinated on her coffee table — ends the argument immediately and definitively.',

      meaning_ko: '이 씁쓸하고 달콤한 대사는 자정에 키스를 나누는 새해 전통을 활용하고, 이를 헌신에 관한 더 넓은 원칙으로 확장합니다. 피비는 데이비드에게 말합니다: 한 해 전체를 함께할 수 없다면 새해의 시작을 함께하는 것은 공평하지 않다고. 그녀는 작별 인사를 사랑의 행위로 표현하면서 그를 우아하게 보내줍니다.',

      context: 'Phoebe coaches David through their breakup, scripting both sides of the conversation so he can leave for Minsk without guilt. She scripts her own heartbreak with heartbreaking wisdom. This line is Phoebe at her most quietly profound.',

    {
      phrase: 'Looks like that "no-date pact" thing worked out.',
      partOfSpeech: 'expression',
      meaning: '"Worked out" means succeeded or turned out well. The sarcasm here is heavy: the no-date pact has spectacularly failed — everyone has a date. Ross says this with dry resignation as the midnight countdown begins and he surveys the room full of couples. It is the perfect ironic summary of the episode\'s comic chaos.',
      meaning_ko: '"Worked out"는 성공했거나 잘 됐다는 뜻입니다. 여기서 풍자는 강렬합니다: 데이트 없이 보내기로 한 약속은 장렬하게 실패했습니다 — 모두가 데이트 상대가 있습니다. 로스는 자정 카운트다운이 시작되고 커플들로 가득 찬 방을 둘러보며 건조한 체념으로 이 말을 합니다. 에피소드의 코미디적 혼란을 완벽하게 아이러니하게 요약하는 말입니다.',

      context: 'Ross surveys the party at midnight: Chandler is with Janice, Phoebe is with David, Monica invited Fun Bobby, Joey brought a single mom, Rachel has Paolo. Every single person broke the pact. Ross is the only one standing alone — and this dry observation is his only commentary.',
      context_ko: '로스가 자정에 파티를 둘러보는 장면: 찬들러는 재니스와, 피비는 데이비드와, 모니카는 펀 바비를 초대했고, 조이는 싱글맘을 데려왔고, 레이철에게는 파올로가 있습니다. 단 한 명도 빠짐없이 약속을 어겼습니다. 로스만이 혼자 서 있고 — 이 건조한 관찰이 그의 유일한 논평입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E10X14'

    {

      meaning_ko: '짝사랑의 근본적인 불균형에 대한 표현 — 감정을 돌려주지 않는 무언가나 누군가를 깊이 아끼는 고통. 가장 보편적으로 공감되는 감정적 진실 중 하나이며, 로스가 원숭이에 대해 이 말을 하면서 관객은 그가 레이철에 대한 자신의 감정에 대해서도 이야기하고 있다는 것을 알기 때문에 이중적 의미를 가집니다.',
      example: 'A: "I\'ve given everything to this job and it doesn\'t value me at all." B: "It\'s just so hard to accept that something you love doesn\'t love you back."',

  var S_NUM = 1;
  var E_NUM = 10;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
