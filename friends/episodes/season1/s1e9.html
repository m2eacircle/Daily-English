<script>
  var EP_DATA = {
    title: 'The One Where Underdog Gets Away',
    description: 'Everyone misses Thanksgiving dinner when they get locked out of the apartment.',
    expressions: [
    {
      phrase: 'I\'ve sort of started this whole independent thing.',
      partOfSpeech: 'expression',
      meaning: '"Started a thing" means begun a new habit, pursuit, or way of living — usually something personal and ongoing. "Sort of" softens it, suggesting it\'s still new or not fully committed to. "This whole... thing" is a casual way to describe something broad and life-changing without being too precise about it.',
      meaning_ko: '"Started a thing"은 새로운 습관, 목표, 또는 생활 방식을 시작했다는 뜻으로, 보통 개인적이고 지속적인 무언가를 말합니다. "Sort of"는 아직 새롭거나 완전히 확신하지 못한다는 것을 부드럽게 나타냅니다. "This whole... thing"은 너무 정확하지 않게 광범위하고 인생을 바꾸는 무언가를 설명하는 캐주얼한 방식입니다.',
      example: 'A: "Why are you cooking your own meals now?" B: "I\'ve sort of started this whole independent thing. Trying not to rely on my parents."',
      example_ko: 'A: "왜 요즘 직접 밥 해먹어?" B: "어떻게 보면 독립적으로 살아가는 걸 시작하는 중이야. 부모님한테 덜 의존하려고."',
      context: 'Rachel is asking Terry, her boss at Central Perk, for a $100 advance on her salary so she can fly to Vail for Thanksgiving with her family. She explains that she has started her "independent thing" — which is why she can\'t just ask her father to pay for the ticket.',
      context_ko: '레이철이 센트럴 퍼크 상사 테리에게 가족과 함께 베일에서 추수감사절을 보내기 위해 급여 $100을 미리 받을 수 있는지 부탁하는 장면. 자신이 독립적으로 사는 것을 시작했기 때문에 아버지에게 티켓 값을 달라고 할 수 없다고 설명합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X1'
    },
    {
      phrase: 'I am officially Joey Tribbiani, actor/model.',
      partOfSpeech: 'expression',
      meaning: '"Officially" means it is now formally or publicly true — no longer just hoped for or worked toward, but actually real. Adding "actor/model" as a dual title makes it funnier: the two-career label is something people put on business cards or resumes to signal they work in multiple creative fields.',
      meaning_ko: '"Officially"는 이제 공식적으로 또는 공개적으로 사실이 됐다는 뜻으로, 더 이상 바라거나 노력하는 것이 아니라 실제로 현실이 됐다는 의미입니다. "Actor/model"을 이중 직함으로 추가하는 것이 더 웃깁니다: 두 가지 커리어 레이블은 사람들이 명함이나 이력서에 적어 여러 창의적 분야에서 일한다는 것을 알리기 위해 씁니다.',
      example: 'A: "I just got my first paid acting gig." B: "So now you\'re officially an actor?" A: "Actor/model, thank you very much."',
      example_ko: 'A: "첫 유료 연기 일 잡았어." B: "그럼 이제 공식적으로 배우야?" A: "배우/모델이라고, 감사합니다."',
      context: 'Joey arrives at Central Perk wearing foundation makeup — he has just landed a modeling job for City Free Clinic health posters. He proudly announces his new dual title. Chandler\'s immediate response — "I was thinking you look more like Joey Tribbiani, man/woman" — gets the biggest laugh.',
      context_ko: '조이가 파운데이션 화장을 하고 센트럴 퍼크에 도착하는 장면. 방금 시티 무료 클리닉 건강 포스터 모델 일을 잡았습니다. 그는 자랑스럽게 새 이중 직함을 발표합니다. 찬들러의 즉각적인 반응 — "조이 트리비아니, 남자/여자처럼 보이던데" — 이 가장 큰 웃음을 끌어냅니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X2'
    },
    {
      phrase: 'I\'m boycotting all the Pilgrim holidays.',
      partOfSpeech: 'expression',
      meaning: 'To "boycott" something means to deliberately refuse to participate in it as a form of protest or personal objection. "Pilgrim holidays" is a creative way of referring to American holidays rooted in Pilgrim history — primarily Thanksgiving. Chandler boycotts it as a personal protest against the holiday that ruined his childhood.',
      meaning_ko: '무언가를 "boycott"한다는 것은 항의나 개인적인 반대의 표시로 의도적으로 참여를 거부한다는 뜻입니다. "Pilgrim holidays"는 순례자 역사에 뿌리를 둔 미국 명절, 주로 추수감사절을 창의적으로 표현하는 방법입니다. 찬들러는 어린 시절을 망친 명절에 대한 개인적인 항의로 이것을 거부합니다.',
      example: 'A: "Are you coming to the office holiday party?" B: "I\'m boycotting it. Every year it\'s just awkward conversations by the punch bowl."',
      example_ko: 'A: "회사 연말 파티 올 거야?" B: "거부할 거야. 매년 펀치볼 옆에서 어색한 대화만 하잖아."',
      context: 'Monica asks Chandler if he is spending Thanksgiving with family. His answer — "Yes, every single one of them" — perfectly captures the stubborn pride of someone who has turned their personal pain into a committed lifestyle stance.',
      context_ko: '모니카가 찬들러에게 추수감사절을 가족과 보낼 것인지 묻는 장면. 그의 대답 — "응, 하나도 빠짐없이 다" — 는 개인적인 아픔을 확고한 삶의 방식으로 전환한 사람의 완고한 자부심을 완벽하게 포착합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X3'
    },
    {
      phrase: 'I prefer to keep a safe distance from all this merriment.',
      partOfSpeech: 'expression',
      meaning: '"Merriment" is a formal or literary word for festive cheerfulness and celebration. "Keep a safe distance" literally means to stay physically away from something, but here it is used metaphorically — Chandler wants to stay emotionally and psychologically apart from holiday joy. The deliberate pompousness of the vocabulary is classic Chandler humor.',
      meaning_ko: '"Merriment"는 축제 분위기의 유쾌함과 기쁨을 뜻하는 격식 있거나 문학적인 단어입니다. "Keep a safe distance"는 문자 그대로 무언가로부터 물리적으로 멀리 떨어져 있다는 뜻이지만, 여기서는 비유적으로 사용됩니다 — 찬들러는 명절의 기쁨으로부터 감정적으로, 심리적으로 거리를 두고 싶어합니다. 의도적으로 거창한 어휘 선택이 전형적인 찬들러 유머입니다.',
      example: 'A: "Come on in, everyone\'s dancing." B: "I prefer to keep a safe distance from all this merriment."',
      example_ko: 'A: "들어와, 다들 춤추고 있어." B: "이 모든 흥겨움과 안전한 거리를 유지하는 걸 선호해."',
      context: 'Monica is trying to get Chandler to step inside the apartment for Thanksgiving prep, but he stubbornly stays in the doorway. This line captures everything about Chandler\'s relationship with Thanksgiving — the darkness beneath the jokes, and the elaborate verbal shield he builds around his genuine pain.',
      context_ko: '모니카가 찬들러에게 추수감사절 준비를 위해 아파트 안으로 들어오라고 하지만, 그는 완고하게 문 앞에 서 있는 장면. 이 대사는 추수감사절에 대한 찬들러의 감정 전체를 포착합니다 — 농담 뒤에 숨겨진 어두움, 그리고 진짜 아픔 주위에 그가 쌓아 올린 정교한 언어적 방어막.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X4'
    },
    {
      phrase: 'It\'s very difficult to enjoy Thanksgiving dinner once you\'ve seen it in reverse.',
      partOfSpeech: 'expression',
      meaning: '"Seen it in reverse" is a darkly euphemistic way of saying he vomited — the food went back out the same way it came in. The clinical, detached phrase "seen it in reverse" makes the gross image funnier by how much Chandler tries to describe it without saying the word.',
      meaning_ko: '"Seen it in reverse"는 구토를 했다는 것을 어둡고 완곡하게 표현하는 방법입니다 — 음식이 들어온 것과 같은 방향으로 나갔다는 뜻입니다. 임상적이고 초연한 표현 "seen it in reverse"는 찬들러가 그 단어를 말하지 않으려 얼마나 노력하는지로 인해 불쾌한 이미지를 더 웃기게 만듭니다.',
      example: 'A: "Did you enjoy the food at that restaurant?" B: "Let\'s just say I\'ve seen it in reverse, and leave it at that."',
      example_ko: 'A: "그 식당 음식 맛있었어?" B: "그냥 역방향으로 봤다고만 해두자."',
      context: 'Chandler explains why he hates Thanksgiving. When he was 9, his parents chose Thanksgiving dinner to announce their divorce — right when he had a mouthful of pumpkin pie. The shock made him sick. This line is one of the episode\'s best: darkly funny, perfectly worded, and genuinely sad.',
      context_ko: '찬들러가 추수감사절을 싫어하는 이유를 설명하는 장면. 아홉 살 때 부모님이 추수감사절 저녁식사 중에 이혼을 발표했는데, 바로 그때 그는 입 안 가득 호박파이를 물고 있었습니다. 충격으로 구토를 했습니다. 이 대사는 에피소드 최고의 대사 중 하나입니다: 어둡고 웃기며, 완벽하게 표현되어 있고, 진심으로 슬픕니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X5'
    },
    {
      phrase: 'Set another place for Thanksgiving. My entire family thinks I have VD.',
      partOfSpeech: 'expression',
      meaning: '"Set a place" means to put out a seat and utensils at the dinner table for an additional guest. "VD" stands for venereal disease — a sexually transmitted infection. The two-sentence structure creates a perfect joke: a domestic, cheerful action (set a place) followed by an outrageous explanation (the disease).',
      meaning_ko: '"Set a place"는 추가 손님을 위해 식탁에 자리와 식기를 놓는다는 뜻입니다. "VD"는 성병(venereal disease)의 약자입니다. 두 문장 구조가 완벽한 농담을 만들어 냅니다: 가정적이고 쾌활한 행동(자리 준비)에 이어 황당한 설명(질병)이 나옵니다.',
      example: 'A: "Is anyone else coming for dinner?" B: "Set another place. My roommate just got back from his trip."',
      example_ko: 'A: "저녁에 누가 더 와?" B: "자리 하나 더 놔. 룸메이트가 여행에서 막 돌아왔어."',
      context: 'Joey arrives at Monica\'s apartment after a disastrous day: his VD clinic poster is plastered all over the city, and everyone who knows him — his mother, his entire family — has seen it and assumed it\'s real. He has nowhere to go and nowhere to hide.',
      context_ko: '조이가 끔찍한 하루를 보내고 모니카 아파트에 도착하는 장면. 그의 성병 클리닉 포스터가 도시 전체에 붙어 있고, 그를 아는 모든 사람 — 어머니, 가족 전체 — 이 그것을 보고 진짜라고 생각합니다. 갈 곳도 숨을 곳도 없습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X6'
    },
    {
      phrase: 'Cider\'s mulling, turkey\'s turking, yams are yamming.',
      partOfSpeech: 'expression',
      meaning: 'Monica creates playful, nonsensical verbs from food nouns — "mulling" is real (spiced cider is simmered), but "turking" and "yamming" are invented. The joke is the cheerful, slightly absurd domestic ritual of narrating your own cooking progress. It captures Monica\'s personality perfectly: intense, proud, and a little ridiculous about food.',
      meaning_ko: '모니카가 음식 명사에서 장난스럽고 말이 안 되는 동사를 만들어 냅니다 — "mulling"은 실제 단어이지만(향신료를 넣은 사이다를 데우는 것), "turking"과 "yamming"은 지어낸 것입니다. 웃음 포인트는 자신의 요리 진행 상황을 중계하는 유쾌하고 약간 황당한 가정 의식입니다. 음식에 대해 강렬하고 자랑스럽고 약간 우스꽝스러운 모니카의 성격을 완벽하게 포착합니다.',
      example: 'A: "How\'s dinner coming along?" B: "Great! Pasta\'s boiling, sauce is saucing. We\'re on track."',
      example_ko: 'A: "저녁 어떻게 되고 있어?" B: "잘 되고 있어! 파스타는 끓고 있고, 소스는 소싱 중이야. 순조로워."',
      context: 'Monica is joyfully narrating her Thanksgiving prep to Ross. The moment is soon interrupted by the news that their parents went to Puerto Rico — and then begins the cascade of complications that will eventually lead to burnt food, locked doors, and a very different Thanksgiving than planned.',
      context_ko: '모니카가 로스에게 추수감사절 준비 상황을 즐겁게 중계하는 장면. 이 순간은 곧 부모님이 푸에르토리코로 갔다는 소식으로 중단됩니다 — 그리고 결국 탄 음식, 잠긴 문, 계획과 전혀 다른 추수감사절로 이어지는 복잡한 상황의 연쇄가 시작됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X7'
    },
    {
      phrase: 'Does anybody care what kind of potatoes I want?',
      partOfSpeech: 'expression',
      meaning: 'A rhetorical outburst expressing frustration at being overlooked while taking care of everyone else\'s needs. The irony is that Monica is the one cooking — she is the most invested person in the dinner — but no one has ever thought to ask her what she wants. It is a pointed statement about the invisible labour of hosting.',
      meaning_ko: '다른 모든 사람의 필요를 챙기면서 자신은 간과되는 것에 대한 답답함을 표현하는 수사적 폭발입니다. 아이러니는 모니카가 요리하는 사람이라는 것입니다 — 그녀가 저녁식사에 가장 많이 투자한 사람이지만 — 아무도 그녀가 원하는 것이 무엇인지 물어본 적이 없습니다. 이것은 주최자의 보이지 않는 노동에 대한 날카로운 발언입니다.',
      example: 'A: "Can we get the spicy version?" B: "We always get what you want. Does anybody care what kind I want?"',
      example_ko: 'A: "매운 거로 시킬 수 있어?" B: "항상 네가 원하는 걸 먹잖아. 내가 원하는 건 아무도 신경 안 써?"',
      context: 'Monica finally snaps after being asked to make mashed potatoes with lumps (for Ross), Tater Tots (for Joey), and peas and onions (for Phoebe). She has been cheerfully accommodating every request — until this moment, when her exhaustion and invisibility boil over.',
      context_ko: '모니카가 덩어리 있는 으깬 감자(로스를 위해), 감자 토트(조이를 위해), 완두콩과 양파(피비를 위해)를 만들어달라는 요청을 받은 후 마침내 폭발하는 장면. 그녀는 모든 요청을 즐겁게 수용해 왔습니다 — 이 순간까지, 그녀의 피로와 소외감이 끓어넘칩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E9X8'
    },
    {

  var TOTAL = 15;

  function goHome() { window.location.href = '../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
