<script>
  var EP_DATA = {
    available: true,
    title: 'The One with the Butt',
    description: 'Joey lands his first big acting role — as Al Pacino\'s butt double.',
    expressions: [
    {
      phrase: 'No sense of impending doom.',
      partOfSpeech: 'expression',
      meaning: '"Impending doom" means a feeling that something terrible is about to happen very soon. "No sense of impending doom" means someone is completely unaware of the disaster ahead of them — blissfully ignorant. It is darkly humorous because the speaker can see the disaster coming, while the other person cannot.',
      meaning_ko: '"Impending doom"은 곧 끔찍한 일이 일어날 것 같은 느낌을 뜻합니다. "No sense of impending doom"은 앞에 닥칠 재앙을 전혀 눈치채지 못하고 천진하게 있는 상태를 의미합니다. 화자는 재앙이 다가오는 것이 보이는데 상대방은 전혀 모른다는 점에서 어둡게 유머러스합니다.',
      example: 'A: "He walked into the room smiling, no sense of impending doom." B: "He had no idea he was about to be fired?"',
      example_ko: 'A: "그는 곧 닥칠 재앙도 모르고 웃으면서 방에 들어갔어." B: "잘릴 줄도 몰랐던 거야?"',
      context: 'The friends are looking at Joey\'s headshot outside the theater before watching his play. They can already tell it will be terrible — but Joey is inside, beaming with confidence. Chandler points to the photo and delivers this line, perfectly setting up the disaster to come.',
      context_ko: '친구들이 조이의 연극을 보러 극장 밖에서 그의 사진을 보는 장면. 이미 끔찍할 것이 뻔한데 — 조이는 안에서 자신만만하게 빛나고 있습니다. 찬들러가 사진을 가리키며 이 대사를 하고, 앞으로 닥칠 재앙을 완벽하게 예고합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X1'
    },
    {
      phrase: 'Monogamy can be a tricky concept.',
      partOfSpeech: 'expression',
      meaning: '"Monogamy" is the practice of having only one romantic partner at a time. Calling it a "tricky concept" is a polite, intellectual way of saying it is complicated and doesn\'t always work simply in practice. Ross is about to launch into a full anthropological lecture — but the word "tricky" is doing a lot of quiet work: it acknowledges that the standard is hard to maintain without fully criticising it.',
      meaning_ko: '"Monogamy(일부일처제)"는 한 번에 오직 한 명의 연인만 두는 관행입니다. 그것을 "tricky concept(까다로운 개념)"이라고 부르는 것은 그것이 복잡하고 현실에서 항상 단순하게 작동하지 않는다는 것을 정중하고 지적인 방식으로 말하는 것입니다. 로스가 본격적인 인류학적 강의를 시작하려는 참인데 — "tricky"라는 단어가 조용히 많은 일을 합니다: 기준을 완전히 비판하지 않으면서도 유지하기 어렵다는 것을 인정합니다.',
      example: 'A: "Everyone says just stay loyal, it\'s simple." B: "Well, monogamy can be a tricky concept, depending on who you ask."',
      example_ko: 'A: "다들 그냥 충실하면 된다고 해, 간단하잖아." B: "음, 누구한테 물어보느냐에 따라 일부일처제는 꽤 까다로운 개념일 수 있어."',
      context: 'Chandler defends his relationship with the married Aurora by saying it\'s "every guy\'s fantasy." Monica challenges him and turns to Ross for backup. Ross\'s response — "Monogamy can be a tricky concept. I mean, anthropologically..." — triggers the entire group to immediately fake-snore in unison. It is a perfect running gag for Ross\'s habit of turning every conversation into a lecture.',
      context_ko: '찬들러가 유부녀 오로라와의 관계를 "모든 남자의 판타지"라며 변호하는 장면. 모니카가 이의를 제기하고 로스에게 동의를 구합니다. 로스의 반응 — "일부일처제는 꽤 까다로운 개념이야. 인류학적으로 말하자면..." — 이 친구들 전체가 즉시 일제히 자는 척하게 만듭니다. 모든 대화를 강의로 만드는 로스의 습관에 대한 완벽한 반복 개그입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X3'
    },
    {
      phrase: 'I thought you talked to Rick.',
      partOfSpeech: 'expression',
      meaning: 'Used when you believed a prior conversation or decision had already resolved a situation, but something new has disrupted that understanding. "I thought you [did X]" signals that reality is not matching expectation. Here, Chandler used it to track Aurora\'s complicated love life — he thought Rick was handled, but now there is a new complication.',
      meaning_ko: '이전 대화나 결정이 이미 상황을 해결했다고 믿었는데 새로운 것이 그 이해를 뒤집었을 때 쓰는 표현입니다. "I thought you [X했다]"는 현실이 기대와 일치하지 않는다는 신호입니다. 여기서 찬들러는 오로라의 복잡한 연애 생활을 추적하는 데 이 표현을 씁니다 — 릭 문제는 해결됐다고 생각했는데 새로운 복잡함이 생긴 것입니다.',
      example: 'A: "He\'s leaving again." B: "I thought you talked to him about this. What happened?"',
      example_ko: 'A: "그 사람 또 떠나." B: "이 문제 이미 얘기했다고 생각했는데. 무슨 일이야?"',
      context: 'Chandler is trying to keep track of Aurora\'s partners. He has already processed the shock of Rick (her husband) and Ethan (her boyfriend). When Aurora needs to leave for "him" and it turns out to be yet another man — Andrew — Chandler\'s tracking question reveals the absurdity perfectly.',
      context_ko: '찬들러가 오로라의 파트너들을 추적하려는 장면. 릭(남편)과 이선(남자친구)의 충격은 이미 소화했습니다. 오로라가 "그 사람"을 위해 자리를 떠야 할 때 또 다른 남자 앤드루로 밝혀지고, 찬들러의 추적 질문이 상황의 황당함을 완벽하게 드러냅니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X7'
    },
    {
      phrase: 'I have to listen to both. They don\'t let each other finish.',
      partOfSpeech: 'expression',
      meaning: 'Chandler describes his inner conflict as two voices arguing inside him — one saying "this is great, stay!" and one saying "this is too hard, get out!" "They don\'t let each other finish" means they interrupt each other continuously, creating paralysis. The absurdly literal way he describes his conscience as two actual people is the essence of the joke.',
      meaning_ko: '찬들러가 내면의 갈등을 자신 안에서 논쟁하는 두 목소리로 묘사합니다 — 하나는 "이거 좋아, 계속해!"이고 다른 하나는 "이거 너무 힘들어, 빠져나와!"입니다. "They don\'t let each other finish"는 둘이 계속 서로의 말을 끊어 마비 상태를 만든다는 뜻입니다. 양심을 실제 두 사람처럼 묘사하는 황당하게 문자 그대로의 방식이 이 농담의 핵심입니다.',
      example: 'A: "So what did you decide?" B: "I couldn\'t. I have to listen to both. They don\'t let each other finish."',
      example_ko: 'A: "그래서 어떻게 결정했어?" B: "못 했어. 둘 다 들어야 하는데 서로 말을 끝내질 않거든."',
      context: 'Aurora asks Chandler which of his two inner voices he will listen to. His answer is honest and hilarious: both guys are arguing, neither will yield. It perfectly captures the impossibility of being a conflicted person — and is one of the most memorable Chandler monologues in Season 1.',
      context_ko: '오로라가 찬들러에게 두 내면의 목소리 중 어느 쪽을 들을 것이냐고 묻는 장면. 그의 대답은 솔직하고 우습습니다: 두 녀석이 다 논쟁 중이고, 어느 쪽도 양보하지 않습니다. 갈등하는 사람의 불가능함을 완벽하게 포착하며, 시즌 1에서 가장 기억에 남는 찬들러의 독백 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X9'
    },
    {
      phrase: 'I\'ve done nothing but crappy plays for six years.',
      partOfSpeech: 'expression',
      meaning: '"Nothing but" means exclusively — and only that thing, nothing else. "Crappy" is informal and means bad quality, worthless, or disappointing. "I\'ve done nothing but crappy plays for six years" is a raw admission of how little Joey\'s career has amounted to — the frustration of years of effort with almost nothing to show.',
      meaning_ko: '"Nothing but"는 오직 — 그것만, 다른 것은 없다는 뜻입니다. "Crappy"는 비격식으로 품질이 나쁘거나, 가치 없거나, 실망스럽다는 의미입니다. "I\'ve done nothing but crappy plays for six years"는 조이의 커리어가 얼마나 보잘것없는지에 대한 날것의 인정으로 — 6년간의 노력이 보여줄 것이 거의 없다는 좌절감입니다.',
      meaning_ko: '"Nothing but"는 오직 — 그것만, 다른 것은 없다는 뜻입니다. "Crappy"는 비격식으로 품질이 나쁘거나, 가치 없거나, 실망스럽다는 의미입니다. "I\'ve done nothing but crappy plays for six years"는 조이의 커리어가 얼마나 보잘것없는지에 대한 날것의 인정으로 — 6년간의 노력이 보여줄 것이 거의 없다는 좌절감입니다.',
      example: 'A: "Are you okay?" B: "I\'ve done nothing but dead-end jobs for three years. This was supposed to be different."',
      example_ko: 'A: "괜찮아?" B: "3년 동안 아무 전망도 없는 일들만 해왔어. 이번엔 다를 줄 알았는데."',
      context: 'After being fired from the Al Pacino film, Joey sits devastated. This admission is one of his most genuinely vulnerable moments in the whole series — the pain of someone who has been trying hard for a long time and finally got a chance, only to lose it.',
      context_ko: '알 파치노 영화에서 해고된 후 조이가 망연자실 앉아있는 장면. 이 고백은 시리즈 전체에서 그의 가장 진심으로 취약한 순간 중 하나입니다 — 오랫동안 열심히 노력하다가 드디어 기회를 잡았는데 그것을 잃은 사람의 고통.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X11'
    },
    {
      phrase: 'She is a kook.',
      partOfSpeech: 'expression',
      meaning: 'A "kook" is a warm, informal word for someone who is charmingly eccentric or pleasantly odd. Unlike "crazy" (which can be negative), "kook" is usually affectionate — it suggests the person is entertainingly unconventional rather than genuinely worrying. Ross says this with obvious fondness.',
      meaning_ko: '"Kook"은 매력적으로 별나거나 유쾌하게 기이한 사람을 따뜻하고 비격식적으로 부르는 말입니다. 부정적일 수 있는 "crazy"와 달리, "kook"은 보통 애정 어린 표현으로 — 진심으로 걱정스럽기보다는 재미있게 관습에 얽매이지 않는 사람을 의미합니다. 로스는 분명한 애정을 담아 이 말을 합니다.',
      example: 'A: "She rearranges all the furniture every full moon." B: "She is such a kook. But you love her for it."',
      example_ko: 'A: "그 사람 보름달마다 가구를 다 바꿔 놓아." B: "완전 독특한 사람이네. 근데 그래서 더 좋아하잖아."',
      context: 'The episode\'s final scene: Monica has challenged herself not to pick up her shoes from the hallway — trying to prove she doesn\'t need everything to be perfectly ordered. Ross watches her fighting her own compulsion with a huge smile. His affectionate "She is a kook" is the perfect warm ending.',
      context_ko: '에피소드의 마지막 장면: 모니카가 모든 것이 완벽하게 정돈될 필요가 없다는 것을 증명하려고 복도에 신발을 두고 가져오지 않으려 안간힘을 쓰는 장면. 로스가 큰 미소로 그녀가 자신의 강박과 싸우는 것을 지켜봅니다. 그의 애정 어린 "그 사람 정말 독특해"가 완벽하고 따뜻한 엔딩입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X14'
    },
    {
      phrase: 'Could she be more out of my league?',
      partOfSpeech: 'expression',
      meaning: '"Out of my league" means someone is so much more attractive, successful, or impressive than you that pursuing them romantically seems unrealistic. The rhetorical question form ("Could she be more...?") is a Chandler signature — it makes the statement more emphatic, meaning she is completely and absolutely beyond his level.',
      meaning_ko: '"Out of my league"는 상대방이 자신보다 훨씬 매력적이거나 성공했거나 인상적이어서 낭만적으로 접근하는 것이 거의 불가능하게 느껴진다는 뜻입니다. 수사적 의문문 형태("Could she be more...?")는 찬들러의 특기로, 진술을 더욱 강조해 그녀가 완전히 자신의 수준을 넘어선다는 의미를 담습니다.',
      example: 'A: "Why didn\'t you ask for her number?" B: "Could she be more out of my league? Look at her."',
      example_ko: 'A: "왜 번호를 안 물어봤어?" B: "저 사람이 내 수준보다 더 높을 수 있겠어? 좀 봐봐."',
      context: 'Chandler spots Aurora after the play and is immediately overwhelmed. He says this to the group, completely defeated before even trying. The friends encourage him anyway — and to everyone\'s astonishment, she says yes to a date.',
      context_ko: '연극이 끝난 후 찬들러가 오로라를 발견하고 즉시 압도되는 장면. 시도도 해보기 전에 완전히 포기한 채로 친구들에게 이 말을 합니다. 친구들이 어쨌든 가보라고 격려하고, 모두를 놀라게도 그녀가 데이트 제안에 응합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X2'
    },
    {
      phrase: 'Just for the hell of it.',
      partOfSpeech: 'expression',
      meaning: '"Just for the hell of it" means doing something for no particular reason — out of pure impulse, curiosity, or a desire for a small adventure, without any practical purpose. "Hell" here is not literal; it is an intensifier that makes the casualness more emphatic. It is one of the most natural casual expressions in everyday English.',
      meaning_ko: '"Just for the hell of it"는 특별한 이유 없이 — 순수한 충동, 호기심, 또는 작은 모험에 대한 욕구에서 — 어떤 것을 한다는 뜻입니다. 여기서 "hell"은 문자 그대로가 아니라 캐주얼함을 더욱 강조하는 강조어입니다. 일상 영어에서 가장 자연스러운 캐주얼 표현 중 하나입니다.',
      example: 'A: "Why did you drive two hours to the beach?" B: "Just for the hell of it. I needed to get out."',
      example_ko: 'A: "왜 2시간이나 운전해서 해변에 갔어?" B: "그냥 아무 이유 없이. 어딘가 가고 싶었어."',
      context: 'Chandler tells Aurora his most adventurous story — he once rode the subway all the way to Brooklyn at night "just for the hell of it." The joke is the contrast: Aurora has survived gunfire and crossed international borders; Chandler\'s big story is a subway ride.',

      meaning_ko: '"Get your shot"는 드디어 기다려온 기회를 얻는다는 뜻입니다. "Blow it"은 자신의 실수로 무언가를 망치거나 실패한다는 뜻입니다. 함께 이 표현은 힘들게 얻은 기회를 날려버리는 특별한 고통을 포착합니다 — 운이 나빠서가 아니라 자신이 저지른 실수 때문에 실패한 것입니다.',

      meaning_ko: '앞의 감정적인 순간을 완전히 뒤집는 완벽한 펀치라인입니다. 찬들러는 방금 두 번째 목소리("너무 힘들어, 빠져나와")를 선택했습니다 — 그런데 즉시 오로라에게 키스합니다. "The first guy runs the lips"는 "이거 좋아, 멈추지 마"라는 목소리가 그가 다른 결정을 내렸을 때도 그의 신체적 행동을 통제한다는 뜻입니다.',

      partOfSpeech: 'expression',

      context_ko: '오로라가 또 다른 남자(앤드루)를 언급하자 찬들러가 드디어 한계에 달하는 장면. 그는 모두를 정리하고 자신과만 있어달라고 직접 요청합니다. 찬들러의 진짜 감정이 표면으로 드러나는 순간이며, "지금 우리가 가진 것을 그냥 유지할 수 없어?"라는 그녀의 질문이 그의 감정을 더욱 선명하게 만듭니다.',

      meaning_ko: '이 대사의 모순이 바로 농담의 전부입니다. "I don\'t have to prove anything"은 외부 판단으로부터의 자유 선언입니다 — 당신은 타인의 의견에 책임이 없습니다. 하지만 즉각적인 후속 문장 "I\'m gonna go get them"은 모니카가 자신의 내면 판단에 완전히 종속되어 있다는 것을 드러냅니다. 다른 사람들에게 증명할 필요는 없지만 — 자신에게는 절대적으로 증명해야 합니다.',

      context: 'Monica\'s internal battle — to retrieve her shoes or not — is the episode\'s comic B-story. This is her tipping point: the moment her proclaimed freedom from perfectionism collapses under the weight of her actual perfectionism. It ends with her sneaking out to get the shoes at 3am, perfectly encapsulating who Monica is.',
      context_ko: '신발을 가져올지 말지에 대한 모니카의 내면 싸움이 에피소드의 코미디 서브 스토리입니다. 이것이 그녀의 전환점입니다: 완벽주의로부터의 해방 선언이 실제 완벽주의의 무게 아래 무너지는 순간. 결국 새벽 3시에 신발을 가지러 몰래 나가는 것으로 끝나며, 모니카가 어떤 사람인지를 완벽하게 요약합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E6X15'

    {
      phrase: 'An agency left me its card. Maybe they wanna sign me!',

      meaning_ko: '연예 산업에서 에이전시에 "sign"된다는 것은 에이전시가 당신을 대리하기로 동의한다는 것으로, 일을 찾아주고 커리어를 관리해 준다는 뜻입니다. "They wanna sign me"는 모든 배우 지망생의 꿈입니다. 조이의 흥분은 완전히 진심이고 완전히 감동적입니다 — 그가 방금 끔찍한 연극에서 연기했음에도 불구하고.',

      context: 'After the disastrous play, an usher gives Joey a business card from the Estelle Leonard Talent Agency. Joey\'s immediate, breathless conclusion — "Maybe they wanna sign me!" — triggers his friends\'  collective pause. "Based on this play?" is Chandler\'s perfect response.',
      context_ko: '끔찍한 연극이 끝난 후 안내원이 조이에게 에스텔 레너드 탤런트 에이전시 명함을 건네는 장면. 조이의 즉각적이고 숨가쁜 결론 — "나랑 계약하려는 것 같아!" — 이 친구들의 집단적인 정지를 유발합니다. "이 연극을 보고?"라는 찬들러의 반응이 완벽합니다.',

      meaning_ko: '이 문장은 진정으로 의미 있는 기회에는 직감, 즉 "이 순간이 맞다"는 내면의 확신이 따른다는 믿음을 표현합니다. "Your shot"은 어떤 기회든 아니라, 당신이 누구인지와 맞아떨어지는 올바른 기회입니다. 함의는: 확신이 없다면, 아마 아직 맞는 기회가 아니라는 것입니다.',

  var S_NUM = 1;
  var E_NUM = 6;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/season' + S_NUM + '/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/season'+S_NUM+'/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    /* ── Availability guard ── */
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0d1b2e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-size:1.3rem;font-weight:900;color:#38bdf8;margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:#6b87aa;margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:#38bdf8;color:#0d1b2e;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
        checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
