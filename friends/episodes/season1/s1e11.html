<script>
  var EP_DATA = {
    title: 'The One with Mrs. Bing',
    description: 'Chandler\'s romance-novel-writing mother visits. Ross and Joey argue over a comatose woman.',
    expressions: [
    {
      phrase: 'He has the potential to break our hearts and plunge us into depression.',
      partOfSpeech: 'expression',
      meaning: '"Plunge into" means to push or throw something suddenly into a state or condition — here, into deep sadness. The phrase exaggerates how dangerous an attractive stranger is, treating him like a natural disaster. The over-dramatic phrasing is very Monica: she recognises the danger of a handsome man and articulates it with maximum flair.',
      meaning_ko: '"Plunge into"는 어떤 것을 갑자기 어떤 상태나 상황 속으로 밀어 넣거나 던지다는 뜻으로, 여기서는 깊은 슬픔 속으로를 말합니다. 이 표현은 매력적인 낯선 사람이 얼마나 위험한지를 과장해서 그를 자연재해처럼 취급합니다. 과도하게 극적인 표현은 전형적인 모니카입니다: 잘생긴 남자의 위험성을 알아채고 최대한 화려하게 표현합니다.',
      example: 'A: "Oh no, not him again." B: "I know. He has the potential to break our hearts and plunge us into depression."',
      example_ko: 'A: "아, 안 돼, 또 저 사람." B: "알아. 우리 마음을 부수고 우리를 우울로 빠뜨릴 가능성이 있는 사람이야."',
      context: 'Monica spots an extremely attractive man on the street and alerts Phoebe — but before they can act, he is hit by a car after Monica wolf-whistles at him. For the rest of the episode, Monica and Phoebe visit him in hospital, convinced they are responsible and hopelessly devoted to the handsome stranger in the coma.',
      context_ko: '모니카가 거리에서 매우 매력적인 남성을 발견하고 피비에게 알리는 장면 — 하지만 모니카가 휘파람을 불자 차에 치입니다. 에피소드 내내 모니카와 피비는 자신들이 책임이 있다고 확신하며 병원에서 혼수상태의 잘생긴 낯선 사람에게 절망적으로 헌신합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X1'
    },
    {
      phrase: 'I cannot get on a plane without one.',
      partOfSpeech: 'expression',
      meaning: 'An expression of strong personal habit or dependency — meaning you always need this particular thing in a certain situation. "I cannot [do X] without [Y]" is a natural way to say something has become an essential part of your routine. Rachel uses it to express just how much she loves Nora Bing\'s romance novels.',
      meaning_ko: '강한 개인적 습관이나 의존성을 표현하는 말로, 특정 상황에서 이 특정한 것이 항상 필요하다는 의미입니다. "I cannot [X하다] without [Y]"는 무언가가 당신의 일상에서 필수적인 부분이 됐다는 것을 자연스럽게 표현하는 방법입니다. 레이철은 노라 빙의 로맨스 소설을 얼마나 좋아하는지 표현하기 위해 이것을 씁니다.',
      example: 'A: "What\'s in your bag?" B: "My headphones. I cannot get on a plane without them."',
      example_ko: 'A: "가방에 뭐 들었어?" B: "헤드폰이야. 이거 없이는 비행기를 못 탄다고."',
      context: 'Rachel gushes to Chandler about his mother\'s romance novels, confessing she reads them obsessively on flights. The irony is delicious: Chandler is mortified by his mother\'s books, while Rachel — his close friend — turns out to be one of her biggest fans.',
      context_ko: '레이철이 찬들러에게 그의 어머니의 로맨스 소설에 대해 흥분해서 이야기하며, 비행기에서 강박적으로 읽는다고 고백하는 장면. 아이러니가 맛있습니다: 찬들러는 어머니의 책을 창피해하는데, 그의 친한 친구 레이철이 가장 열성적인 팬 중 한 명으로 드러납니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X2'
    },
    {
      phrase: 'You wouldn\'t think it\'s cool if you were 11 and all your friends were passing around page 79.',
      partOfSpeech: 'expression',
      meaning: '"Passing around" something means circulating it among a group of people — sharing it from person to person. In the context of a book, it means kids secretly sharing a specific scandalous page. The visual of 11-year-olds passing around a racy romance novel perfectly captures why Chandler finds his mother\'s career so embarrassing.',
      meaning_ko: '무언가를 "passing around"한다는 것은 사람들 사이에서 돌려 보다는 것, 즉 한 사람에서 다른 사람으로 공유하는 것을 뜻합니다. 책의 맥락에서는 아이들이 특정 선정적인 페이지를 비밀스럽게 공유하는 것을 의미합니다. 11살 아이들이 야한 로맨스 소설을 돌려보는 장면은 왜 찬들러가 어머니의 직업을 그렇게 창피해하는지를 완벽하게 포착합니다.',
      example: 'A: "This report seems pretty harmless to me." B: "You wouldn\'t think so if your classmates were passing it around and laughing at your family."',
      example_ko: 'A: "이 보고서는 꽤 무해해 보이는데." B: "반 친구들이 그걸 돌려보면서 네 가족을 비웃고 있다면 그렇게 생각 안 할 걸."',
      context: 'Chandler explains to Rachel why he doesn\'t share her enthusiasm for his mother\'s books. Growing up with a famous romance novelist as a parent sounds glamorous from the outside, but for Chandler it meant childhood humiliation — schoolmates passing around the explicit pages.',
      context_ko: '찬들러가 레이철에게 왜 어머니의 책에 대한 그녀의 열정을 공유하지 않는지 설명하는 장면. 유명한 로맨스 소설가를 부모로 두는 것은 외부에서는 화려하게 들리지만, 찬들러에게는 어린 시절의 굴욕을 의미했습니다 — 친구들이 야한 페이지를 돌려보는 것이요.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X3'
    },
    {
      phrase: 'Shh. I\'m busy beaming with pride.',
      partOfSpeech: 'expression',
      meaning: '"Beaming with pride" means radiating happiness and deep satisfaction about someone\'s achievement — your face is literally "beaming" (shining). The joke is that Chandler says this sarcastically: his mother has just been arrested in London, and he is pretending to be proud of her as a way of coping with embarrassment.',
      meaning_ko: '"Beaming with pride"는 누군가의 성취에 대한 행복과 깊은 만족감을 발산하다는 뜻으로, 당신의 얼굴이 문자 그대로 "beaming(빛나고)" 있는 것입니다. 웃음 포인트는 찬들러가 이것을 빈정대며 말한다는 것입니다: 어머니가 방금 런던에서 체포됐는데, 그는 창피함을 대처하는 방법으로 자랑스러운 척합니다.',
      example: 'A: "Did you see what your brother just did?" B: "Shh. I\'m busy beaming with pride."',
      example_ko: 'A: "네 남동생이 방금 한 짓 봤어?" B: "쉿. 지금 자랑스러움으로 빛나는 중이야."',
      context: 'The group is watching a late-night TV interview with Chandler\'s mother Nora Bing, who casually mentions being arrested in London. Chandler\'s deadpan "Shh, I\'m busy beaming with pride" perfectly encapsulates his resigned, ironic relationship with his outrageous mother.',
      context_ko: '친구들이 찬들러의 어머니 노라 빙의 심야 TV 인터뷰를 보는 장면. 노라는 런던에서 체포된 것을 아무렇지 않게 언급합니다. 찬들러의 무표정한 "쉿, 지금 자랑스러움으로 빛나는 중이야"가 황당한 어머니에 대한 그의 체념적이고 아이러니한 관계를 완벽하게 요약합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X4'
    },
    {
      phrase: 'You just need to come out of your shell.',
      partOfSpeech: 'expression',
      meaning: '"Come out of your shell" means to stop being shy, withdrawn, or reserved and become more open, outgoing, and confident. The metaphor is of a snail or turtle retreating into its shell for safety — "coming out" means leaving that protective isolation and engaging with the world.',
      meaning_ko: '"Come out of your shell"은 수줍어하거나 내성적이거나 소극적인 것을 멈추고 더 열린, 외향적이고 자신감 있는 사람이 되다는 뜻입니다. 달팽이나 거북이가 안전을 위해 껍데기 속으로 들어가는 것이 비유입니다 — "나오는 것"은 그 보호적인 고립에서 벗어나 세상과 교류한다는 의미입니다.',
      example: 'A: "She barely said a word at the party." B: "She just needs to come out of her shell a little. She\'s actually really funny once you get to know her."',
      example_ko: 'A: "그 사람 파티에서 말을 거의 안 했어." B: "그냥 좀 더 마음을 열면 돼. 사실 알고 나면 정말 웃긴 사람이거든."',
      context: 'When Chandler asks his mother what she thought of the TV show (meaning her own interview), Nora starts to tell him he needs to open up more — before she gets distracted by the bar. The irony that it\'s Chandler\'s emotionally unavailable mother telling him to be more open is not lost on anyone.',
      context_ko: '찬들러가 어머니에게 TV 프로그램(자신의 인터뷰)이 어떠셨냐고 묻자 노라가 그에게 더 마음을 열어야 한다고 말하기 시작하는 장면 — 술집에 정신이 팔리기 전에. 감정적으로 거리가 있는 찬들러의 어머니가 그에게 더 열리라고 하는 아이러니는 누구도 놓치지 않습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X5'
    },
    {
      phrase: 'I\'m not really a shot-drinking kind of guy.',
      partOfSpeech: 'expression',
      meaning: '"A shot" is a small glass of spirits — typically vodka, tequila, or whiskey — drunk quickly in one gulp. "A shot-drinking kind of guy" describes a certain personality type: someone who is adventurous, uninhibited, and comfortable with bold social rituals. Ross\'s reluctance to be that person is immediately overcome when Nora Bing arrives.',
      meaning_ko: '"A shot"은 보통 보드카, 테킬라, 또는 위스키 같은 증류주를 작은 잔에 담아 한 번에 빨리 마시는 것입니다. "A shot-drinking kind of guy"는 특정 성격 유형을 묘사합니다: 모험적이고 거리낌 없으며 대담한 사교 의식에 편안한 사람. 노라 빙이 도착하자마자 로스의 망설임은 즉시 극복됩니다.',
      example: 'A: "Come on, just do one." B: "I\'m not really a shot-drinking kind of guy." A: "Neither am I. Cheers."',
      example_ko: 'A: "어서, 하나만 해봐." B: "나 그런 원샷 타입이 아니야." A: "나도 그래. 건배."',
      context: 'When Nora Bing orders tequila shots for the table, Ross politely declines by identifying as "not a shot-drinking kind of guy." The fact that he immediately follows this by doing a shot after she flatters him is a perfect small character moment — Ross\'s principles are easily overcome by a glamorous woman\'s attention.',
      context_ko: '노라 빙이 테이블에 테킬라 샷을 주문할 때 로스가 "원샷 타입이 아니다"라며 공손하게 거절하는 장면. 그녀가 그를 추켜세우자 즉시 샷을 하는 것이 완벽한 작은 캐릭터 순간입니다 — 로스의 원칙은 화려한 여성의 관심으로 쉽게 극복됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X6'
    },
    {
      phrase: 'You broke the code.',
      partOfSpeech: 'expression',
      meaning: '"The code" here refers to an unwritten, informal set of rules that govern acceptable behaviour between friends — in this case, the rule that you never kiss a friend\'s mother. "Breaking the code" means violating these sacred, unspoken social agreements. It is more serious than breaking a rule because codes are based on trust and loyalty.',
      meaning_ko: '여기서 "the code"는 친구들 사이에서 허용 가능한 행동을 지배하는 성문화되지 않은 비공식적인 규칙 모음을 말합니다 — 이 경우 친구의 어머니에게 절대 키스하지 않는다는 규칙. "Breaking the code"는 이러한 신성하고 암묵적인 사회적 합의를 위반하는 것을 의미합니다. 코드는 신뢰와 충성에 기반하기 때문에 규칙을 어기는 것보다 더 심각합니다.',
      example: 'A: "I asked out his ex-girlfriend." B: "Dude, you broke the code. You don\'t do that."',
      example_ko: 'A: "그 친구 전 여자친구한테 고백했어." B: "야, 코드 어겼잖아. 그러면 안 되는 거야."',
      context: 'Joey confronts Ross after discovering he kissed Chandler\'s mother. Joey lays out the unofficial rules with great moral authority: "You don\'t kiss your friend\'s mom. Sisters are okay. Maybe a hot-looking aunt. But not a mom. Never a mom." The absurdity of the specific rule hierarchy makes it funnier.',
      context_ko: '조이가 로스가 찬들러의 어머니에게 키스했다는 것을 알고 그를 추궁하는 장면. 조이는 큰 도덕적 권위로 비공식 규칙을 설명합니다: "친구 엄마한테 키스하면 안 돼. 누나는 괜찮아. 섹시한 고모도 어쩌면. 근데 엄마는 안 돼. 절대 엄마는."  구체적인 규칙 계층 구조의 황당함이 더 웃깁니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X7'
    },
    {
      phrase: 'Knowledge is a tricky thing.',
      partOfSpeech: 'expression',
      meaning: 'A deliberately vague, philosophical-sounding deflection — Joey\'s way of avoiding a direct answer about whether he knew about the kiss. "Tricky" means complicated, slippery, or difficult to handle. By calling knowledge "tricky," Joey implies that what you know and what you\'re obligated to share are two different things — a philosophical dodge dressed up as wisdom.',
      meaning_ko: '의도적으로 모호하고 철학적으로 들리는 회피 — 조이가 키스에 대해 알고 있었는지에 대한 직접적인 대답을 피하는 방식입니다. "Tricky"는 복잡하거나 미끄럽거나 다루기 어렵다는 뜻입니다. 지식을 "tricky"하다고 부름으로써 조이는 아는 것과 공유해야 할 의무가 있는 것은 두 가지 다른 것임을 내비칩니다 — 지혜로 포장된 철학적 회피입니다.',
      example: 'A: "Did you know about this the whole time?" B: "Knowledge is a tricky thing. I\'m not sure I can say I truly \'knew.\'&quot;',
      example_ko: 'A: "내내 이걸 알고 있었어?" B: "지식이라는 건 까다로운 거야. 내가 진정으로 \'알았다\'고 말할 수 있을지 모르겠어."',
      context: 'When Chandler furiously asks Joey whether he knew about Ross kissing his mother, Joey\'s response — "You know, knowledge is a tricky thing" — is one of the episode\'s best lines. It is simultaneously evasive, absurd, and somehow sounds like it could be wise. Chandler sees through it immediately.',

  var S_NUM = 1;
  var E_NUM = 11;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
