<script>
  var EP_DATA = {
    title: 'The One with Mrs. Bing',
    description: 'Chandler\'s romance-novel-writing mother visits. Ross and Joey argue over a comatose woman.',
    expressions: [
    {
      phrase: 'Ooh, come to Mama.',
      partOfSpeech: 'expression',
      speaker: 'Monica',
      meaning: 'An informal, playful expression said when you spot something you immediately and eagerly want — calling it toward you as if inviting it. \"Mama\" here is a casual, affectionate self-reference, not literally about motherhood. It is used across genders to express instant desire, delight, or attraction toward something or someone.',
      meaning_ko: '즉각적이고 열렬히 원하는 것을 발견했을 때 마치 그것을 자신에게 초대하는 것처럼 부르는 비격식적이고 장난스러운 표현입니다. 여기서 \"Mama\"는 가정적이고 애정 어린 자기 지칭으로, 말 그대로 어머니를 의미하지 않습니다. 성별에 관계없이 무언가나 누군가를 향한 즉각적인 욕망, 기쁨, 또는 매력을 표현하기 위해 씁니다.',
      example: 'A: \"The dessert cart is heading this way.\" B: \"Ooh, come to Mama.\"',
      example_ko: 'A: \"디저트 카트 이쪽으로 온다.\" B: \"오, 이리 와봐.\"',
      context: 'Monica spots an extremely attractive man across the street and instinctively says this before alerting Phoebe. It perfectly captures her unfiltered, impulsive reaction — right before she follows it up with the wolf-whistle that causes the man to step into the road and get hit by a car.',
      context_ko: '모니카가 거리 건너편에서 매우 매력적인 남성을 발견하고 피비에게 알리기 전에 본능적으로 이 말을 하는 장면. 그녀의 거르지 않은 충동적인 반응을 완벽하게 포착합니다 — 바로 그 직후 남성을 차도로 걸어 나오게 만드는 휘파람을 불기 전의 순간입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X1'
    },
    {
      phrase: 'I cannot get on a plane without one.',
      partOfSpeech: 'expression',      speaker: 'Rachel',

      meaning: 'An expression of strong personal habit or dependency — meaning you always need this particular thing in a certain situation. "I cannot [do X] without [Y]" is a natural way to say something has become an essential part of your routine. Rachel uses it to express just how much she loves Nora Bing\'s romance novels.',
      meaning_ko: '강한 개인적 습관이나 의존성을 표현하는 말로, 특정 상황에서 이 특정한 것이 항상 필요하다는 의미입니다. "I cannot [X하다] without [Y]"는 무언가가 당신의 일상에서 필수적인 부분이 됐다는 것을 자연스럽게 표현하는 방법입니다. 레이철은 노라 빙의 로맨스 소설을 얼마나 좋아하는지 표현하기 위해 이것을 씁니다.',
      example: 'A: "What\'s in your bag?" B: "My headphones. I cannot get on a plane without them."',
      example_ko: 'A: "가방에 뭐 들었어?" B: "헤드폰이야. 이거 없이는 비행기를 못 탄다고."',
      context: 'Rachel gushes to Chandler about his mother\'s romance novels, confessing she reads them obsessively on flights. The irony is delicious: Chandler is mortified by his mother\'s books, while Rachel — his close friend — turns out to be one of her biggest fans.',
      context_ko: '레이철이 찬들러에게 그의 어머니의 로맨스 소설에 대해 흥분해서 이야기하며, 비행기에서 강박적으로 읽는다고 고백하는 장면. 아이러니가 맛있습니다: 찬들러는 어머니의 책을 창피해하는데, 그의 친한 친구 레이철이 가장 열성적인 팬 중 한 명으로 드러납니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X2'
    },
    {
      phrase: 'My mother, ladies and gentlemen.',
      partOfSpeech: 'expression',
      speaker: 'Chandler',
      meaning: 'A deadpan rhetorical address used to caption someone\'s embarrassing or outrageous behaviour — as if formally presenting them to an imaginary audience. \"Ladies and gentlemen\" is a ceremonial phrase used to introduce performers or speakers. Using it to introduce a family member\'s embarrassing moment creates an ironic contrast between the formal frame and the undignified content.',
      meaning_ko: '마치 상상의 청중에게 격식 있게 소개하는 것처럼 누군가의 당황스럽거나 황당한 행동에 자막을 다는 무표정한 수사적 발언입니다. \"Ladies and gentlemen\"은 공연자나 연사를 소개할 때 쓰는 의식적인 표현입니다. 가족의 당황스러운 순간을 소개하는 데 사용하면 격식 있는 형식과 품위 없는 내용 사이에 아이러니한 대비가 만들어집니다.',
      example: 'A: \"He just told everyone at the dinner table about his court date.\" B: \"My brother, ladies and gentlemen.\"',
      example_ko: 'A: \"저녁식사 자리에서 법원 출석 날짜 얘기를 다 하더라.\" B: \"우리 형입니다, 신사숙녀 여러분.\"',
      context: 'Nora Bing has just explained to the group exactly how she writes her bestselling romance novels — the formula involves European cities and thirty euphemisms for male anatomy. Chandler can only respond with this perfect deadpan caption. The more outrageous his mother\'s behaviour, the fewer words he has.',
      context_ko: '노라 빙이 친구들에게 자신의 베스트셀러 로맨스 소설을 어떻게 쓰는지 정확히 설명한 직후 — 공식은 유럽 도시들과 남성 해부학의 완곡 표현 30가지를 포함합니다. 찬들러는 이 완벽한 무표정한 자막으로만 반응할 수 있습니다. 어머니의 행동이 더 황당할수록 그에게는 단어가 더 적어집니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X3'
    },
    {
      phrase: 'Shh. I\'m busy beaming with pride.',
      partOfSpeech: 'expression',      speaker: 'Chandler',

      meaning: '"Beaming with pride" means radiating happiness and deep satisfaction about someone\'s achievement — your face is literally "beaming" (shining). The joke is that Chandler says this sarcastically: his mother has just been arrested in London, and he is pretending to be proud of her as a way of coping with embarrassment.',
      meaning_ko: '"Beaming with pride"는 누군가의 성취에 대한 행복과 깊은 만족감을 발산하다는 뜻으로, 당신의 얼굴이 문자 그대로 "beaming(빛나고)" 있는 것입니다. 웃음 포인트는 찬들러가 이것을 빈정대며 말한다는 것입니다: 어머니가 방금 런던에서 체포됐는데, 그는 창피함을 대처하는 방법으로 자랑스러운 척합니다.',
      example: 'A: "Did you see what your brother just did?" B: "Shh. I\'m busy beaming with pride."',
      example_ko: 'A: "네 남동생이 방금 한 짓 봤어?" B: "쉿. 지금 자랑스러움으로 빛나는 중이야."',
      context: 'The group is watching a late-night TV interview with Chandler\'s mother Nora Bing, who casually mentions being arrested in London. Chandler\'s deadpan "Shh, I\'m busy beaming with pride" perfectly encapsulates his resigned, ironic relationship with his outrageous mother.',
      context_ko: '친구들이 찬들러의 어머니 노라 빙의 심야 TV 인터뷰를 보는 장면. 노라는 런던에서 체포된 것을 아무렇지 않게 언급합니다. 찬들러의 무표정한 "쉿, 지금 자랑스러움으로 빛나는 중이야"가 황당한 어머니에 대한 그의 체념적이고 아이러니한 관계를 완벽하게 요약합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X4'
    },
    {
      phrase: 'I wish all guys could be like him.',
      partOfSpeech: 'expression',
      speaker: 'Phoebe',
      meaning: '"I wish [subject] could be like [person]" is a wishing structure (subjunctive mood) expressing a desire for reality to match an ideal — comparing what exists to a preferred alternative. It is one of the most common ways English speakers express longing for change by holding up a specific example. The irony here is that the ideal man they are comparing everyone to is entirely unconscious.',
      meaning_ko: '"I wish [주어] could be like [사람]"은 현실이 이상에 맞기를 바라는 소원 구조(가정법)입니다 — 현재 상황을 선호하는 대안과 비교합니다. 영어 화자들이 구체적인 예시를 들어 변화에 대한 갈망을 표현하는 가장 흔한 방법 중 하나입니다. 여기서의 아이러니는 그들이 모든 남자와 비교하는 이상적인 남자가 완전히 의식이 없다는 것입니다.',
      example: 'A: \"He actually listened without interrupting once.\" B: \"I wish all guys could be like him.\"',
      example_ko: 'A: \"그 사람 한 번도 끼어들지 않고 다 들어줬어.\" B: \"모든 남자가 그 사람 같으면 좋겠어.\"',
      context: 'Phoebe and Monica have been visiting the coma man in hospital, cataloguing his perfect qualities — patient, present, attentive, never judgemental. The comedy is that every quality they admire exists precisely because he is unconscious. This line is the peak of their romantic idealisation of a man they have never actually spoken to.',
      context_ko: '피비와 모니카가 혼수상태의 남자를 병원에서 방문하며 그의 완벽한 자질들을 목록화하는 장면 — 인내심 있고, 곁에 있고, 주의 깊고, 절대 비판하지 않습니다. 코미디는 그들이 감탄하는 모든 자질이 정확히 그가 의식이 없기 때문에 존재한다는 것입니다. 이 대사는 한 번도 실제로 대화해본 적 없는 남자에 대한 낭만적 이상화의 절정입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X5'
    },
    {
      phrase: 'I\'m not really a shot-drinking kind of guy.',
      partOfSpeech: 'expression',      speaker: 'Ross',

      meaning: '"A shot" is a small glass of spirits — typically vodka, tequila, or whiskey — drunk quickly in one gulp. "A shot-drinking kind of guy" describes a certain personality type: someone who is adventurous, uninhibited, and comfortable with bold social rituals. Ross\'s reluctance to be that person is immediately overcome when Nora Bing arrives.',
      meaning_ko: '"A shot"은 보통 보드카, 테킬라, 또는 위스키 같은 증류주를 작은 잔에 담아 한 번에 빨리 마시는 것입니다. "A shot-drinking kind of guy"는 특정 성격 유형을 묘사합니다: 모험적이고 거리낌 없으며 대담한 사교 의식에 편안한 사람. 노라 빙이 도착하자마자 로스의 망설임은 즉시 극복됩니다.',
      example: 'A: "Come on, just do one." B: "I\'m not really a shot-drinking kind of guy." A: "Neither am I. Cheers."',
      example_ko: 'A: "어서, 하나만 해봐." B: "나 그런 원샷 타입이 아니야." A: "나도 그래. 건배."',
      context: 'When Nora Bing orders tequila shots for the table, Ross politely declines by identifying as "not a shot-drinking kind of guy." The fact that he immediately follows this by doing a shot after she flatters him is a perfect small character moment — Ross\'s principles are easily overcome by a glamorous woman\'s attention.',
      context_ko: '노라 빙이 테이블에 테킬라 샷을 주문할 때 로스가 "원샷 타입이 아니다"라며 공손하게 거절하는 장면. 그녀가 그를 추켜세우자 즉시 샷을 하는 것이 완벽한 작은 캐릭터 순간입니다 — 로스의 원칙은 화려한 여성의 관심으로 쉽게 극복됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X6'
    },
    {
      phrase: 'You broke the code.',
      partOfSpeech: 'expression',      speaker: 'Joey',

      meaning: '"The code" here refers to an unwritten, informal set of rules that govern acceptable behaviour between friends — in this case, the rule that you never kiss a friend\'s mother. "Breaking the code" means violating these sacred, unspoken social agreements. It is more serious than breaking a rule because codes are based on trust and loyalty.',
      meaning_ko: '여기서 "the code"는 친구들 사이에서 허용 가능한 행동을 지배하는 성문화되지 않은 비공식적인 규칙 모음을 말합니다 — 이 경우 친구의 어머니에게 절대 키스하지 않는다는 규칙. "Breaking the code"는 이러한 신성하고 암묵적인 사회적 합의를 위반하는 것을 의미합니다. 코드는 신뢰와 충성에 기반하기 때문에 규칙을 어기는 것보다 더 심각합니다.',
      example: 'A: "I asked out his ex-girlfriend." B: "Dude, you broke the code. You don\'t do that."',
      example_ko: 'A: "그 친구 전 여자친구한테 고백했어." B: "야, 코드 어겼잖아. 그러면 안 되는 거야."',
      context: 'Joey confronts Ross after discovering he kissed Chandler\'s mother. Joey lays out the unofficial rules with great moral authority: "You don\'t kiss your friend\'s mom. Sisters are okay. Maybe a hot-looking aunt. But not a mom. Never a mom." The absurdity of the specific rule hierarchy makes it funnier.',
      context_ko: '조이가 로스가 찬들러의 어머니에게 키스했다는 것을 알고 그를 추궁하는 장면. 조이는 큰 도덕적 권위로 비공식 규칙을 설명합니다: "친구 엄마한테 키스하면 안 돼. 누나는 괜찮아. 섹시한 고모도 어쩌면. 근데 엄마는 안 돼. 절대 엄마는."  구체적인 규칙 계층 구조의 황당함이 더 웃깁니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X7'
    },
    {
      phrase: 'Knowledge is a tricky thing.',
      partOfSpeech: 'expression',      speaker: 'Joey',

      meaning: 'A deliberately vague, philosophical-sounding deflection — Joey\'s way of avoiding a direct answer about whether he knew about the kiss. "Tricky" means complicated, slippery, or difficult to handle. By calling knowledge "tricky," Joey implies that what you know and what you\'re obligated to share are two different things — a philosophical dodge dressed up as wisdom.',
      meaning_ko: '의도적으로 모호하고 철학적으로 들리는 회피 — 조이가 키스에 대해 알고 있었는지에 대한 직접적인 대답을 피하는 방식입니다. "Tricky"는 복잡하거나 미끄럽거나 다루기 어렵다는 뜻입니다. 지식을 "tricky"하다고 부름으로써 조이는 아는 것과 공유해야 할 의무가 있는 것은 두 가지 다른 것임을 내비칩니다 — 지혜로 포장된 철학적 회피입니다.',
      example: 'A: "Did you know about this the whole time?" B: "Knowledge is a tricky thing. I\'m not sure I can say I truly \'knew.\'&quot;',
      example_ko: 'A: "내내 이걸 알고 있었어?" B: "지식이라는 건 까다로운 거야. 내가 진정으로 \'알았다\'고 말할 수 있을지 모르겠어."',
      context: 'When Chandler furiously asks Joey whether he knew about Ross kissing his mother, Joey\'s response — "You know, knowledge is a tricky thing" — is one of the episode\'s best lines. It is simultaneously evasive, absurd, and somehow sounds like it could be wise. Chandler sees through it immediately.',
      context_ko: '찬들러가 로스가 어머니에게 키스한 것에 대해 알고 있었냐고 화를 내며 조이에게 묻는 장면. 조이의 반응 — "있잖아, 지식이라는 건 까다로운 거야" — 은 에피소드 최고의 대사 중 하나입니다. 동시에 회피적이고, 황당하고, 어쩐지 지혜롭게 들립니다. 찬들러는 즉시 알아챕니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X8'
    },
    {
      phrase: 'What the hell were you thinking?',
      partOfSpeech: 'expression',
      speaker: 'Chandler',
      meaning: 'A strong rhetorical question expressing shock, disbelief, and anger at someone\'s decision. \"What were you thinking?\" is the base form; \"the hell\" is an intensifier that sharpens and amplifies the question. It does not expect a logical answer — it expresses that the speaker believes there was no reasonable thinking behind the action at all.',
      meaning_ko: '누군가의 결정에 대한 충격, 불신, 분노를 표현하는 강한 수사적 질문입니다. \"What were you thinking?\"이 기본 형태이고, \"the hell\"이 질문을 더 날카롭고 강하게 만드는 강조어입니다. 논리적인 답을 실제로 기대하지 않습니다 — 화자가 그 행동 뒤에 전혀 합리적인 생각이 없었다고 믿는다는 것을 표현합니다.',
      example: 'A: \"I told him exactly what I thought of his management style.\" B: \"What the hell were you thinking? He\'s your boss.\"',

      context: 'Chandler confronts Ross directly after discovering the kiss with his mother. The question goes beyond the act — Chandler genuinely cannot comprehend any reasoning that would lead Ross there. It captures the raw combination of fury and disbelief that defines the whole confrontation scene.',

    {
      phrase: 'Let me slam the door.',
      partOfSpeech: 'expression',      speaker: 'Chandler',

      meaning: 'Slamming a door is a universally understood physical expression of anger — a loud, forceful closing that communicates fury or frustration without words. "Let me slam the door" is Chandler\'s request to be allowed to perform this emotional ritual, which is both funny and oddly dignified: he\'s asking permission for a tantrum.',
      meaning_ko: '문을 쾅 닫는 것은 분노를 보편적으로 이해되는 신체적 표현입니다 — 말 없이 격노나 좌절을 전달하는 시끄럽고 강력한 닫음. "Let me slam the door"는 이 감정적 의식을 수행하도록 허락해달라는 찬들러의 요청으로, 웃기면서도 묘하게 품위 있습니다: 그는 발끈하는 것에 대한 허락을 구하고 있습니다.',
      example: 'A: "Are you okay?" B: "Just— let me slam the door once. Then I\'ll be fine."',

      context: 'In the middle of his furious confrontation with Ross, Chandler suddenly remembers he needs to express his anger physically and asks to be allowed to slam the door. The fact that he politely asks permission for it — and that Joey steps aside respectfully — makes it one of the episode\'s funniest beats.',
      context_ko: '로스와의 격렬한 대치 중간에 찬들러가 갑자기 분노를 신체적으로 표현해야 한다는 것을 떠올리며 문을 쾅 닫게 해달라고 요청하는 장면. 그가 예의 바르게 허락을 구하고 — 그리고 조이가 정중하게 비켜서는 것 — 이 에피소드에서 가장 웃긴 순간 중 하나가 됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X10'

    {
      phrase: 'Why did I woo-hoo?',
      partOfSpeech: 'expression',
      speaker: 'Monica',
      meaning: '"Why did I [verb]?" is a rhetorical self-questioning structure used immediately after an impulsive action — the speaker interrogates their own behaviour, already knowing there was no good reason. \"Woo-hoo\" is a vocal exclamation of excitement or enthusiasm, typically shouted. Monica is dissecting her own split-second impulse with horrified clarity after the consequences become clear.',
      meaning_ko: '"Why did I [동사]?"는 충동적인 행동 직후 사용하는 수사적 자기 질문 구조입니다 — 이미 좋은 이유가 없었다는 것을 알면서도 자신의 행동을 스스로 심문하는 것입니다. \"Woo-hoo\"는 흥분이나 열정의 외침으로 보통 크게 소리칩니다. 모니카는 결과가 명확해진 후 공포에 질려 자신의 순간적인 충동을 해부하고 있습니다.',
      example: 'A: \"Why did you say yes to all four committees at once?\" B: \"I don\'t know! Why did I do that?\"',

      context: 'Monica has just wolf-whistled at an extremely attractive man on the street — and he immediately stepped into the road and was hit by a car. Her stunned, horrified self-reflection perfectly captures the universal experience of acting on a split-second impulse and instantly watching the consequences unfold.',
      context_ko: '모니카가 거리에서 매우 매력적인 남성에게 막 휘파람을 불었는데 — 그가 즉시 차도로 걸어 나가 차에 치이는 장면. 충격받고 공포에 질린 자기 성찰이 순간적인 충동에 따라 행동하고 즉시 결과가 펼쳐지는 것을 지켜보는 보편적인 경험을 완벽하게 포착합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X11'

    {

      partOfSpeech: 'expression',      speaker: 'Phoebe',

      meaning: '"You were different" means we believed you had special qualities others lack. "It was just the coma" is the punchline — the reason he seemed so perfect (attentive, non-judgmental, always there) was simply that he was unconscious. It is a perfect joke because it makes the women\'s fantasy both understandable and completely absurd.',
      meaning_ko: '"You were different"는 당신이 다른 사람들에게 없는 특별한 자질을 가지고 있다고 믿었다는 뜻입니다. "It was just the coma"가 펀치라인입니다 — 그가 그렇게 완벽해 보였던 이유(주의 깊고, 비판하지 않고, 항상 거기 있는)는 단순히 그가 의식이 없었기 때문입니다. 여성들의 환상을 이해 가능하면서도 완전히 황당하게 만드는 완벽한 농담입니다.',

      context: 'Phoebe delivers this exit line as she and Monica leave the hospital room after the man is dismissive. It is the perfect button on the episode\'s coma subplot — the reason the man seemed ideal for them was the exact reason he was unavailable: he was in a coma.',
      context_ko: '피비가 남자가 무뚝뚝하게 대한 후 그녀와 모니카가 병실을 떠나면서 이 퇴장 대사를 하는 장면. 에피소드의 혼수상태 서브플롯의 완벽한 마무리입니다 — 남자가 그들에게 이상적으로 보였던 이유가 정확히 그가 접근 불가능했던 이유였습니다: 혼수상태에 있었으니까요.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X12'

      meaning_ko: '침묵을 통한 신뢰 배신에 대한 날카로운 불평 — 적극적으로 거짓말을 하는 것이 아니라, 상대방이 들어야 한다는 것을 알면서도 정보를 공개하지 않기로 선택하는 것. "하루 종일"을 강조하는 것이 누락을 더 나쁘게 느끼게 합니다: 진실을 말할 수 있는 기회가 셀 수 없이 많았는데, 아무것도 활용되지 않았습니다.',

      context: 'Chandler confronts Joey after discovering that Joey knew about the kiss and said nothing all day. For Chandler, the silence is almost worse than the act itself — Joey had every chance to give him the information he deserved and chose not to.',
      context_ko: '찬들러가 조이가 키스에 대해 알면서 하루 종일 아무 말도 하지 않았다는 것을 알고 나서 조이를 추궁하는 장면. 찬들러에게 침묵은 행위 자체보다 거의 더 나쁩니다 — 조이는 자신이 알아야 할 정보를 줄 기회가 충분히 있었는데 그러지 않기로 선택했습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X13'

    {
      phrase: 'When are you gonna grow up and start being a mom?',
      partOfSpeech: 'expression',      speaker: 'Chandler',

      meaning: '"Grow up" literally means to become more mature — to stop acting childishly and take on adult responsibilities. Asking an adult "when are you gonna grow up?" is a pointed criticism that they have failed to behave with the maturity their age and role demand. Coming from a son to his mother, it is both a rebuke and a cry for the parenting he never received.',
      meaning_ko: '"Grow up"은 문자 그대로 더 성숙해진다는 뜻입니다 — 유치하게 행동하는 것을 멈추고 어른으로서의 책임을 지는 것. 어른에게 "언제 철들래?"라고 묻는 것은 그들이 나이와 역할이 요구하는 성숙함으로 행동하는 데 실패했다는 날카로운 비판입니다. 아들이 어머니에게 하는 것은 질책이자 그가 받지 못했던 부모의 사랑에 대한 외침입니다.',
      example: 'A: "He still relies on everyone else to sort out his problems." B: "When is he gonna grow up and start taking responsibility?"',
      example_ko: 'A: "그 사람은 아직도 모든 문제를 다른 사람이 해결해주기를 기대하더라." B: "언제 철들고 책임지기 시작할 거야?"',
      context: 'This is the emotional climax of the episode — Chandler finally confronts his mother about a lifetime of inappropriate, embarrassing behaviour. The fact that Ross\'s accidental kiss with Nora catalysed this confrontation is what makes the kiss plot ultimately meaningful rather than just comic.',
      context_ko: '에피소드의 감정적 클라이맥스입니다 — 찬들러가 마침내 어머니에게 평생 동안의 부적절하고 창피스러운 행동에 대해 맞서는 장면. 로스의 우연한 노라와의 키스가 이 대립을 촉발시켰다는 사실이 키스 플롯을 단순한 코미디가 아닌 궁극적으로 의미 있는 것으로 만듭니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E11X14'

      meaning_ko: '자신을 \"scum\"이라고 부르는 것은 도덕적으로 잘못하거나 사회적으로 용납되지 않는 일을 했다는 자기 비하적 인정입니다 — scum은 경멸스럽거나 가치 없는 사람을 강하게 부정적으로 표현하는 단어입니다. \"Okay\"는 극적이지 않게 체념적으로 인정을 시작합니다. 발언을 반복하는 것은 화자가 출구를 찾지 않고 진정으로 판단을 받아들인다는 것을 보여줍니다.',

      context: 'Ross has to face what he did — kissing Chandler\'s mother while drunk and upset. When Joey confronts him, there is no defence and no justification he can offer. His resigned, repeated self-verdict is both a genuine admission and a kind of rueful dignity: he knows exactly what he is in this moment and isn\'t pretending otherwise.',

  var S_NUM = 1;
  var E_NUM = 11;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        if (x.speaker) html += '<div class="expr-speaker">&#127939; ' + escHtml(x.speaker) + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
