<script>
  var EP_DATA = {
    available: true,
    title: 'The One with George Stephanopoulos',
    description: 'The guys get front-row hockey tickets. The girls have a slumber party.',
    expressions: [
    {
      phrase: 'Maybe it will take my mind off it.',
      partOfSpeech: 'expression',
      meaning: 'To "take your mind off" something means to distract yourself from a worry, grief, or problem — to fill your thoughts with something else so the pain temporarily fades. It is one of the most natural and common ways English speakers express the desire for distraction.',
      meaning_ko: '무언가로 "take your mind off"한다는 것은 걱정, 슬픔, 또는 문제에서 스스로를 분산시킨다는 뜻입니다 — 고통이 일시적으로 희미해지도록 다른 것으로 생각을 채우는 것. 영어 화자들이 기분 전환에 대한 바람을 표현하는 가장 자연스럽고 흔한 방법 중 하나입니다.',
      example: 'A: "I\'ve been thinking about it all day." B: "Let\'s go out. Maybe it will take your mind off it."',
      example_ko: 'A: "하루 종일 그 생각만 했어." B: "나가자. 잠깐 잊게 도와줄 거야."',
      context: 'After Ross realises today is the anniversary of his first time with Carol, he initially refuses the hockey tickets. Chandler and Joey keep nudging him until he finally gives in with this honest admission — he hopes a night of hockey will drown out the heartbreak, even temporarily.',
      context_ko: '로스가 오늘이 캐롤과의 첫날 기념일임을 깨달은 후 처음에는 하키 티켓을 거절하는 장면. 찬들러와 조이가 계속 달래자 결국 이 솔직한 인정과 함께 마음을 바꿉니다 — 하키가 임시로라도 마음의 상처를 잊게 해주기를 바라는 것입니다.',
      youtubeUrl: 'https://youtu.be/2UvxsDgQSTM'
    },
    {
      phrase: 'Aren\'t we Mr. The-Glass-is-Half-Empty?',
      partOfSpeech: 'expression',
      meaning: '"The glass is half empty" describes seeing the negative side of a situation — focusing on what\'s missing rather than what\'s there. Its opposite, "the glass is half full," is the optimistic view. "Aren\'t we Mr. [adjective]?" is sarcastic mock-formal language for calling out someone\'s negative attitude — a title that gently ridicules their outlook.',
      meaning_ko: '"The glass is half empty"는 상황의 부정적인 면, 즉 있는 것보다 없는 것에 집중하는 것을 묘사합니다. 반대인 "the glass is half full"은 낙관적인 시각입니다. "Aren\'t we Mr. [형용사]?"는 누군가의 부정적인 태도를 꼬집기 위한 빈정대는 가짜 격식 언어로, 그들의 시각을 가볍게 조롱하는 칭호입니다.',
      example: 'A: "This plan will probably fail anyway." B: "Aren\'t we Mr. The-Glass-is-Half-Empty today."',
      example_ko: 'A: "이 계획은 어차피 실패할 거야." B: "오늘 정말 유리잔이 반이나 비어있는 씨네."',
      context: 'When Chandler and Joey present Ross with front-row Rangers tickets, Ross immediately sees through it — they had a spare ticket and couldn\'t decide who got to bring a date. Chandler fires back with this line. Ross\'s spot-on insight makes the sarcasm even funnier.',
      context_ko: '찬들러와 조이가 로스에게 레인저스 앞자리 티켓을 건네자 로스는 즉시 진짜 이유를 꿰뚫어 봅니다 — 티켓이 하나 남아 누가 데이트 상대를 데려갈지 결정을 못 한 것. 찬들러가 이 대사로 반격합니다. 로스의 정확한 통찰이 비꼼을 더 웃기게 만듭니다.',
      youtubeUrl: 'https://youtu.be/Xk6BQQ-A13I'
    },
    {
      phrase: 'If I were omnipotent for a day, I\'d make myself omnipotent forever.',
      partOfSpeech: 'expression',
      meaning: '"Omnipotent" means having unlimited, all-powerful ability — the ability to do anything. The episode opens with the group asking each other: "What would you do if you were omnipotent for a day?" Chandler\'s answer exploits the loophole to be omnipotent forever — the kind of clever, rule-bending logic that defines his character.',
      meaning_ko: '"Omnipotent"는 무한하고 전능한 능력, 즉 무엇이든 할 수 있는 능력을 의미합니다. 에피소드는 친구들이 서로에게 "하루 동안 전능하다면 무엇을 하겠어?"라고 묻는 장면으로 시작합니다. 찬들러의 대답은 허점을 이용해 영원히 전능해지는 것으로, 그의 캐릭터를 정의하는 영리하고 규칙을 비트는 논리입니다.',
      example: 'A: "If you could have one superpower for a day, what would it be?" B: "If I were omnipotent for a day, I\'d make myself omnipotent forever."',
      example_ko: 'A: "하루 동안 슈퍼파워 하나를 가질 수 있다면 뭐로 할 거야?" B: "하루 동안 전능하다면 영원히 전능하게 만들 거야."',
      context: 'The classic Central Perk opening game. Phoebe wants world peace and bigger boobs; Monica\'s answer was taken. Then Chandler delivers this line, and Ross immediately identifies the type: "See, there\'s always one guy." It perfectly captures the Chandler tendency to find the clever workaround.',
      context_ko: '센트럴 퍼크에서의 고전적인 오프닝 게임. 피비는 세계 평화와 더 큰 가슴을 원하고, 모니카의 답은 빼앗겼습니다. 찬들러가 이 대사를 날리고 로스가 즉시 그 유형을 파악합니다: "봐봐, 항상 이런 사람 한 명은 있다니까." 영리한 허점을 찾는 찬들러의 성향을 완벽하게 포착합니다.',
      youtubeUrl: 'https://youtu.be/sccJSBbL0MY'
    },
    {
      phrase: 'You\'re not the only one. We don\'t know where we\'re going.',
      partOfSpeech: 'expression',
      meaning: '"You\'re not the only one" is one of the most comforting things you can say — you are not alone in your struggle, others share it too. It immediately reduces isolation. Monica then admits the whole group is figuring things out, transforming the slumber party into a genuine moment of collective honesty.',
      meaning_ko: '"You\'re not the only one"은 당신이 힘든 상황에서 혼자가 아니라는, 다른 사람들도 같은 상황이라는 가장 위로가 되는 말 중 하나입니다. 즉각적으로 고립감을 줄여줍니다. 모니카는 그룹 전체가 답을 찾아가고 있다고 인정하며, 슬럼버 파티를 진정한 집단적 솔직함의 순간으로 변환시킵니다.',
      example: 'A: "I feel like I\'m the only one who doesn\'t have it together." B: "You\'re not the only one. None of us know where we\'re going."',
      example_ko: 'A: "나만 아직 갈 길을 못 잡은 것 같아." B: "너만 그런 게 아니야. 우리 중 아무도 어디로 가는지 진짜로 알지 못해."',
      context: 'After Rachel\'s doubts spill over, Monica gives this response — and then Phoebe invents the word "unflupie" for when it eventually comes together. The moment turns from anxiety into genuine warmth between the three of them.',
      context_ko: '레이철의 불안감이 넘쳐흐른 후 모니카가 이렇게 답하는 장면 — 그러자 피비가 결국 잘 될 때를 위한 단어 "unflupie"를 만들어냅니다. 이 순간이 불안에서 세 사람 사이의 진정한 따뜻함으로 전환됩니다.',
      youtubeUrl: 'https://youtu.be/La12nt8Gldk'
    },
    {
      phrase: 'There\'s been unusual activity on your account.',
      partOfSpeech: 'expression',
      meaning: 'A standard phrase used by banks or credit card companies when they detect transactions that differ from your normal spending pattern — whether suspicious fraud activity, or in this case, the total absence of any spending at all. "Unusual activity" is deliberately neutral: it can mean too much or too little.',
      meaning_ko: '은행이나 신용카드 회사가 정상적인 소비 패턴과 다른 거래를 감지했을 때 쓰는 표준 표현입니다 — 사기를 암시하는 의심스러운 활동이거나, 이 경우에는 소비가 전혀 없다는 것. "Unusual activity"는 의도적으로 중립적인 표현으로 너무 많거나 너무 없음 둘 다를 의미할 수 있습니다.',
      example: 'A: "The bank called me today." B: "What for?" A: "They said there\'s been unusual activity on my account. I just haven\'t used it in a while."',
      example_ko: 'A: "오늘 은행에서 전화가 왔어." B: "왜?" A: "계좌에 비정상적인 활동이 있었다고 하더라고. 그냥 한동안 안 썼을 뿐인데."',
      context: 'The Visa company calls Rachel because she hasn\'t used her card in weeks — and not using it is the "unusual activity." Monica relays this to Rachel, who launches into her famous monologue about FICA, her friends being promoted and pregnant, and ending with: "And I\'m getting coffee. And it\'s not even for me."',
      context_ko: '레이철이 몇 주 동안 신용카드를 쓰지 않아서 비자 회사가 전화하는 장면 — 카드를 쓰지 않는 것이 "비정상적인 활동"입니다. 모니카가 레이철에게 전달하고, 레이철은 FICA, 친구들의 승진과 임신에 대한 유명한 독백을 시작하며 "나는 커피나 가져다주고 있어. 심지어 내 것도 아닌 커피를"로 끝납니다.',
      youtubeUrl: 'https://youtu.be/szxOVsZJAoY'
    },
    {
      phrase: 'I don\'t have a plan.',
      partOfSpeech: 'expression',
      meaning: 'A simple, raw admission that someone has no clear direction or strategy for their life. It sounds like defeat — but in this moment it is also liberation. Rachel stops pretending she has it all figured out. The beauty is the brevity: three words that say everything about where she is emotionally.',
      meaning_ko: '누군가가 삶에 명확한 방향이나 전략이 없다는 단순하고 날것의 인정입니다. 패배처럼 들리지만 — 이 순간에는 해방이기도 합니다. 레이철이 모든 것을 파악한 척하기를 멈춥니다. 아름다움은 간결함에 있습니다: 세 단어가 그녀의 감정적 위치에 대한 모든 것을 말합니다.',
      example: 'A: "So what\'s the plan?" B: "Honestly? I don\'t have a plan. And for once, maybe that\'s okay."',
      example_ko: 'A: "그래서 계획이 뭐야?" B: "솔직히? 계획이 없어. 그리고 처음으로, 어쩌면 그게 괜찮을 수도 있어."',
      context: 'After her outburst about FICA, after the magic beans conversation, after a night spying on George Stephanopoulos, Rachel sits quietly with Monica and Phoebe and says this. The episode\'s emotional resolution: she stops fighting the uncertainty and accepts it.',
      context_ko: 'FICA에 대한 폭발 후, 마법 콩 대화 후, 조지 스테파노풀로스를 엿보는 밤을 보낸 후 레이철이 모니카와 피비와 조용히 앉아서 이 말을 하는 장면. 에피소드의 감정적 해결: 그녀가 불확실성과 싸우기를 멈추고 받아들입니다.',
      youtubeUrl: 'https://youtu.be/FzhlNpI5cKU'
    },
    {
      phrase: 'You are just like Jack.',
      partOfSpeech: 'expression',
      meaning: 'Comparing someone to a well-known character — here Jack from Jack and the Beanstalk — to illustrate their situation. "You are just like [person]" draws a parallel between the listener\'s circumstances and a familiar story. Phoebe uses the fairy tale as a metaphor: Rachel gave up a safe, predictable life for something unknown but full of magic potential.',
      meaning_ko: '누군가의 상황을 설명하기 위해 잘 알려진 캐릭터 — 여기서는 잭과 콩나무의 잭 — 와 비교하는 것. "You are just like [사람]"은 듣는 사람의 상황과 친숙한 이야기 사이의 유사성을 이끌어냅니다. 피비는 동화를 비유로 사용합니다: 레이철이 안전하고 예측 가능한 삶을 포기하고 알 수 없지만 마법 같은 잠재력으로 가득 찬 것을 선택했다는 것.',
      example: 'A: "I left my stable job for this startup with no guarantees." B: "You\'re just like Jack — traded the cow for the magic beans."',
      example_ko: 'A: "보장도 없는 스타트업 위해 안정적인 직장을 그만뒀어." B: "잭이랑 똑같네 — 소 대신 마법 콩을 선택한 거잖아."',
      context: 'Rachel laments giving up her plan — her engagement, her old life — and not knowing what she has to show for it. Phoebe\'s Jack and the Beanstalk analogy is warmly optimistic: "He gave up a cow, and you gave up an orthodontist... he lived in a village, and you live in the Village."',
      context_ko: '레이철이 자신의 계획 — 약혼, 예전 삶 — 을 포기한 것을 한탄하며 그 대가로 뭘 얻었는지 모르겠다고 하는 장면. 피비의 잭과 콩나무 비유는 따뜻하게 낙관적입니다: "그는 소를 포기했고, 너는 교정의를 포기했어... 그는 마을에 살았고, 너는 빌리지에 살잖아."',
      youtubeUrl: 'https://youtu.be/RB9Y7GMZk1k'
    },
    {
      phrase: 'Hello? Who are we spying on?',
      partOfSpeech: 'expression',
      meaning: '"Spying on" someone means secretly watching them, usually without their knowledge or permission. Saying "Hello?" before a question is a casual way of demanding attention or cutting into a conversation — similar to saying "Excuse me" or "Wait." Joey uses it here to insert himself into an activity that sounds far too entertaining to be left out of.',
      meaning_ko: '누군가를 "spy on"한다는 것은 그들이 모르거나 허락하지 않은 상태에서 몰래 지켜보는 것을 의미합니다. 질문 앞에 "Hello?"를 붙이는 것은 주의를 끌거나 대화에 끼어들고 싶을 때 쓰는 캐주얼한 방법으로, "Excuse me" 또는 "Wait"와 비슷합니다. 조이는 너무 재미있어 보이는 활동에서 자신만 빠지고 싶지 않아서 이 표현을 씁니다.',
      example: 'A: "We\'ve been watching the new neighbours move in for an hour." B: "Hello? Who are we spying on? I want in."',
      example_ko: 'A: "새 이웃이 이사 오는 거 한 시간째 보고 있어." B: "야, 누구 감시하는 거야? 나도 끼워줘."',
      context: 'Joey and Ross arrive at Monica\'s apartment to find the girls huddled around the telescope, completely absorbed in watching George Stephanopoulos\' apartment across the street. Joey\'s blunt, eager question perfectly captures his instinct to immediately join in on anything that looks like fun, no explanation needed first.',
      context_ko: '조이와 로스가 모니카의 아파트에 도착해 여자들이 망원경 주위에 모여 길 건너 조지 스테파노풀로스의 아파트를 완전히 몰입해서 보고 있는 것을 발견하는 장면. 조이의 직설적이고 적극적인 질문은 재미있어 보이는 것이라면 설명을 듣기도 전에 바로 끼고 싶어하는 그의 본능을 완벽하게 포착합니다.',
      youtubeUrl: 'https://youtu.be/abzFWQRwrdM'
    },
    {
      phrase: 'Who\'s FICA? Why\'s he getting all my money?',
      partOfSpeech: 'expression',
      meaning: 'FICA stands for the Federal Insurance Contributions Act — the US payroll tax funding Social Security and Medicare, automatically deducted from every paycheck. Rachel\'s confusion is funny because she treats the deduction like a mysterious person named "FICA" stealing her money. It captures the shock of seeing your first real paycheck after taxes.',
      meaning_ko: 'FICA는 Federal Insurance Contributions Act(연방보험기여법)의 약자로, 소셜 시큐리티와 메디케어를 위한 미국 급여세로 모든 급여에서 자동으로 공제됩니다. 레이철의 혼란이 웃긴 것은 세금 공제를 "FICA"라는 이름의 수상한 사람이 돈을 훔쳐가는 것처럼 취급하기 때문입니다. 세금 공제 후 첫 진짜 급여를 받는 충격을 포착합니다.',
      example: 'A: "My paycheck was way less than expected." B: "Welcome to the real world. Who\'s FICA? He gets all of us."',
      example_ko: 'A: "월급이 생각보다 훨씬 적게 나왔어." B: "현실 세계에 온 걸 환영해. FICA? 우리 모두한테서 가져가."',
      context: 'Rachel opens her first paycheck at Central Perk and is horrified at how little remains after deductions. "I wiped tables for it. I steamed milk for it. And it was totally... not worth it." The dismay of realising that working hard and keeping your paycheck are two very different things is universally relatable.',
      context_ko: '레이철이 센트럴 퍼크에서 받은 첫 급여 봉투를 열어보고 공제 후 남은 금액에 경악하는 장면. "테이블을 닦았잖아. 우유도 스팀했잖아. 근데 완전히... 그럴 가치가 없었어." 열심히 일하는 것과 급여를 받는 것이 전혀 다른 두 가지라는 것을 깨닫는 당황스러움은 누구에게나 공감됩니다.',
      youtubeUrl: 'https://youtu.be/RKbMpixTQco'
    },
    {
      phrase: 'That\'s all you need, a bunch of toothless guys hitting each other with sticks.',
      partOfSpeech: 'expression',
      meaning: '"That\'s all you need" is deeply sarcastic — it means the exact opposite of what it says. Rather than being something genuinely needed, it\'s something pointless or unpleasant. Ross delivers this while still in emotional pain, grudgingly watching hockey and unwilling to admit he is actually beginning to enjoy it.',
      meaning_ko: '"That\'s all you need"는 깊이 빈정대는 표현으로, 말하는 것과 정반대의 의미입니다. 진짜 필요한 것이 아니라 무의미하거나 불쾌한 것을 뜻합니다. 로스는 여전히 감정적 아픔 속에 있으면서 마지못해 하키를 보며 실제로 즐기기 시작하고 있다는 것을 인정하기 싫어하며 이 말을 합니다.',
      example: 'A: "Let\'s watch the game." B: "Oh great, that\'s all you need — grown men chasing a ball for two hours."',
      example_ko: 'A: "경기 보자." B: "잘됐다, 딱 필요한 게 그거지 — 어른들이 두 시간 동안 공 쫓는 거."',
      context: 'Ross grudgingly sits at the hockey game while still mourning the anniversary. His sarcastic commentary on the sport gradually erodes as the game pulls him in — and Chandler and Joey\'s patient "come on, admit it" campaign eventually pays off.',

      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X10'

    {
      phrase: 'We\'ve got George Stephanopoulos\' pizza.',
      partOfSpeech: 'expression',

      meaning_ko: '조지 스테파노풀로스는 빌 클린턴의 백악관 공보국장으로, 지성, 잘생긴 외모, 미디어 존재감으로 유명한 실제 유명 정치인입니다. 피자 실수로 그가 길 건너에 산다는 것이 밝혀지고, 이것이 여자들에게 완벽한 기분 전환이 됩니다. 흥분은 전적으로 유명인 가까이에 있다는 화려함에 관한 것입니다.',
      example: 'A: "Why is everyone suddenly so excited?" B: "The delivery guy mixed up the orders. We\'ve got the famous neighbour\'s pizza."',

      context: 'The pizza deliveryman arrives at Monica\'s apartment with the wrong order — it belongs to G. Stephanopoulos across the street. This discovery transforms the slumber party. Within minutes the girls have the telescope out, watching his window and narrating everything they see.',
      context_ko: '피자 배달부가 모니카 아파트에 잘못된 주문을 들고 오는 장면 — 길 건너 G. 스테파노풀로스의 것입니다. 이 발견이 슬럼버 파티를 완전히 바꿉니다. 몇 분 안에 여자들은 망원경을 꺼내 그의 창문을 보며 보이는 것들을 중계합니다.',

    {
      phrase: 'What if all we\'ve got are beans?',
      partOfSpeech: 'expression',
      meaning: 'A riff on the Jack and the Beanstalk metaphor — if "magic beans" represent hope and transformation, "regular beans" represent the fear that there is no magic coming and no payoff. Rachel\'s question is the dark counterpart to optimism: what if the gamble you took just gives you ordinary, unglamorous reality with no reward?',
      meaning_ko: '잭과 콩나무 비유의 변형입니다 — "마법 콩"이 희망과 변화를 나타낸다면, "일반 콩"은 마법이 오지 않고 보상도 없을 것이라는 두려움을 나타냅니다. 레이철의 질문은 낙관주의의 어두운 반대편입니다: 자신이 한 도박이 그냥 평범하고 화려하지 않은 현실만 주고 아무런 보상도 없다면 어쩌지?',
      example: 'A: "What if taking that risk doesn\'t lead to anything?" B: "...What if all we\'ve got are beans?"',
      example_ko: 'A: "위험을 감수한 게 아무것도 안 이어지면 어쩌지?" B: "...그냥 콩만 남으면 어쩌지?"',
      context: 'Rachel pushes the magic beans metaphor to its pessimistic conclusion: what if there\'s no magic? The silence that follows — Phoebe admits she doesn\'t like the question — is perfect. Comedy pauses and something genuinely anxious surfaces.',
      context_ko: '레이철이 마법 콩 비유를 비관적 결론까지 밀어붙이는 장면: 마법이 없다면? 이어지는 침묵 — 피비가 그 질문이 싫다고 인정하는 — 이 완벽합니다. 코미디가 잠시 멈추고 진심으로 불안한 무언가가 표면으로 드러납니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X9'

    {
      phrase: 'I\'m in a lot of pain here. My face is dented.',
      partOfSpeech: 'expression',
      meaning: '"My face is dented" is a comically literal description of a swollen, distorted face after being hit. "Dented" normally describes metal or hard surfaces bent out of shape — applying it to a face is darkly funny. The line blends genuine pain with self-pity in classic Ross fashion.',
      meaning_ko: '"My face is dented"는 맞은 후 부어오르거나 변형된 얼굴을 코믹하게 문자 그대로 묘사하는 말입니다. "Dented"는 보통 찌그러진 금속이나 딱딱한 표면을 묘사하는데 — 얼굴에 적용하는 것이 어둡게 웃깁니다. 이 대사는 전형적인 로스 방식으로 진짜 고통과 자기 연민을 혼합합니다.',
      example: 'A: "What happened to you?" B: "I got hit. I\'m in a lot of pain. My face is basically dented."',
      example_ko: 'A: "무슨 일이야?" B: "맞았어. 많이 아파. 얼굴이 완전히 찌그러진 것 같아."',
      context: 'Ross arrives at the hospital ER after the puck hit his face at the hockey game. He tries to skip the queue by appealing to the nurse: "I don\'t wanna make any trouble, but I\'m in a lot of pain here. My face is dented." A perfectly Ross-like mix of politeness and desperate complaint.',
      context_ko: '하키 경기에서 퍽이 얼굴에 맞은 후 로스가 응급실에 도착하는 장면. 그는 간호사에게 호소하며 줄을 건너뛰려 합니다: "소란을 피우고 싶지 않아요, 근데 많이 아파요. 얼굴이 찌그러졌거든요." 완전히 로스다운 정중함과 필사적인 불평의 혼합.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X13'
    },
    {
      phrase: 'And I\'m getting coffee. And it\'s not even for me.',
      partOfSpeech: 'expression',
      meaning: 'The punchline of Rachel\'s FICA meltdown. After listing everything her friends are achieving — marriage, pregnancy, promotions — she lands on her own reality: fetching coffee that isn\'t even hers. The two short sentences hit harder than a long complaint ever could. It\'s the comic-tragic gap between where she thought she\'d be and where she actually is.',
      meaning_ko: '레이철의 FICA 폭발의 결정타입니다. 친구들이 이루고 있는 것들 — 결혼, 임신, 승진 — 을 나열한 후 자신의 현실로 착지합니다: 자기 것도 아닌 커피를 가져다주고 있는 것. 두 개의 짧은 문장이 긴 불평보다 훨씬 강하게 와 닿습니다. 자신이 있을 것이라 생각했던 곳과 실제로 있는 곳 사이의 코믹-비극적 간격입니다.',
      example: 'A: "So how\'s the new job going?" B: "Everyone else got promoted. And I\'m getting coffee. And it\'s not even for me."',
      example_ko: 'A: "새 직장은 어때?" B: "다들 승진했는데. 나는 커피나 가져다주고 있어. 심지어 내 것도 아닌 커피를."',
      context: 'Rachel takes a Visa call and unravels live on the phone — listing everyone\'s promotions and pregnancies before landing here. Monica holds the phone in stunned silence, then quietly tells the operator: "Uh, Rachel has left the building." The tag becomes one of the episode\'s most quoted lines.',
      context_ko: '레이철이 비자 카드 전화를 받고 수화기에 대고 실시간으로 무너지는 장면 — 모두의 승진과 임신을 나열하다 이 대사로 끝납니다. 모니카가 어리둥절하게 수화기를 들고 있다가 조용히 상담원에게 말합니다: "어, 레이철은 자리를 떴습니다." 이 대사는 에피소드에서 가장 많이 인용되는 대사 중 하나가 됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X6'
    },
    {
      phrase: 'Now that was fun.',
      partOfSpeech: 'expression',
      meaning: 'Said after something unexpected or chaotic turns out to be genuinely enjoyable. The timing is everything: Ross spent the whole evening insisting the hockey trip was pointless and painful — then, after being hit with a puck and wrestling a child for it in the ER, he delivers this line with total sincerity. The gap between his initial resistance and this final admission is the joke.',
      meaning_ko: '예상치 못하거나 혼란스러운 일이 진정으로 즐거운 것으로 판명된 후 하는 말입니다. 타이밍이 전부입니다: 로스는 저녁 내내 하키 여행이 무의미하고 고통스럽다고 주장했습니다 — 그런 다음 퍽에 얼굴을 맞고 응급실에서 아이와 퍽을 두고 싸운 후 완전히 진심으로 이 대사를 합니다. 초기 저항과 이 최종 인정 사이의 간격이 농담입니다.',
      example: 'A: "We spent an hour lost and ended up at a completely random place." B: "Now that was fun."',
      example_ko: 'A: "한 시간 동안 길 잃다가 완전히 엉뚱한 곳에 도착했어." B: "그게 재밌었던 거잖아."',
      context: 'The episode\'s final punchline. Chandler and Joey have been asking Ross all night: "Admit it, you had fun." He denied it every time. Then, after the puck, the ER, the child, and the foam finger, he finally delivers this with full sincerity. The perfect ending to his emotional arc.',
      context_ko: '에피소드의 마지막 펀치라인. 찬들러와 조이가 밤새 로스에게 "인정해, 재밌었잖아"라고 물었고 그는 매번 부정했습니다. 그런 다음 퍽, 응급실, 아이, 폼 손가락을 거친 후 드디어 완전한 진심으로 이 말을 합니다. 그의 감정적 호를 완벽하게 마무리하는 엔딩입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X15'
    }

  var S_NUM = 1;
  var E_NUM = 4;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/season'+S_NUM+'/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    /* ── Availability guard ── */
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0d1b2e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-size:1.3rem;font-weight:900;color:#38bdf8;margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:#6b87aa;margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:#38bdf8;color:#0d1b2e;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
        checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
