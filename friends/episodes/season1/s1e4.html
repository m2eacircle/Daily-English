<script>
  var EP_DATA = {
    available: false,
    title: 'The One with George Stephanopoulos',
    description: 'The guys get front-row hockey tickets. The girls have a slumber party.',
    expressions: [
    {
      phrase: 'If I were omnipotent for a day',
      partOfSpeech: 'expression',
      meaning: '"Omnipotent" means having unlimited power — the ability to do anything. The phrase "If I were omnipotent for a day" is a hypothetical used to dream out loud about what you would do with absolute power. It\'s a playful, imaginative conversation starter.',
      meaning_ko: '"Omnipotent"는 무한한 힘, 즉 무엇이든 할 수 있는 능력을 가졌다는 뜻입니다. "If I were omnipotent for a day(하루 동안 전능하다면)"는 절대적인 힘이 생기면 무엇을 할지 상상하며 꿈꾸는 가정법 표현으로, 가볍고 재치 있는 대화 시작 방법입니다.',
      example: 'A: "If you were omnipotent for a day, what would you do?" B: "I\'d fix the environment and then sleep for 23 hours."',
      example_ko: 'A: "하루 동안 전능하다면 뭘 할 거야?" B: "환경 문제 해결하고 23시간 잘 거야."',
      context: 'The episode opens at Central Perk with the gang playing a classic hypothetical game — what would you do if you were all-powerful for one day? Each person\'s answer reveals their personality perfectly: Phoebe wants world peace, Joey would make himself "the funniest guy in the world."',
      context_ko: '에피소드 오프닝에서 센트럴 퍼크에 모인 친구들이 클래식한 가정법 게임을 즐기는 장면. 하루 동안 전능하다면 무엇을 하겠냐는 질문에 각자의 답이 그들의 성격을 완벽하게 드러냅니다. 피비는 세계 평화를, 조이는 자신을 "세상에서 가장 웃긴 사람"으로 만들겠다고 합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X1'
    },
    {
      phrase: 'I can\'t believe you remembered.',
      partOfSpeech: 'expression',
      meaning: 'Used to express genuine surprise and deep appreciation when someone recalls a detail — a date, a preference, or a personal fact — that you didn\'t expect them to keep in mind. It implies the other person must care about you to have paid such close attention.',
      meaning_ko: '상대방이 날짜, 취향, 개인적인 사실 같이 기억해 줄 것이라 기대하지 못했던 세부 사항을 기억했을 때 진심 어린 놀라움과 감사를 표현하는 말입니다. 상대방이 자신에게 각별한 관심을 가지고 있다는 것을 의미합니다.',
      example: 'A: "Happy anniversary — I got you those chocolates you love." B: "I can\'t believe you remembered! That\'s so sweet."',
      example_ko: 'A: "기념일 축하해 — 네가 좋아하는 초콜릿 사왔어." B: "기억하고 있었다니 믿을 수가 없어! 너무 감동이다."',
      context: 'Chandler and Joey surprise Ross with Rangers tickets, pointing out that today is October 20th — the anniversary of the first time Ross slept with Carol. Ross is stunned they remembered such a personal and painful milestone.',
      context_ko: '찬들러와 조이가 로스에게 레인저스 티켓을 선물하며 오늘이 10월 20일, 즉 로스가 캐롤과 처음 잠자리를 가진 기념일임을 상기시켜 주는 장면. 로스는 친구들이 그렇게 개인적이고 아픈 날을 기억하고 있었다는 사실에 놀랍니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X2'
    },
    {
      phrase: 'It\'s not a big deal.',
      partOfSpeech: 'expression',
      meaning: 'Used to minimise or downplay the significance of something — to tell someone (or yourself) that a situation is not as serious or important as it might seem. Often said to reassure someone who is worried or upset, but it can also be used to mask one\'s true feelings.',
      meaning_ko: '어떤 일의 중요성을 축소하거나 별것 아닌 것처럼 여기다는 뜻으로, 상황이 보이는 것만큼 심각하거나 중요하지 않다고 누군가에게(또는 자기 자신에게) 말하는 표현입니다. 걱정하거나 속상한 사람을 안심시키기 위해 쓰이기도 하지만, 자신의 진짜 감정을 숨기기 위해 사용하기도 합니다.',
      example: 'A: "I didn\'t get invited to the party." B: "It\'s not a big deal. We\'ll do something better."',
      example_ko: 'A: "파티에 초대를 못 받았어." B: "별거 아니야. 우리끼리 더 재밌는 거 하자."',
      context: 'Ross insists the anniversary of his first time with Carol is "not a big deal" — but it clearly is. His friends see right through him and drag him out to the hockey game to cheer him up, knowing he needs a distraction even if he won\'t admit it.',
      context_ko: '로스가 캐롤과의 첫날 기념일이 "별거 아니다"라고 우기는 장면. 하지만 누가 봐도 그게 아닙니다. 친구들은 그의 속을 꿰뚫어 보고, 그가 인정하지 않더라도 기분 전환이 필요하다는 걸 알기에 억지로 하키 경기에 데려갑니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X3'
    },
    {
      phrase: 'Are you gonna be okay?',
      partOfSpeech: 'expression',
      meaning: 'A caring, check-in question used when you\'re worried about someone\'s emotional or physical state. It\'s more personal than "Are you okay?" because it looks forward — asking not just how they are right now, but whether they will be able to manage or cope.',
      meaning_ko: '상대방의 감정적 혹은 신체적 상태가 걱정될 때 쓰는 배려 어린 확인 표현입니다. "Are you okay?"보다 더 개인적인 뉘앙스로, 지금 괜찮냐는 것뿐 아니라 앞으로 잘 버텨낼 수 있겠냐는 의미까지 담고 있습니다.',
      example: 'A: "I just found out I didn\'t get the promotion." B: "Oh no. Are you gonna be okay?"',
      example_ko: 'A: "승진 안 됐다는 거 방금 알았어." B: "아, 저런. 괜찮겠어?"',
      context: 'Monica worries about Rachel, who has just discovered she is expected to use her own credit cards for the first time. Rachel is visibly overwhelmed by the reality of financial independence, and Monica\'s question opens the door to a deeper conversation about starting over.',
      context_ko: '레이철이 이제 직접 신용카드를 써야 한다는 사실을 알게 된 후 모니카가 걱정하는 장면. 레이철은 경제적 독립의 현실에 명백히 압도되어 있고, 모니카의 질문이 새로 시작하는 것에 대한 더 깊은 대화의 문을 엽니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X4'
    },
    {
      phrase: 'I\'m waiting tables.',
      partOfSpeech: 'expression',
      meaning: '"Wait tables" (or "wait on tables") is the standard expression for working as a waiter or waitress — taking orders and serving food and drinks to restaurant customers. It\'s a very common job for people who are between careers or saving money.',
      meaning_ko: '"Wait tables"는 웨이터나 웨이트리스로 일하다, 즉 식당 손님에게 주문을 받고 음식과 음료를 서빙한다는 표준적인 표현입니다. 커리어 전환 중이거나 돈을 모으는 사람들이 흔히 하는 일입니다.',
      example: 'A: "What are you doing for work right now?" B: "I\'m waiting tables at an Italian place downtown while I look for something in marketing."',
      example_ko: 'A: "요즘 무슨 일 해?" B: "마케팅 쪽 일 찾으면서 시내 이탈리안 식당에서 서빙 하고 있어."',
      context: 'Rachel explains her current situation to Monica — she has no income and is surviving by waiting tables. This moment grounds Rachel\'s character: she isn\'t just "poor little rich girl" but is actively trying to build an independent life.',
      context_ko: '레이철이 모니카에게 지금 자신의 상황을 설명하는 장면. 수입이 없고 서빙 일로 버티고 있다고 합니다. 이 장면이 레이철의 캐릭터를 현실적으로 보여줍니다. 그녀는 단순히 "불쌍한 부잣집 딸"이 아니라, 적극적으로 독립적인 삶을 만들어가려 노력하고 있습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X5'
    },
    {
      phrase: 'Slumber party',
      partOfSpeech: 'noun',
      meaning: 'A slumber party (also called a sleepover) is when a group of friends — traditionally girls — spend the night together at someone\'s home, staying up late to talk, watch movies, eat snacks, and play games. The word "slumber" means sleep, though ironically, very little sleeping usually happens.',
      meaning_ko: '슬럼버 파티(또는 슬립오버)는 친구들이, 전통적으로는 여자아이들이, 누군가의 집에서 함께 밤을 보내며 늦게까지 수다를 떨고 영화를 보고 간식을 먹고 게임을 하는 것을 말합니다. "Slumber"는 잠을 뜻하지만, 아이러니하게도 실제로 잠을 자는 일은 거의 없습니다.',
      example: 'A: "What are you doing Friday night?" B: "We\'re having a slumber party at my place — pajamas, snacks, scary movies."',
      example_ko: 'A: "금요일 밤에 뭐 해?" B: "우리 집에서 슬럼버 파티 해 — 잠옷 입고, 간식 먹고, 공포 영화 볼 거야."',
      context: 'While the guys head to the hockey game, Monica spontaneously organizes a slumber party for Rachel and Phoebe. What starts as a fun distraction turns into a meaningful night of bonding, secrets, and the girls helping Rachel figure out what she really wants from her life.',
      context_ko: '남자들이 하키 경기를 보러 간 사이, 모니카가 즉흥적으로 레이철과 피비를 위한 슬럼버 파티를 계획하는 장면. 재미있는 기분 전환으로 시작했지만, 셋이 진심으로 유대를 쌓고 비밀을 나누며 레이철이 자신의 삶에서 진정으로 원하는 것을 찾도록 도와주는 의미 있는 밤이 됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X6'
    },
    {
      phrase: 'What\'s the matter?',
      partOfSpeech: 'expression',
      meaning: 'A classic, everyday question asking someone what is wrong or what is bothering them. "Matter" here means the problem or issue at hand. It is slightly more formal and caring than "What\'s wrong?" and is often used when someone looks visibly upset or troubled.',
      meaning_ko: '무슨 문제가 있는지, 무엇이 신경 쓰이는지 물어보는 일상적이고 고전적인 질문입니다. 여기서 "matter"는 문제나 사안을 뜻합니다. "What\'s wrong?"보다 약간 더 정중하고 배려 어린 뉘앙스로, 상대방이 눈에 띄게 속상하거나 괴로워 보일 때 자주 씁니다.',
      example: 'A: "You\'ve been quiet all morning." B: "I know, I\'m sorry." A: "What\'s the matter? You can tell me."',
      example_ko: 'A: "아침부터 계속 말이 없네." B: "알아, 미안해." A: "무슨 일 있어? 나한테 말해도 돼."',
      context: 'Monica notices Rachel is not herself and asks what is wrong. This leads to Rachel opening up about her fears — that all her friends are moving forward with their lives (getting married, having babies, getting promoted) while she feels completely stuck.',
      context_ko: '모니카가 레이철의 상태가 이상하다는 것을 눈치채고 무슨 일이냐고 묻는 장면. 레이철은 친구들은 모두 결혼, 임신, 승진 등 앞으로 나아가고 있는데 자신만 완전히 제자리에 멈춰 있는 것 같다는 두려움을 털어놓습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X7'
    },
    {
      phrase: 'Everyone\'s getting married or pregnant or promoted.',
      partOfSpeech: 'expression',
      meaning: 'This line captures the universal feeling of watching everyone around you hit major life milestones while you feel stuck. The three-part list (married / pregnant / promoted) represents the most common social markers of "adult success," and the sentence is devastating precisely because it is so relatable.',
      meaning_ko: '이 문장은 주변 모든 사람들이 삶의 중요한 이정표를 달성하는 것을 지켜보면서 자신만 제자리에 멈춰 있는 느낌을 받는 보편적인 감정을 포착합니다. 결혼/임신/승진이라는 세 가지 목록은 가장 흔한 "어른으로서의 성공" 기준을 나타내며, 너무나 공감 가기 때문에 더욱 마음에 와닿는 문장입니다.',
      example: 'A: "I feel like I\'m falling behind." B: "I know. It seems like everyone\'s getting married or pregnant or promoted, and I\'m just... here."',
      example_ko: 'A: "나만 뒤처지는 것 같아." B: "맞아. 다들 결혼하거나 임신하거나 승진하는 것 같은데, 나는 그냥... 여기 있어."',
      context: 'This is Rachel\'s emotional low point in the episode. She voices the comparison anxiety that many young people feel — the fear that life is passing her by while everyone else seems to be on track. It is one of the most genuinely moving moments of Season 1.',
      context_ko: '이 에피소드에서 레이철이 감정적으로 가장 힘든 순간입니다. 많은 젊은이들이 느끼는 비교 불안, 즉 다른 모두는 잘 살아가는 것 같은데 자신만 삶에 뒤처지는 것 같은 두려움을 솔직하게 토로합니다. 시즌 1에서 가장 진심으로 감동적인 장면 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X8'
    },
    {
      phrase: 'And I\'m just serving coffee.',
      partOfSpeech: 'expression',
      meaning: 'The phrase works as a self-deprecating contrast — Rachel lists everyone else\'s big achievements and then undercuts herself with something small and ordinary. "Just" is the key word: it signals that she sees her own situation as embarrassingly insignificant compared to what she expected of herself.',
      meaning_ko: '이 문장은 자기 비하적인 대비로 작동합니다. 레이철이 다른 사람들의 큰 성취를 나열한 뒤, 작고 평범한 자신의 현실로 스스로를 깎아내립니다. 핵심 단어는 "just(그냥)": 자신이 기대했던 것과 비교해 현재 자신의 상황이 창피할 정도로 보잘것없다고 여기는 것을 나타냅니다.',
      example: 'A: "My whole college group is doing amazing things." B: "And what about you?" A: "And I\'m just... applying to jobs that haven\'t called back."',
      example_ko: 'A: "대학 동기들은 다들 대단한 일들을 하고 있어." B: "너는?" A: "나는 그냥... 연락도 안 오는 곳에 지원서만 넣고 있어."',
      context: 'Rachel finishes her comparison by pointing to her own life — serving coffee at a diner. The contrast she draws between her friends\' milestones and her own situation is heartbreaking. Monica\'s response turns the whole conversation around with warmth and perspective.',
      context_ko: '레이철이 커피 서빙을 하는 자신의 삶을 언급하며 비교를 마무리하는 장면. 친구들의 이정표와 자신의 상황 사이에 그녀가 그리는 대비는 마음을 아프게 합니다. 모니카의 반응이 따뜻함과 시각의 전환으로 대화 전체를 뒤집어놓습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X9'

    {
      phrase: 'Look at this place.',
      partOfSpeech: 'expression',
      meaning: 'An exclamation used to draw someone\'s attention to a location or situation, usually expressing either admiration or disbelief. The meaning depends entirely on tone: said with awe it means "this place is amazing," said with sarcasm it can mean "what a dump."',
      meaning_ko: '어떤 장소나 상황에 상대방의 주의를 끌 때 쓰는 감탄사로, 주로 감탄이나 믿기 힘들다는 감정을 표현합니다. 의미는 전적으로 어조에 달려 있습니다. 경이로움을 담아 말하면 "이곳 정말 대단하다"는 뜻이고, 비꼬는 투로 말하면 "이게 무슨 꼴이야"라는 의미가 됩니다.',
      example: 'A: "We finally got front-row seats." B: "Look at this place — I\'ve never been this close to the ice before!"',

      context: 'Ross, Chandler, and Joey arrive at Madison Square Garden and are stunned to find themselves in front-row seats — right on the ice. What was supposed to be a simple distraction for Ross turns into something far more exciting than anyone expected.',
      context_ko: '로스, 찬들러, 조이가 매디슨 스퀘어 가든에 도착해 링크 바로 앞, 최전방 자리임을 알게 되고 충격에 빠지는 장면. 로스의 기분 전환을 위한 단순한 나들이였던 것이 예상보다 훨씬 흥미진진한 일로 변합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X10'

    {
      phrase: 'He took a puck to the face.',

      meaning: 'A direct description of being hit in the face by a hockey puck — a hard rubber disc used in ice hockey. Taking something "to the face" means being struck directly in the face by a fast-moving object. The phrase is often used humorously after an embarrassing or painful accident.',
      meaning_ko: '아이스하키에서 쓰는 딱딱한 고무 원반인 퍽이 얼굴에 직격으로 맞았다는 표현입니다. "Take something to the face"는 빠르게 날아오는 물체에 얼굴을 정면으로 얻어맞는다는 뜻입니다. 창피하거나 아픈 사고 후에 유머러스하게 쓰이기도 합니다.',
      example: 'A: "What happened to your nose?" B: "I wasn\'t paying attention at practice and took a puck to the face."',
      example_ko: 'A: "코가 왜 그래?" B: "연습 중에 딴 생각 하다가 퍽에 얼굴을 맞았어."',
      context: 'Ross gets hit in the face by a hockey puck during the game — a slapstick moment that somehow ends up being the highlight of the trip. Rather than ruining the evening, it becomes the funniest story the guys tell for the rest of the night.',
      context_ko: '로스가 경기 중 하키 퍽에 얼굴을 맞는 슬랩스틱 장면. 이것이 어쩐지 이날 나들이의 하이라이트가 됩니다. 저녁을 망치기는커녕, 남자들이 그날 밤 내내 떠드는 가장 웃긴 이야기가 됩니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X11'

    {
      phrase: 'Give me a break.',
      partOfSpeech: 'expression',
      meaning: 'An informal exclamation expressing frustration, disbelief, or impatience with what someone just said or did. It can mean "Stop it," "You can\'t be serious," or "That\'s ridiculous." The tone can be annoyed or playfully exasperated depending on the situation.',
      meaning_ko: '상대방이 말하거나 행동한 것에 대한 짜증, 믿기 어려움, 또는 참을 수 없음을 나타내는 비격식 감탄사입니다. "그만 해," "진지하게 하는 말이야?" 또는 "말도 안 돼"라는 의미로 쓰일 수 있습니다. 상황에 따라 짜증 섞인 어조가 될 수도 있고 장난스럽게 답답한 어조가 될 수도 있습니다.',
      example: 'A: "You have to submit the report in a different font now." B: "Give me a break — I just finished it!"',
      example_ko: 'A: "보고서 폰트를 다르게 해서 다시 제출해야 해." B: "좀 봐줘 — 방금 다 끝냈는데!"',
      context: 'Used several times in the episode in different contexts — Chandler says it when Ross keeps insisting he\'s fine, and Rachel says it when Monica tells her to stop comparing herself to others. It captures the universal feeling of exasperation that runs through the whole episode.',
      context_ko: '에피소드에서 여러 차례 다른 맥락으로 등장합니다. 로스가 계속 괜찮다고 우길 때 찬들러가, 모니카가 다른 사람들과 비교하지 말라고 하자 레이철이 씁니다. 에피소드 전반에 흐르는 보편적인 답답함의 감정을 잘 포착한 표현입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X12'
    },
    {
      phrase: 'You\'re gonna be fine.',
      partOfSpeech: 'expression',
      meaning: 'A reassuring phrase used to comfort someone who is worried, scared, or going through a difficult time. It\'s a forward-looking statement — not just saying things are okay right now, but promising that things will work out in the future. Simple, warm, and one of the most-used comforting expressions in English.',
      meaning_ko: '걱정하거나 두려워하거나 힘든 시간을 보내는 사람을 위로하는 데 쓰는 표현입니다. 미래를 내다보는 말로, 지금 당장 괜찮다는 것뿐 아니라 앞으로도 잘 될 것이라고 약속하는 뉘앙스를 담고 있습니다. 영어에서 가장 많이 쓰이는 위로 표현 중 하나로, 단순하고 따뜻합니다.',
      example: 'A: "I don\'t know how I\'m going to handle all of this." B: "Hey. Listen to me. You\'re gonna be fine."',
      example_ko: 'A: "이 모든 걸 어떻게 감당해야 할지 모르겠어." B: "야. 내 말 들어. 다 잘 될 거야."',
      context: 'Monica says this to Rachel at the end of their heart-to-heart during the slumber party. Rachel has just poured out all her fears about being behind in life. Monica\'s simple, steady reassurance helps Rachel see that starting over is not failure — it\'s a beginning.',
      context_ko: '슬럼버 파티 중 둘이 속마음을 털어놓는 대화 끝에 모니카가 레이철에게 하는 말. 레이철이 삶에 뒤처진다는 두려움을 모두 쏟아낸 직후입니다. 모니카의 단순하고 흔들림 없는 위로가 레이철이 다시 시작하는 것이 실패가 아니라 새로운 출발이라는 것을 깨닫도록 도와줍니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X13'
    },
    {
      phrase: 'I\'ve got a lot of moves.',
      partOfSpeech: 'expression',
      meaning: '"Moves" in this context means skills, tricks, or impressive abilities — the things you can do that others can\'t. "I\'ve got moves" is used to boast playfully about one\'s talents or capabilities. It originally comes from dancing, where "moves" are dance steps, but has expanded to mean any impressive skill.',
      meaning_ko: '이 맥락에서 "moves"는 기술, 묘기, 또는 인상적인 능력, 즉 자신만이 할 수 있는 것들을 뜻합니다. "I\'ve got moves"는 자신의 재능이나 능력을 장난스럽게 자랑할 때 쓰입니다. 원래 댄스에서 나온 말로 "moves"는 댄스 스텝을 뜻했지만, 지금은 모든 인상적인 기술을 가리키는 말로 확장되었습니다.',
      example: 'A: "Can you actually skate?" B: "Can I skate? I\'ve got moves you\'ve never seen."',
      example_ko: 'A: "너 진짜 스케이트 탈 줄 알아?" B: "탈 줄 아냐고? 네가 본 적 없는 기술이 있다고."',
      context: 'Joey brags about his hockey skills before the game with classic Joey confidence — the kind where he believes every word he says regardless of any evidence to the contrary. Naturally, his actual performance at the rink doesn\'t quite match the hype.',
      context_ko: '조이가 경기 전 자신만의 클래식한 자신감으로 하키 실력을 자랑하는 장면. 그는 어떤 반증이 있더라도 자기가 하는 말을 전적으로 믿는 스타일입니다. 당연히 링크에서의 실제 실력은 그의 허풍과 영 다릅니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E4X14'

    {
      phrase: 'Everything\'s falling into place.',
      partOfSpeech: 'expression',
      meaning: 'Used when multiple things are coming together smoothly and working out the way they should — as if pieces of a puzzle are clicking into position. It suggests a feeling of things naturally aligning and going well, often after a period of uncertainty or confusion.',
      meaning_ko: '여러 일들이 순조롭게 맞아떨어지며 원하는 대로 풀려가고 있을 때 쓰는 표현입니다. 퍼즐 조각들이 제자리에 딱딱 맞춰지는 것처럼, 일들이 자연스럽게 정렬되고 잘 돌아가는 느낌을 줍니다. 불확실하거나 혼란스럽던 시기 이후에 자주 씁니다.',
      example: 'A: "How\'s the new apartment coming along?" B: "Really well. I got the furniture, met the neighbors — everything\'s falling into place."',
      example_ko: 'A: "새 집은 어때?" B: "잘 되고 있어. 가구도 들여놓고, 이웃도 만났고 — 모든 게 제자리를 찾아가는 것 같아."',
      context: 'By the end of the episode, the tone shifts from anxiety to cautious optimism. Rachel, after her honest conversation with Monica and Phoebe, begins to feel that maybe her new life — messy and uncertain as it is — could actually work out.',
      context_ko: '에피소드 끝부분에 이르러 분위기가 불안에서 조심스러운 낙관으로 전환됩니다. 모니카, 피비와 솔직한 대화를 나눈 후 레이철은 지저분하고 불확실하더라도 자신의 새로운 삶이 잘 될 수 있을 것이라는 생각이 들기 시작합니다.',

    }

  };

  var S_NUM = 1;
  var E_NUM = 4;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/season' + S_NUM + '/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/season'+S_NUM+'/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    /* ── Availability guard ── */
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0d1b2e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-size:1.3rem;font-weight:900;color:#38bdf8;margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:#6b87aa;margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:#38bdf8;color:#0d1b2e;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
        checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
