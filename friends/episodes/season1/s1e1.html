<script>
  /* ================================================================

  var EP_DATA = {
    available: true,
    title: 'The One Where Monica Gets a Roommate',
    description: 'Rachel joins the group after leaving her fiancé at the altar.',
    expressions: [
    {
      phrase: 'Carol moved her stuff out today.',
      partOfSpeech: 'expression',
      meaning: '"Stuff" means belongings or personal things. "Move out" is a phrasal verb meaning to take your belongings and leave a place permanently. Together this sentence naturally describes someone ending a living arrangement.',
      meaning_ko: '"Stuff"는 소지품이나 개인 물건을 뜻하는 일상적 표현입니다. "Move out"은 집에서 짐을 빼다, 즉 스스로 나가다는 의미의 구동사입니다. 두 표현이 합쳐져 동거 관계가 끝났음을 자연스럽게 설명하는 문장입니다.',
      example: 'A: "You look upset. What happened?" B: "My roommate moved his stuff out today. I\'m on my own now."',
      example_ko: 'A: "얼굴이 안 좋아 보이네, 무슨 일 있어?" B: "룸메이트가 오늘 집을 뺐는데. 이제 나 혼자야."',
      context: 'Ross says this at the coffee shop, telling his friends that his ex-wife Carol has officially taken her belongings from their shared apartment — a painful moment of finality after their separation.',
      context_ko: '로스가 커피숍에서 친구들에게 전 아내 캐롤이 공식적으로 집에서 짐을 빠 갔다고 말하는 장면. 두 사람의 이별이 완전히 마무리된 아픈 순간입니다.',
      youtubeUrl: 'https://youtu.be/sbNpBDifB1I'
    },
    {
      phrase: 'There\'s nothing to tell.',
      partOfSpeech: 'expression',
      meaning: 'Used to downplay or dismiss a topic, meaning "There is no big story here" or "It\'s not a big deal." Often said when someone is embarrassed or wants to avoid being questioned about something.',
      meaning_ko: '별로 말할 것도 없다, 즉 대단한 일이 아니라고 화제를 축소하거나 회피할 때 쓰는 표현입니다. 뭔가를 숨기고 싶거나 질문을 피하고 싶을 때 자주 씁니다.',
      example: 'A: "So how did the interview go? Tell me everything!" B: "There\'s nothing to tell. It was just a short meeting."',
      example_ko: 'A: "면접 어땠어? 다 얘기해봐!" B: "별로 할 말도 없어. 그냥 짧은 미팅이었어."',
      context: 'Friends are excitedly pressing Monica for details about a guy she works with. Monica tries to brush it off, saying there is no story — though everyone can tell there clearly is one.',
      context_ko: '친구들이 모니카에게 직장 동료 남자에 대해 신이 나서 캐묻자, 모니카가 별 것 아니라며 넘기려는 장면. 하지만 다들 뭔가 있다는 걸 눈치채고 있습니다.',
      youtubeUrl: 'https://youtu.be/2eMC_aH8pEc'
    },
    {
      phrase: 'What if I don\'t wanna be a shoe?',
      partOfSpeech: 'expression (metaphor)',
      meaning: 'Rachel uses "shoe" as a metaphor for the role society assigned her — dutiful daughter, soon-to-be wife — without her choosing it. The line means: "What if I don\'t want to be who everyone decided I should be?" A metaphor for breaking free from expectations.',
      meaning_ko: '레이철이 "신발"을 사회가 자신에게 정해준 역할(순종적인 딸, 예비 신부)의 은유로 씁니다. "내가 되고 싶지 않은 사람이 되라고 강요받는다면?"이라는 뜻으로, 기대에서 벗어나고 싶다는 감정을 표현하는 유명한 대사입니다.',
      example: 'A: "You\'ve always been the responsible one in the family." B: "But what if I don\'t wanna be a shoe? What if I want to try something completely different?"',
      example_ko: 'A: "넌 항상 집안의 책임감 있는 사람이었잖아." B: "근데 내가 그런 사람이 되기 싫다면? 완전히 다른 걸 해보고 싶다면?"',
      context: 'In an emotional phone call with her father after fleeing her wedding, Rachel makes her declaration of independence — she has always been told who to be, and she is finally questioning it.',
      context_ko: '결혼식을 도망친 후 아버지와 감정적인 통화를 하면서 레이철이 자신의 독립을 선언하는 장면. 항상 남들이 정해준 대로 살았는데 처음으로 그것에 의문을 품습니다.',
      youtubeUrl: 'https://youtu.be/JAB5CBZ1wxM'
    },
    {
      phrase: 'You can\'t live off your parents your whole life.',
      partOfSpeech: 'expression',
      meaning: '"Live off someone" means to depend on another person for money and support without earning your own. The phrase is a direct, slightly blunt statement that independence is necessary in adult life.',
      meaning_ko: '"Live off someone"은 스스로 벌지 않고 다른 사람에게 경제적으로 의존해 살다는 뜻입니다. 어른이 되면 독립해야 한다는 것을 직접적으로, 다소 단호하게 말하는 표현입니다.',
      example: 'A: "My parents still pay my rent." B: "You\'re 30. You can\'t live off your parents your whole life."',
      example_ko: 'A: "부모님이 아직도 내 월세 내줘." B: "너 30살이잖아. 평생 부모님한테 기댈 수는 없잖아."',
      context: 'Monica gently but directly tells Rachel that she cannot rely on her father\'s money forever. Rachel\'s honest response — "I know, that\'s why I was getting married" — perfectly captures her character at the start of the series.',
      context_ko: '모니카가 레이철에게 평생 아버지 돈에 의존할 수 없다고 부드럽지만 직접적으로 말하는 장면. 레이철의 솔직한 대답 "알아, 그래서 결혼하려 했잖아"가 시리즈 초반 레이철의 캐릭터를 완벽하게 보여줍니다.',
      youtubeUrl: 'https://youtu.be/mImn3h4U-_k'
    },
    {
      phrase: 'Did I say that out loud?',
      partOfSpeech: 'expression',
      meaning: 'Used humorously after accidentally saying something you only meant to think. It pretends to be surprised that the private thought came out as spoken words — a self-aware, funny way to acknowledge an awkward slip.',
      meaning_ko: '속으로만 생각하려던 말을 실수로 소리 내어 말했을 때 쓰는 유머 표현입니다. "내가 그걸 소리 내어 말했어?"라는 뜻으로, 민망한 실수를 자기 인식적으로 재치 있게 인정하는 방식입니다.',
      example: 'A: "He\'s so annoying — wait, is he standing right behind me?" B: "Yep." A: "Did I say that out loud?"',
      example_ko: 'A: "그 사람 진짜 짜증나 — 잠깐, 내 바로 뒤에 있어?" B: "응." A: "내가 소리 내서 말했어?"',
      context: 'Chandler blurts out that he sometimes wishes he were a lesbian, then immediately catches himself. His "Did I say that out loud?" gets a huge laugh because it is so perfectly Chandler — honest, unfiltered, and instantly self-aware.',
      context_ko: '챈들러가 자기도 가끔 레즈비언이었으면 좋겠다고 불쑥 말해버린 뒤 바로 스스로 놀라는 장면입니다. 챈들러의 특유의 솔직하고 유머스런 캐릭터를 완벽하게 보여주는 대사로 큰 웃음을 자아냅니다.',
      youtubeUrl: 'https://youtu.be/ujcZJbQhfeg'
    },
    {
      phrase: 'I know you and I have drifted apart.',
      partOfSpeech: 'expression',
      meaning: '"Drift apart" means to gradually grow distant from someone over time — not through a fight or decision, but just naturally losing touch. A gentle, honest way to acknowledge a friendship that faded.',
      meaning_ko: '"Drift apart"는 싸워서가 아니라 자연스럽게 시간이 지나면서 사이가 멀어지다는 뜻입니다. 관계가 서서히 소원해진 것을 솔직하고 부드럽게 인정하는 표현입니다.',
      example: 'A: "I hadn\'t heard from you in so long." B: "I know, I feel bad. We kind of drifted apart after college."',
      example_ko: 'A: "연락이 너무 없었잖아." B: "그러게, 미안해. 대학 졸업하고 자연스럽게 멀어진 것 같아."',
      context: 'Rachel shows up before Monica in her wedding dress, having run away from her own wedding. She apologizes for not staying in touch, admitting they have drifted apart — but explains that Monica is the only person she knows in the city.',
      context_ko: '레이철이 웨딩드레스 차림으로 모니카 앞에 나타나 연락을 못 한 것을 미안해하며, 그래도 도시에서 아는 사람이라곤 모니카뿐이라고 말하는 장면입니다.',
      youtubeUrl: 'https://youtu.be/mZqI2aMWSOc'
    },
    {
      phrase: 'There\'s gotta be something wrong with him.',
      partOfSpeech: 'expression',
      meaning: '"Gotta" is a casual spoken form of "has got to" (= must). This sentence means "He must have some flaw or problem." It reflects a humorous, sarcastic assumption that any available guy must have a hidden defect.',
      meaning_ko: '"Gotta"는 "has got to(= must)"의 구어체 줄임말입니다. 이 문장은 "그 남자한테 분명 뭔가 문제가 있을 거야"라는 뜻으로, 괜찮아 보이는 남자는 어딘가 결함이 있을 거라는 유머러스한 편견을 표현합니다.',
      example: 'A: "He\'s handsome, funny, and actually calls back." B: "There\'s gotta be something wrong with him."',
      example_ko: 'A: "잘생기고 재밌고 연락도 잘 해." B: "분명 뭔가 문제가 있을 거야."',
      context: 'Friends immediately assumes that any man Monica is going out with must have something wrong with him — a running joke that leads to increasingly absurd guesses like a hump, a hairpiece, or eating chalk.',
      context_ko: '모니카가 남자와 데이터한다고 하자 친구들이 당연히 그남자는 뭔가 문제가 있을 거라고 단정 짓는 장면. 혹, 가발, 분필 먹기 등 황당한 추측이 이어지는 웃긴 대목입니다.',
      youtubeUrl: 'https://youtu.be/4S4wMDz9P_k'
    },
    {
      phrase: 'Stop hitting on her.',
      partOfSpeech: 'phrasal verb',
      meaning: '"Hit on someone" means to flirt with them or make romantic advances toward them, often when it is inappropriate or unwelcome. "Stop hitting on her" means "Stop flirting with her / Stop making moves on her."',
      meaning_ko: '"Hit on someone"은 누군가에게 작업을 걸다, 즉 추근거리거나 관심을 표시하다는 뜻입니다. 부적절하거나 상대가 원하지 않을 때 자주 씁니다. "Stop hitting on her"는 "그녀한테 작업 그만 걸어"라는 말입니다.',
      example: 'A: "She just broke up with her boyfriend." B: "I know, but Joey keeps hitting on her." A: "Tell him to stop."',
      example_ko: 'A: "그 애 방금 남자친구랑 헤어졌잖아." B: "알아, 근데 조이가 계속 작업 거는 거야." A: "그만하라고 해."',
      context: 'Joey immediately starts flirting with Rachel the moment she arrives, and Monica has to tell him to stop — pointing out that it\'s her wedding day, of all days. Joey\'s response ("What? Like there\'s a rule or something?") gets a big laugh.',
      context_ko: '레이철이 도착하자마자 조이가 작업을 걸기 시작하고 모니카가 제지하는 장면. 하필 결혼식 날이라고 지적하자 조이가 "뭐? 그게 규칙이라도 있어?"라고 반응해 웃음을 자아냅니다.',
      youtubeUrl: 'https://youtu.be/H6azyEGhk5c'
    },
    {
      phrase: 'I wish I could, but I don\'t want to.',
      partOfSpeech: 'humorous expression',
      meaning: 'A deliberately honest and absurd refusal. Normally people say "I wish I could but I can\'t" as a polite excuse. Phoebe skips the excuse entirely and just admits she does not want to — making it funny for its blunt honesty.',
      meaning_ko: '보통 "하고 싶은데 못 해"라고 정중한 거절을 하는데, 피비는 핑계 없이 그냥 "하기 싫어서요"라고 솔직하게 말해버립니다. 뻔한 거짓말을 거부하는 피비 특유의 순수하고 황당한 유머가 담긴 대사입니다.',
      example: 'A: "Can you help me move this weekend?" B: "I wish I could, but I don\'t want to." A: "...Fair enough."',
      example_ko: 'A: "이번 주말에 이사 도와줄 수 있어?" B: "하고 싶은데, 하기 싫어." A: "...뭐, 그렇구나."',
      context: 'Joey asks Phoebe if she wants to help assemble furniture. Instead of making up an excuse, Phoebe gives this perfectly honest — and perfectly Phoebe — answer that has become one of the most quoted lines from the pilot.',
      context_ko: '조이가 피비에게 가구 조립을 도와달라고 하자, 피비가 핑계 없이 그냥 하기 싫다고 솔직하게 말하는 장면. 파일럿 에피소드에서 가장 많이 인용되는 명대사 중 하나입니다.',
      youtubeUrl: 'https://youtu.be/K9SCJcjK9Lk'
    },
    {
      phrase: 'You got screwed.',
      partOfSpeech: 'expression',
      meaning: 'To get screwed means to be treated unfairly or to end up with a very bad deal — often when someone else takes advantage of you. Informal and slightly blunt. Similar to "You got ripped off" or "You got the short end of the stick."',
      meaning_ko: '"Get screwed"는 불공평하게 대우받거나 손해 보는 거래를 하다, 즉 "완전히 당했다"는 뜻입니다. 다소 거친 표현으로, "You got ripped off(바가지 썼다)"나 "You got the short end of the stick(불공평한 몫을 받았다)"과 비슷합니다.',
      example: 'A: "They gave me three days to finish a month\'s worth of work." B: "You got screwed. You need to push back."',
      example_ko: 'A: "한 달치 일을 3일 안에 끝내라고 했어." B: "완전히 당한 거잖아. 따져야 해."',
      context: 'After Carol left Ross, she took the furniture, the stereo, and the good TV. When Joey asks what Ross got, he sweetly says "you guys" — to which Joey immediately responds "You got screwed."',
      context_ko: '캐럴이 떠나면서 가구, 스테레오, 좋은 TV를 다 가져갔는데, 조이가 로스 너는 뭘 챙겼냐고 묻자 로스가 "너희"라고 대답합니다. 조이가 바로 "완전히 당했네"라고 쏘아붙이는 장면입니다.',
      youtubeUrl: 'https://youtu.be/Cwi0fEt5R-k'
    },
    {
      phrase: 'Welcome back to the world. Grab a spoon.',
      partOfSpeech: 'expression',
      meaning: '"Welcome back to the world" means you have re-entered life after being shut off from it. "Grab a spoon" extends Joey\'s ice cream metaphor — there are many flavors (women) out there, so pick one and dig in. Together it means: "You\'re single again — go enjoy life!"',

  var S_NUM = 1;
  var E_NUM = 1;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/season' + S_NUM + '/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }


  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/season'+S_NUM+'/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    /* ── Availability guard ── */
    if (!EP_DATA.available) {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0d1b2e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-size:1.3rem;font-weight:900;color:#38bdf8;margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:#6b87aa;margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'
        + '<button onclick="history.back()" style="background:#38bdf8;color:#0d1b2e;border:none;border-radius:10px;padding:10px 28px;font-size:0.95rem;font-weight:800;cursor:pointer;">&#9664; Go Back</button>';
      document.body.appendChild(overlay);
      return;
    }
        checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
