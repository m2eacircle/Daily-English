<script>
  var EP_DATA = {
    available: true,
    title: 'The One with the Dozen Lasagnas',
    description: 'Monica makes too many lasagnas. Ross doesn\'t want to know his baby\'s sex.',
    expressions: [
    {
      phrase: 'What do you want me to do with a dozen lasagnas?',
      partOfSpeech: 'expression',
      meaning: '"A dozen" means twelve — a standard quantity grouping in English (a dozen eggs, a dozen roses). "What do you want me to do with [something]?" is a rhetorical expression of exasperation, meaning: this situation is impossible and I have no idea how to deal with it. Monica directs this at her aunt after cooking twelve meat lasagnas, only to be told last minute the family wants vegetarian.',
      meaning_ko: '"A dozen"은 12개를 의미하며, 영어에서 표준적인 수량 단위입니다(12개짜리 달걀, 12송이 장미). "What do you want me to do with [무언가]?"는 당황스러움을 표현하는 수사적 표현으로, 이 상황은 불가능하고 어떻게 해야 할지 모르겠다는 뜻입니다. 모니카가 고기 라자냐 12개를 만들었는데 막판에 채식으로 원한다는 말을 들은 후 이모에게 이 말을 합니다.',
      example: 'A: "We ordered too many chairs for the event." B: "What do you want me to do with forty extra chairs?"',
      example_ko: 'A: "행사에 의자를 너무 많이 주문했어." B: "여분 의자 40개를 어떻게 하라고?"',
      context: 'Monica has spent hours making twelve lasagnas for her aunt\'s family gathering, only to receive a last-minute call saying the family has gone vegetarian. The twelve lasagnas become the episode\'s running comic thread — she spends the rest of the episode desperately finding people to take them off her hands.',
      context_ko: '모니카가 이모 가족 모임을 위해 몇 시간 동안 라자냐 12개를 만들었는데, 갑자기 가족이 채식주의자가 됐다는 전화를 받는 장면. 12개의 라자냐가 에피소드 전체를 관통하는 코미디 실마리가 됩니다 — 그녀는 에피소드 내내 이것들을 받아줄 사람을 필사적으로 찾아다닙니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X1'
    },
    {
      phrase: 'I don\'t want to know. Absolutely not.',
      partOfSpeech: 'expression',
      meaning: '"Absolutely not" is one of the strongest ways to say no in English — it is emphatic, definitive, and leaves no room for negotiation. It does not just mean "no" but "under no circumstances whatsoever." Ross says this about the sex of his unborn baby, and the double-layered comedy comes from the fact that he will accidentally find out anyway.',
      meaning_ko: '"Absolutely not"은 영어에서 가장 강력하게 거절하는 방법 중 하나로 — 단호하고 결정적이며 협상의 여지를 전혀 남기지 않습니다. 단순히 "아니오"가 아니라 "어떤 상황에서도 절대 안 됩니다"라는 의미입니다. 로스가 태어나지 않은 아기의 성별에 대해 이 말을 하고, 어차피 실수로 알게 된다는 것에서 이중으로 웃긴 코미디가 나옵니다.',
      example: 'A: "Do you want to know how the movie ends?" B: "I don\'t want to know. Absolutely not. Don\'t say another word."',
      example_ko: 'A: "영화 결말 알고 싶어?" B: "알고 싶지 않아. 절대로. 한 마디도 하지 마."',
      context: 'Carol tells Ross she now knows the sex of the baby from the amnio results. Ross\'s immediate, passionate refusal is genuine — he wants to find out at the birth. The episode then tortures him as everyone around him finds out one by one while he tries desperately not to know.',
      context_ko: '캐롤이 로스에게 양수 검사 결과로 아기의 성별을 알게 됐다고 말하는 장면. 로스의 즉각적이고 열정적인 거부는 진심입니다 — 출산할 때 알고 싶은 것입니다. 에피소드는 그가 필사적으로 모르려 하는 동안 주변의 모든 사람이 하나씩 알아가면서 그를 고문합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X2'
    },
    {
      phrase: 'It\'s a big commitment.',
      partOfSpeech: 'expression',
      meaning: '"Commitment" means a binding obligation — something you promise to do or be responsible for, which is difficult to undo. "Big commitment" emphasises the seriousness and long-term nature of the obligation. Chandler uses this about buying a table together, but the real subtext is his fear of any kind of lasting attachment — which is very on-brand for him.',
      meaning_ko: '"Commitment"은 구속력 있는 의무, 즉 하기로 약속하거나 책임져야 하는 것으로 취소하기 어려운 것을 의미합니다. "Big commitment"는 의무의 심각성과 장기적 성격을 강조합니다. 찬들러는 이것을 함께 테이블을 사는 것에 대해 쓰지만, 진짜 함의는 어떤 종류의 지속적인 관계도 두려워하는 것으로 — 그에게 매우 전형적인 모습입니다.',
      example: 'A: "We could share a car." B: "That\'s a big commitment. What if we need it at the same time?"',
      example_ko: 'A: "차를 같이 쓸 수도 있어." B: "그건 큰 결심이야. 동시에 필요하면 어떡해?"',
      context: 'Joey and Chandler are considering buying a foosball table together for their apartment. Chandler\'s over-anxious "It\'s a big commitment" perfectly mirrors his real-life relationship fears — he applies the same logic to buying furniture as to romantic attachment, which is both funny and revealing.',
      context_ko: '조이와 찬들러가 아파트에 탁구 축구 테이블을 함께 사는 것을 고려하는 장면. 찬들러의 과도하게 불안한 "큰 결심이야"는 그의 실제 관계에 대한 두려움을 완벽하게 반영합니다 — 가구를 사는 것에도 낭만적인 관계와 같은 논리를 적용하는데, 웃기면서도 많은 것을 드러냅니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X3'
    },
    {
      phrase: 'Was Kip a better roommate than me?',
      partOfSpeech: 'expression',
      meaning: 'A loaded question that sounds casual but carries significant insecurity. "Better than me?" invites a comparison you are afraid to hear the answer to. The name "Kip" is the key: he is Chandler\'s legendary previous roommate who left to get married, and he looms over Chandler and Joey\'s relationship as a ghost of "perfect roommate" past.',
      meaning_ko: '가볍게 들리지만 상당한 불안감을 담고 있는 부담스러운 질문입니다. "나보다 더 나았어?"는 답이 두렵지만 비교를 요청하는 것입니다. "킵"이라는 이름이 핵심입니다: 결혼하러 떠난 찬들러의 전설적인 전 룸메이트로, "완벽한 룸메이트" 과거의 유령으로 찬들러와 조이의 관계 위에 드리워져 있습니다.',
      example: 'A: "You seem distracted." B: "Sorry. Was my last assistant better at this than me?"',
      example_ko: 'A: "딴 생각하는 것 같은데." B: "미안. 이전 조수가 나보다 이걸 더 잘했어?"',
      context: 'Chandler is anxious about the table purchase because his previous roommate Kip bought things with him, then left when he got married. When Joey asks "Was Kip a better roommate than me?", it is not really about Kip — it\'s Joey\'s way of asking: are we solid? This small insecurity from Joey is unusually touching.',
      context_ko: '찬들러가 테이블 구매에 불안해하는 것은 전 룸메이트 킵과 함께 물건을 샀다가 결혼하고 떠났기 때문입니다. 조이가 "킵이 나보다 더 좋은 룸메이트였어?"라고 물을 때, 진짜 킵에 관한 것이 아닙니다 — 우리 사이는 괜찮아? 라고 묻는 조이만의 방식입니다. 조이의 이 작은 불안감이 드물게 감동적입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X4'
    },
    {
      phrase: 'I don\'t mean to sound unprofessional, but... yum.',
      partOfSpeech: 'expression',
      meaning: '"I don\'t mean to sound [adjective]" is a classic hedge — the speaker pre-emptively acknowledges that what they are about to say might be inappropriate, then says it anyway. The contrast between the formal disclaimer ("unprofessional") and the single childlike word ("yum") is exactly what makes it hilarious. It admits the boundary while joyfully crossing it.',
      meaning_ko: '"I don\'t mean to sound [형용사]"는 전형적인 완충 표현입니다 — 화자가 곧 할 말이 부적절할 수 있다는 것을 선제적으로 인정한 다음 어쨌든 말합니다. 격식 있는 면책 조항("비전문적으로")과 단 하나의 유치한 단어("yum") 사이의 대비가 정확히 웃기는 부분입니다. 경계를 인정하면서 기쁘게 넘는 것입니다.',
      example: 'A: "I don\'t mean to sound unprofessional, but that new colleague is really something." B: "You are so unprofessional."',
      example_ko: 'A: "비전문적으로 들릴 수 있지만... 새 동료 진짜 대단한데." B: "완전 비전문적이잖아."',
      context: 'Phoebe\'s receptionist at the massage studio announces that her 3 o\'clock appointment has arrived — and it turns out to be Paolo. Phoebe\'s "I don\'t mean to sound unprofessional, but... yum" is said before she knows it\'s Rachel\'s boyfriend, making the later revelation about what he does during the massage doubly awful.',
      context_ko: '마사지 스튜디오의 피비 접수원이 3시 예약 손님이 왔다고 알리는데 파올로로 밝혀지는 장면. 피비의 "비전문적으로 들릴 수 있지만... 맛있겠다"는 레이철의 남자친구인 줄 모르고 하는 말이라, 이후 마사지 중에 그가 하는 행동에 대한 폭로가 두 배로 끔찍해집니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X5'
    },
    {
      phrase: 'Now he knows and I don\'t know.',
      partOfSpeech: 'expression',
      meaning: 'A simple sentence expressing the mounting comedy of Ross\'s situation: one by one, everyone around him is finding out the sex of his baby while he maintains his principled ignorance. The phrase captures the growing absurdity — his own circle is closing in on the secret while he remains the only excluded party.',
      meaning_ko: '로스의 상황이 점점 우스워지는 것을 표현하는 단순한 문장입니다: 그가 원칙적인 무지를 유지하는 동안 주변 사람들이 하나씩 아기의 성별을 알아갑니다. 이 표현은 점점 커지는 황당함을 포착합니다 — 그의 주변 사람들이 비밀을 알아가는 동안 그만 유일하게 제외된 사람으로 남습니다.',
      example: 'A: "She told the whole team but not me." B: "Now everyone knows and I don\'t know. That\'s charming."',
      example_ko: 'A: "팀 전체에게 말했는데 나한테는 안 했어." B: "이제 다들 알고 나만 모르네. 참 예쁘다."',
      context: 'Ross discovers that Monica found out the sex of the baby when Carol called to thank her for the lasagna. Monica accidentally slipped into knowing. Ross\'s exhausted resignation — "Now he knows and I don\'t know" — as the circle of people who know keeps widening is one of the episode\'s best running gags.',
      context_ko: '로스가 캐롤이 라자냐에 감사 전화를 했을 때 모니카가 아기 성별을 알게 됐다는 것을 알아차리는 장면. 모니카가 실수로 알게 된 것입니다. 아는 사람의 범위가 계속 넓어지면서 로스의 지친 체념 — "이제 그도 알고 나만 몰라" — 이 에피소드 최고의 반복 개그 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X6'
    },
    {
      phrase: 'There are three things that you should know about me.',
      partOfSpeech: 'expression',
      meaning: 'A structured, numbered self-introduction — presenting key facts about yourself in a clear list. It signals seriousness and self-awareness: these are not random observations but deliberately chosen truths. Phoebe uses this to set up her moral credibility before delivering difficult news, which makes it one of the cleverest and most Phoebe-ish moments of the episode.',
      meaning_ko: '자신에 대한 핵심 사실을 명확한 목록으로 제시하는 구조화된 자기소개입니다. 진지함과 자기 인식을 나타냅니다: 무작위적인 관찰이 아니라 의도적으로 선택된 진실들입니다. 피비는 어려운 소식을 전하기 전에 자신의 도덕적 신뢰성을 확립하기 위해 이것을 사용하는데, 이것이 에피소드에서 가장 영리하고 가장 피비다운 순간 중 하나입니다.',
      example: 'A: "Before I say anything else, there are three things you should know about me." B: "Okay...?" A: "I\'m honest, I care about you, and I make excellent coffee."',
      example_ko: 'A: "다른 말 하기 전에, 나에 대해 세 가지를 알아야 해." B: "그래...?" A: "나는 솔직하고, 너를 아끼고, 커피를 정말 잘 만들어."',
      context: 'Phoebe has to tell Rachel that Paolo made a pass at her during his massage session. But she can\'t just say it — she builds her credibility first with three facts: her friends are the most important thing, she never lies, and she makes the best oatmeal-raisin cookies. The cookies prove point two, and point two enables the devastating point three.',
      context_ko: '피비가 레이철에게 파올로가 마사지 세션 중 자신에게 접근했다고 말해야 하는 상황. 하지만 그냥 말할 수 없어 먼저 세 가지 사실로 자신의 신뢰성을 구축합니다: 친구들이 가장 중요하고, 절대 거짓말하지 않고, 최고의 오트밀 건포도 쿠키를 만든다는 것. 쿠키가 두 번째 사실을 증명하고, 두 번째 사실이 결정적인 세 번째 사실을 가능하게 합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X7'
    },
    {
      phrase: 'I don\'t think it\'s fair to the other cookies.',
      partOfSpeech: 'expression',
      meaning: 'Pure Phoebe logic: she doesn\'t make her famous cookies often because she feels it would be unfair to other cookies — as if cookies have feelings and dignity. The anthropomorphising of food is a classic Phoebe move: applying moral consideration to things that can\'t actually experience anything. It is completely absurd and completely sincere at the same time.',
      meaning_ko: '순수한 피비 논리입니다: 자신의 유명한 쿠키를 자주 만들지 않는 이유는 다른 쿠키들에게 공평하지 않을 것 같기 때문 — 마치 쿠키에게 감정과 존엄성이 있는 것처럼. 음식을 의인화하는 것은 전형적인 피비의 행동입니다: 실제로 아무것도 경험할 수 없는 것에 도덕적 고려를 적용하는 것. 완전히 황당하면서 동시에 완전히 진심입니다.',
      example: 'A: "Why don\'t you cook this more often?" B: "I\'m not sure it\'s fair to the other dishes on the menu."',
      example_ko: 'A: "왜 이걸 더 자주 안 만들어?" B: "메뉴의 다른 요리들에게 공평하지 않을 것 같아서."',
      context: 'Rachel has just eaten one of Phoebe\'s oatmeal-raisin cookies and declared them the best she has ever had. Phoebe explains why she doesn\'t make them often. The warmth of the cookie moment is part of Phoebe\'s genius strategy: by proving the cookies are real and her love is real, she has laid the groundwork for Rachel to trust the terrible news that follows.',
      context_ko: '레이철이 방금 피비의 오트밀 건포도 쿠키 하나를 먹고 지금껏 먹은 것 중 최고라고 선언하는 장면. 피비가 왜 자주 만들지 않는지 설명합니다. 쿠키 순간의 따뜻함은 피비의 천재적인 전략의 일부입니다: 쿠키가 진짜이고 자신의 사랑이 진짜임을 증명함으로써, 이어지는 끔찍한 소식을 레이철이 믿을 수 있도록 토대를 마련한 것입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X8'
    },
    {
      phrase: 'It\'s your moral obligation as a friend.',
      partOfSpeech: 'expression',
      meaning: 'A "moral obligation" is a duty based on ethics or conscience — something you are not legally required to do but that doing the right thing demands. "As a friend" specifies the source of the obligation: friendship itself creates certain duties. Framing telling Rachel the truth as a moral obligation removes Phoebe\'s ability to wriggle out of it — it is no longer optional.',
      meaning_ko: '"Moral obligation"은 법적으로는 할 필요가 없지만 올바른 행동을 하기 위해 양심이나 윤리에서 비롯된 의무입니다. "As a friend"는 의무의 출처를 명시합니다: 우정 자체가 특정 의무를 만들어냅니다. 레이철에게 진실을 말하는 것을 도덕적 의무로 표현하면 피비가 빠져나갈 능력이 사라집니다 — 더 이상 선택 사항이 아닙니다.',
      example: 'A: "I don\'t know if I should say anything." B: "It\'s your moral obligation as a friend. She needs to know."',
      example_ko: 'A: "말해야 할지 모르겠어." B: "친구로서 도덕적 의무야. 그 사람이 알아야 해."',
      context: 'Monica tells Phoebe she has to tell Rachel what Paolo did. "You have to tell her. It\'s your moral obligation as a woman, as a friend." Monica\'s moral certainty contrasts perfectly with Phoebe\'s dread — Phoebe knows it is right but hates that it is right, so she needs Monica\'s push to actually do it.',
      context_ko: '모니카가 피비에게 파올로가 한 일을 레이철에게 말해야 한다고 하는 장면. "말해야 해. 여자로서, 친구로서 도덕적 의무야." 모니카의 도덕적 확신이 피비의 두려움과 완벽하게 대비됩니다 — 피비는 옳다는 것을 알지만 옳다는 것이 싫어서, 실제로 행동하기 위해 모니카의 밀어붙임이 필요합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X9'
    },
    {
      phrase: 'It\'s time for you to swoop in.',
      partOfSpeech: 'expression',
      meaning: '"Swoop in" means to move in quickly and decisively to take advantage of a situation — the image is of a bird of prey diving suddenly from above. In a romantic context, "swooping in" means making your move on someone right after they have become available. Joey uses it urgently because timing is everything: the window is now.',
      meaning_ko: '"Swoop in"은 빠르고 결단력 있게 상황을 이용하기 위해 움직이다는 뜻으로 — 맹금류가 위에서 갑자기 급강하하는 이미지입니다. 낭만적 맥락에서 "swooping in"은 누군가가 막 혼자가 됐을 때 접근하는 것을 의미합니다. 조이는 타이밍이 전부이기 때문에 긴박하게 이 표현을 씁니다: 기회의 창은 지금입니다.',
      example: 'A: "She just ended her long-term relationship." B: "This is your chance. Time to swoop in."',
      example_ko: 'A: "그 사람 방금 오래된 연애 끝냈대." B: "이게 기회야. 지금 들어가야 해."',
      context: 'Joey and Chandler watch Paolo leave Rachel\'s apartment. Joey immediately turns to Ross: "She just broke up with the guy. It\'s time for you to swoop in." The "swoop" urgency and Ross\'s deer-in-headlights panic is perfect, leading to one of the episode\'s most bittersweet scenes.',
      context_ko: '조이와 찬들러가 파올로가 레이철의 아파트를 떠나는 것을 지켜보는 장면. 조이가 즉시 로스에게 돌아섭니다: "방금 그 남자랑 헤어졌잖아. 지금 들어가야 해." "swoop"의 긴박함과 로스의 얼어붙은 당황함이 완벽하며, 에피소드의 가장 씁쓸하고 달콤한 장면 중 하나로 이어집니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X10'
    },
    {
      phrase: 'She\'s got to know that you\'re everything he\'s not.',
      partOfSpeech: 'expression',
      meaning: '"Everything he\'s not" is a powerful comparative construction — it defines someone not by naming their positive qualities but by pointing to the negative space left by someone else\'s flaws. It implies: Ross has every quality that Paolo is missing. The phrase is both a compliment to Ross and a condemnation of Paolo, without needing to specify either.',
      meaning_ko: '"Everything he\'s not"은 강력한 비교 표현입니다 — 누군가의 긍정적인 자질을 명명하는 것이 아니라 다른 사람의 결점이 남긴 빈 공간을 가리킴으로써 그 사람을 정의합니다. 로스에게 파올로에게 없는 모든 자질이 있다는 것을 암시합니다. 이 표현은 어느 쪽도 구체적으로 명시하지 않고도 로스에게는 칭찬이고 파올로에게는 비난입니다.',
      example: 'A: "What does she even see in you after him?" B: "I just have to show her I\'m everything he\'s not."',
      example_ko: 'A: "그 사람 다음에 뭘 보고 너를 보겠어?" B: "그냥 내가 그가 아닌 모든 것이라는 걸 보여주면 돼."',
      context: 'Joey and Chandler coaching Ross to go to Rachel. Joey identifies Ross\'s entire strategic position in one sentence: "You\'re like... the anti-Paolo." Chandler endorses it. It is both motivational and perfectly accurate — and makes the scene\'s punchline (Rachel tells Ross she never wants to see another guy) even more crushing.',
      context_ko: '조이와 찬들러가 로스에게 레이철에게 가라고 코치하는 장면. 조이가 한 문장으로 로스의 전체 전략적 위치를 파악합니다: "너는... 안티 파올로 같아." 찬들러가 동의합니다. 동기부여가 되면서 동시에 완벽하게 정확하고 — 이 장면의 펀치라인(레이철이 로스에게 다른 남자는 보고 싶지도 않다고 말하는 것)을 더욱 처절하게 만듭니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X11'
    },
    {
      phrase: 'You deserve so much better than him.',
      partOfSpeech: 'expression',
      meaning: '"You deserve [something]" means you have earned or are entitled to it — based on who you are, what you have done, or how you have been treated. "So much better" is an intensifier that makes the gap even larger. Ross says this to Rachel with complete sincerity — and the heartbreak is that he means it about himself too, without quite being able to say it.',
      meaning_ko: '"You deserve [무언가]"는 당신이 그것을 벌었거나 받을 자격이 있다는 뜻으로 — 당신이 누구인지, 무엇을 했는지, 또는 어떻게 대우받았는지에 근거합니다. "So much better"는 간격을 더 크게 만드는 강조어입니다. 로스는 이 말을 레이철에게 완전한 진심으로 합니다 — 그리고 가슴 아픔은 그가 그것을 자기 자신에 대해서도 의미하지만 거의 말할 수 없다는 것입니다.',
      example: 'A: "I feel so bad about how things ended." B: "Don\'t. You deserve so much better than what he gave you."',
      example_ko: 'A: "일이 그렇게 끝난 게 너무 속상해." B: "그러지 마. 그 사람이 줬던 것보다 훨씬 더 좋은 걸 받을 자격이 있어."',
      context: 'Ross finds Rachel upset on the balcony and comforts her. His lines build to an implicit confession: "You should be with a guy who knows what he has when he has you." Rachel\'s response — "Ross, you\'re so great" and then immediately "I\'m so sick of guys" — is the episode\'s most painful comic moment for Ross.',
      context_ko: '로스가 발코니에서 속상해하는 레이철을 발견하고 위로하는 장면. 그의 대사들이 암묵적인 고백으로 쌓여갑니다: "당신이 누군지 알면서 당신을 가진 남자와 함께해야 해." 레이철의 반응 — "로스, 정말 좋은 사람이야"라고 하고는 바로 "남자라는 것들 지겨워" — 이 에피소드에서 로스에게 가장 고통스러운 코미디 순간입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X12'
    },
    {
      phrase: 'I just gotta figure out what I want.',
      partOfSpeech: 'expression',
      meaning: '"Gotta" is a contraction of "have got to" — meaning need to or must. "Figure out" means to work through and find an answer to something unclear. "What I want" implies uncertainty about one\'s own desires. Together, the phrase captures a very relatable state: not knowing what you need next, but knowing you need time to find it.',
      meaning_ko: '"Gotta"는 "have got to"의 축약형으로 해야 하거나 필요하다는 의미입니다. "Figure out"은 불명확한 무언가를 풀어내고 답을 찾는다는 뜻입니다. "What I want"은 자신의 욕구에 대한 불확실성을 내포합니다. 함께 이 표현은 매우 공감할 수 있는 상태를 포착합니다: 다음에 무엇이 필요한지 모르지만, 그것을 찾기 위해 시간이 필요하다는 것을 아는 것.',
      example: 'A: "So what\'s next for you?" B: "I don\'t know. I just gotta figure out what I want first."',
      example_ko: 'A: "다음엔 뭘 할 거야?" B: "모르겠어. 일단 내가 뭘 원하는지 파악해야 해."',
      context: 'Rachel tells Monica and Phoebe she is done with guys after the Paolo disaster. Monica pushes back and suggests a "more sophisticated screening process." Rachel cuts her off: "No. I just need to be by myself for a while. I just gotta figure out what I want." It is one of Rachel\'s most honest and grounded moments in Season 1.',
      context_ko: '레이철이 파올로 사태 이후 남자들은 다 끝났다고 모니카와 피비에게 말하는 장면. 모니카가 반박하며 "더 정교한 선별 과정"을 제안합니다. 레이철이 끊어버립니다: "아니. 그냥 한동안 혼자 있어야 해. 뭘 원하는지 파악해야 해." 시즌 1에서 레이철의 가장 솔직하고 현실적인 순간 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X13'
    },
    {
      phrase: 'I\'m having a boy.',
      partOfSpeech: 'expression',
      meaning: 'Three simple words that, in context, deliver the biggest emotional punch of the episode. The excitement of "I\'m having a [boy/girl]!" is one of the most universally understood announcements in English — the present continuous tense ("I\'m having") makes the statement vivid and immediate, as if it is happening right now.',
      meaning_ko: '맥락 속에서 에피소드의 가장 큰 감정적 충격을 전달하는 세 단어. "I\'m having a [boy/girl]!"의 흥분은 영어에서 가장 보편적으로 이해되는 발표 중 하나입니다 — 현재 진행 시제("I\'m having")가 진술을 생생하고 즉각적으로 만들어, 마치 바로 지금 일어나고 있는 것처럼 느껴집니다.',
      example: 'A: "Did you find out?" B: "We\'re having a boy! I still can\'t believe it."',
      example_ko: 'A: "알아냈어?" B: "아들이야! 아직도 믿기지 않아."',
      context: 'The episode\'s emotional climax. Ross has spent the whole episode desperately avoiding knowing the sex of his baby — and then Rachel accidentally lets it slip while trying to comfort him. His stunned, joyful repetition of "I\'m having a boy" as he processes the news is a rare moment where pure happiness breaks through the comedy.',
      context_ko: '에피소드의 감정적 클라이맥스. 로스가 에피소드 내내 아기의 성별을 필사적으로 알지 않으려 했는데 — 레이철이 그를 위로하려다 실수로 말해버립니다. 소식을 처리하면서 "아들이야"를 거듭 반복하는 그의 충격에 빠진 기쁨은 순수한 행복이 코미디를 뚫고 나오는 드문 순간입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X14'
    },
    {
      phrase: 'I\'ve been better.',
      partOfSpeech: 'expression',
      meaning: 'A classic understated response to "Are you okay?" or "How are you?" — it acknowledges that things are not good without dramatising or elaborating. "I\'ve been better" literally means: I have been in a better state than this before. It is honest but controlled — neither complaining nor pretending to be fine. It is one of the most useful and natural expressions in everyday English.',
      meaning_ko: '"괜찮아?" 또는 "어때?"에 대한 전형적인 절제된 반응으로 — 극적으로 만들거나 설명하지 않으면서 상황이 좋지 않다는 것을 인정합니다. "I\'ve been better"는 문자 그대로 이전에 지금보다 더 좋은 상태에 있었다는 의미입니다. 솔직하지만 절제되어 있습니다 — 불평도 아니고 괜찮은 척도 아닙니다. 일상 영어에서 가장 유용하고 자연스러운 표현 중 하나입니다.',
      example: 'A: "Hey, how are you holding up?" B: "I\'ve been better, honestly. But I\'ll be okay."',
      example_ko: 'A: "야, 어때?" B: "솔직히 더 좋을 때도 있었지. 근데 괜찮아질 거야."',
      context: 'Ross and Monica rush out to check on Rachel after Paolo leaves. Monica asks "You all right?" and Rachel answers simply: "I\'ve been better." The understatement says everything — she has just been betrayed by the man she was falling for, and she is not pretending otherwise. It is a small line that carries a lot of quiet dignity.',
      context_ko: '파올로가 떠난 후 로스와 모니카가 레이철을 확인하러 달려나가는 장면. 모니카가 "괜찮아?"라고 묻고 레이철이 간단하게 답합니다: "더 좋을 때도 있었지." 절제된 표현이 모든 것을 말합니다 — 방금 마음이 기울던 남자에게 배신당했고, 그녀는 그렇지 않은 척하지 않습니다. 조용한 품위를 많이 담은 작은 대사입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E12X15'
    }
  ]
  };

  var S_NUM = 1;
  var E_NUM = 12;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/season' + S_NUM + '/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/season'+S_NUM+'/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

      overlay.innerHTML =
        '<div style="font-size:3rem;margin-bottom:1rem;">&#128274;</div>'
        + '<div style="font-size:1.3rem;font-weight:900;color:#38bdf8;margin-bottom:0.5rem;">Coming Soon</div>'
        + '<div style="font-size:0.9rem;color:#6b87aa;margin-bottom:2rem;">This episode is not available yet.<br>Check back soon!</div>'

      document.body.appendChild(overlay);
      return;
    }
        checkTermsGuard();
    buildExpressions();

      setTimeout(function() {
