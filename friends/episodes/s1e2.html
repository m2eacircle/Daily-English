<script>
  /* ================================================================
     EPISODE DATA — edit this object to update expressions
     ----------------------------------------------------------------
     Each expression has:
       phrase       : the English expression
       partOfSpeech : e.g. 'idiom', 'phrasal verb', 'expression'
       meaning      : your explanation
       example      : an example sentence
       context      : scene context (optional, can be empty '')
       youtubeUrl   : paste YouTube link here when ready
     ----------------------------------------------------------------
     The page shows 15 slots. Add up to 15 objects in expressions[].
     Empty slots show as "Coming Soon" placeholders automatically.
  ================================================================ */
  var EP_DATA = {
    title: 'The One with the Sonogram at the End',
    description: 'Ross learns Carol is pregnant. Monica\'s parents come to visit.',
    expressions: [
    {
      phrase: 'Break the news',
      partOfSpeech: 'idiom',
      meaning: 'To be the first to tell someone important, surprising, or difficult information. Often used when the news is unwelcome and the speaker must choose the right moment and words.',
      meaning_ko: '중요하거나 놀랍거나 불편한 소식을 처음으로 누군가에게 전하다는 뜻의 관용 표현입니다. 듣는 사람이 충격받을 수 있는 소식을 조심스럽게 꺼낼 때 씁니다.',
      example: 'A: "Does your sister know she didn\'t get the scholarship?" B: "Not yet. I have to break the news to her tonight."',
      example_ko: 'A: "언니는 장학금 못 받은 거 알아?" B: "아직 몰라. 오늘 밤에 내가 알려줘야 해."',
      context: 'Ross has to figure out how to tell his parents that his ex-wife Carol is pregnant — a conversation nobody is looking forward to having.',
      context_ko: '로스가 부모님께 전 아내 캐롤이 임신했다는 사실을 어떻게 전해야 할지 고민하는 장면. 누구도 하고 싶지 않은 대화입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X1'
    },
    {
      phrase: 'A little much',
      partOfSpeech: 'expression',
      meaning: 'Too extreme, excessive, or more than is appropriate. Used informally when something goes beyond what is reasonable or comfortable — not necessarily bad, just over the top.',
      meaning_ko: '지나치다, 과하다는 뜻의 구어 표현입니다. 나쁘다는 게 아니라 그냥 선을 약간 넘었다는 느낌을 부드럽게 전달할 때 씁니다.',
      example: 'A: "He sent her 30 texts in one hour." B: "Yeah, that\'s a little much."',
      example_ko: 'A: "그 사람이 한 시간에 문자를 30개나 보냈대." B: "그건 좀 과한 것 같은데."',
      context: 'The gang reacts to something exaggerated or over the top — a recurring comedic beat in the episode as everyone navigates an unusually stressful situation.',
      context_ko: '친구들이 과장되거나 지나친 행동에 반응하는 장면. 모두가 평소보다 훨씬 스트레스 받는 상황 속에서 반복되는 유머 코드입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X2'
    },
    {
      phrase: 'Come around',
      partOfSpeech: 'phrasal verb',
      meaning: 'To gradually change your opinion and accept something you originally disagreed with or resisted. It implies a slow, natural shift rather than a forced change of mind.',
      meaning_ko: '처음에는 반대하거나 저항하다가 점차 생각이 바뀌어 수용하게 되다는 뜻의 구동사입니다. 강요가 아니라 자연스럽게 마음이 변하는 것을 나타냅니다.',
      example: 'A: "My dad hated my boyfriend at first." B: "Did he come around?" A: "Eventually, yes."',
      example_ko: 'A: "아빠가 처음엔 내 남자친구를 싫어했어." B: "나중엔 받아들였어?" A: "결국엔 그랬어."',
      context: 'Used when discussing whether Ross — or anyone — will eventually accept the complicated new reality of Carol\'s pregnancy and Susan\'s presence in their lives.',
      context_ko: '로스나 주변 사람들이 캐롤의 임신과 수잔의 존재라는 복잡한 현실을 결국 받아들이게 될지 이야기하는 맥락에서 쓰입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X3'
    },
    {
      phrase: 'What are you saying?',
      partOfSpeech: 'expression',
      meaning: 'Used to ask someone to clarify or explain what they actually mean — often because what they said is confusing, surprising, or hard to believe. The tone can be confused, shocked, or challenging depending on context.',
      meaning_ko: '상대가 한 말의 의미를 명확히 해달라고 요청할 때 쓰는 표현입니다. 말이 혼란스럽거나 믿기 어려울 때, 또는 도전적으로 되물을 때도 씁니다. 문맥에 따라 당혹감, 충격, 반발의 뉘앙스를 가집니다.',
      example: 'A: "I think we should rethink the whole project." B: "What are you saying? We\'ve already spent months on this."',
      example_ko: 'A: "프로젝트 전체를 다시 생각해봐야 할 것 같아." B: "무슨 말이야? 우리 이거 몇 달이나 했는데."',
      context: 'Ross uses this when Carol tells him she is pregnant — a stunned, disbelieving response that captures the shock of the moment perfectly.',
      context_ko: '캐롤이 임신했다고 말했을 때 로스가 믿을 수 없다는 듯이 되묻는 장면. 충격과 당혹감이 한 문장에 담긴 대사입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X4'
    },
    {
      phrase: 'I\'m happy for you.',
      partOfSpeech: 'expression',
      meaning: 'A phrase used to express genuine happiness about someone else\'s good news or situation. When said with hesitation or in a complicated context, it can also carry a bittersweet or strained meaning — you wish them well even if it hurts you.',
      meaning_ko: '다른 사람의 좋은 소식이나 상황에 기쁨을 표현하는 말입니다. 하지만 복잡한 상황에서 주저하며 말하면, 아프더라도 상대의 행복을 바란다는 쓴웃음의 뉘앙스를 담기도 합니다.',
      example: 'A: "I got the job — the one we both applied for." B: "Oh... I\'m happy for you." A: "Are you sure?" B: "Trying to be."',
      example_ko: 'A: "취직됐어 — 우리 둘 다 지원했던 곳." B: "아... 잘됐다." A: "진심이야?" B: "그러려고 노력 중이야."',
      context: 'Ross tries to say this to Carol about her pregnancy, but the words are complicated by his own pain, Susan\'s presence, and the strange new shape of his life.',
      context_ko: '로스가 캐롤의 임신을 두고 진심으로 기쁘다고 말하려 하지만, 자신의 아픔과 수잔의 존재, 달라진 삶 앞에서 그 말이 쉽지 않은 장면입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X5'
    },
    {
      phrase: 'Be supportive',
      partOfSpeech: 'expression',
      meaning: 'To actively show encouragement, understanding, and emotional backing for someone going through a difficult situation. Often used as advice — telling someone they should provide emotional support rather than criticism.',
      meaning_ko: '어려운 상황에 처한 사람에게 격려와 이해, 정서적 지지를 적극적으로 보여주다는 뜻입니다. 주로 비판보다 응원해줘야 한다고 조언할 때 씁니다.',
      example: 'A: "My friend just went through a tough breakup and I don\'t know what to say." B: "You don\'t have to say much. Just be supportive."',
      example_ko: 'A: "친구가 힘든 이별을 겪고 있는데 뭐라고 해야 할지 모르겠어." B: "많은 말 안 해도 돼. 그냥 곁에서 힘이 돼줘."',
      context: 'The gang coaches each other on how to handle the sensitive situation with Ross — telling one another to be supportive rather than making jokes or unhelpful comments.',
      context_ko: '친구들이 로스의 민감한 상황을 어떻게 대해야 할지 서로 코치해주는 장면. 농담이나 쓸모없는 말 대신 힘이 돼주라고 조언합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X6'
    },
    {
      phrase: 'Have a point',
      partOfSpeech: 'expression',
      meaning: 'To make a valid or reasonable argument; to say something that is actually correct or worth considering. Often used to reluctantly admit that someone you disagree with is actually right about something.',
      meaning_ko: '타당한 주장을 하다, 즉 맞는 말을 하다는 뜻입니다. 의견이 다른 상대의 말이 사실은 일리가 있다고 마지못해 인정할 때 자주 씁니다.',
      example: 'A: "You should call before dropping by — people are busy." B: "Okay, you have a point."',
      example_ko: 'A: "불쑥 방문하기 전에 전화는 해야지 — 다들 바쁘잖아." B: "그래, 맞는 말이네."',
      context: 'Used during the debate about what to do with the baby situation — someone makes an uncomfortable but valid argument and the others reluctantly admit it makes sense.',
      context_ko: '아기 문제를 어떻게 할지 논쟁하는 중에, 누군가 불편하지만 타당한 주장을 하자 다른 사람들이 마지못해 인정하는 장면입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X7'
    },
    {
      phrase: 'What\'s the deal with...?',
      partOfSpeech: 'expression',
      meaning: 'An informal way to ask "What is going on with...?" or "What is the situation regarding...?" It signals curiosity, confusion, or mild frustration about something that seems strange or unclear.',
      meaning_ko: '"~에 무슨 일이야?" 또는 "~이 대체 어떻게 된 거야?"라고 묻는 구어 표현입니다. 이상하거나 불명확한 것에 대해 궁금함, 혼란, 또는 가벼운 불만을 나타냅니다.',
      example: 'A: "What\'s the deal with the new parking rules? Nobody told me." B: "They changed them last week."',
      example_ko: 'A: "새 주차 규정이 대체 어떻게 된 거야? 아무도 말 안 해줬는데." B: "지난주에 바뀌었어."',
      context: 'Chandler uses this kind of casual, curious phrasing throughout the episode when reacting to the increasingly complicated situation around Ross, Carol, and Susan.',
      context_ko: '챈들러가 로스, 캐롤, 수잔을 둘러싼 점점 복잡해지는 상황에 반응하며 에피소드 내내 이런 가볍고 궁금한 어투로 말하는 장면들입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X8'
    },
    {
      phrase: 'Make fun of',
      partOfSpeech: 'phrasal verb',
      meaning: 'To mock, tease, or ridicule someone or something in a way that is meant to be humorous but can also be hurtful. The intent can range from affectionate teasing among friends to genuine cruelty.',
      meaning_ko: '누군가나 무언가를 놀리거나 비웃다는 뜻의 구동사입니다. 친구 사이의 장난스러운 놀림부터 진짜 상처를 주는 조롱까지 의도의 범위가 넓습니다.',
      example: 'A: "They kept making fun of his accent at work." B: "That\'s not okay."',
      example_ko: 'A: "직장에서 계속 그 사람 말투를 놀렸대." B: "그건 안 되지."',
      context: 'Monica\'s parents constantly make fun of her cooking and life choices during their visit, which stings because Monica desperately wants their approval.',
      context_ko: '모니카의 부모님이 방문 중에 모니카의 요리와 인생 선택을 계속 비꼬는 장면. 모니카는 부모님의 인정을 간절히 원하기 때문에 더욱 아프게 느껴집니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X9'
    },
    {
      phrase: 'Not that there\'s anything wrong with that',
      partOfSpeech: 'expression',
      meaning: 'A phrase added after a statement to clarify you are not judging or criticizing the thing you just mentioned. It signals you want to be seen as open-minded and non-judgmental, often after saying something that could be misunderstood.',
      meaning_ko: '방금 언급한 내용을 비판하거나 판단하는 게 아니라는 것을 강조하기 위해 덧붙이는 표현입니다. 오해받을 수 있는 발언 뒤에 열린 태도를 보여주고 싶을 때 씁니다.',
      example: 'A: "He decided to quit his job and travel — not that there\'s anything wrong with that." B: "But you think it\'s a bad idea?" A: "I didn\'t say that."',
      example_ko: 'A: "그 사람 직장 그만두고 여행 다니기로 했대 — 그게 나쁘다는 건 아닌데." B: "근데 별로라고 생각하는 거잖아?" A: "그런 말은 안 했어."',
      context: 'The gang uses this phrase carefully throughout the episode when discussing Carol\'s relationship with Susan — trying to be accepting while clearly still processing the situation.',
      context_ko: '친구들이 캐롤과 수잔의 관계에 대해 이야기하면서 수용적으로 보이려 하면서도 여전히 상황을 받아들이는 중임이 느껴지는 장면들에서 씁니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X10'
    },
    {
      phrase: 'I\'ll be fine',
      partOfSpeech: 'expression',
      meaning: 'A common reassurance used to tell others not to worry about you. It can be genuinely confident, but in emotional situations it often means the speaker is trying to convince themselves as much as they are convincing others.',
      meaning_ko: '걱정하지 말라고 상대를 안심시킬 때 쓰는 흔한 표현입니다. 진심으로 괜찮을 때도 있지만, 감정적인 상황에서는 상대뿐 아니라 스스로를 설득하는 말이기도 합니다.',
      example: 'A: "Are you sure you\'re okay after all that?" B: "I\'ll be fine. I just need a little time."',
      example_ko: 'A: "그 일 다 겪고 진짜 괜찮아?" B: "괜찮을 거야. 그냥 시간이 좀 필요할 뿐이야."',
      context: 'Ross says this repeatedly throughout the episode as he processes the news of Carol\'s pregnancy — it sounds more like a mantra he\'s trying to believe than a statement of fact.',
      context_ko: '로스가 캐롤의 임신 소식을 받아들이면서 에피소드 내내 반복하는 말. 사실의 진술이라기보다 스스로를 다독이는 주문처럼 들립니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X11'
    },
    {
      phrase: 'Get used to it',
      partOfSpeech: 'expression',
      meaning: 'To become accustomed or adjusted to something new, often something initially unwelcome. Can also be said as a blunt command to someone who is complaining — implying they have no choice but to accept the situation.',
      meaning_ko: '처음에는 불편하거나 싫었던 새로운 상황에 익숙해지다는 뜻입니다. 누군가가 불평할 때 "받아들여"라는 단호한 말로도 쓸 수 있으며, 어쩔 수 없으니 적응하라는 뉘앙스입니다.',
      example: 'A: "I hate waking up early for this shift." B: "It\'s your schedule for the next six months. Get used to it."',
      example_ko: 'A: "이 시간에 일어나서 출근하는 게 너무 싫어." B: "앞으로 6개월 스케줄이야. 익숙해져야 해."',
      context: 'The phrase hangs over the entire episode — Ross, whether he likes it or not, is going to have to get used to a completely new version of his life, including Susan being around.',
      context_ko: '에피소드 전체를 관통하는 메시지. 로스는 좋든 싫든 수잔의 존재를 포함한 완전히 새로운 삶의 형태에 익숙해져야 합니다.',

      meaning_ko: '누군가를 압박하거나 간섭하거나 밀어붙이는 것을 멈추다, 즉 거리를 두라는 뜻의 구동사입니다. 정중한 부탁("좀 빠져줄 수 있어?")부터 강한 명령("그만 좀 해!")까지 상황에 따라 어감이 다양합니다.',

  var S_NUM = 1;
  var E_NUM = 2;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
</body>
