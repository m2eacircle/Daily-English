<script>
  var EP_DATA = {
    title: 'The One with the Sonogram at the End',
    description: 'Ross learns Carol is pregnant. Monica\'s parents come to visit.',
    expressions: [
    {
      phrase: 'Everything you need to know is in that first kiss.',
      partOfSpeech: 'expression',
      meaning: 'This sentence means that a first kiss instantly reveals everything important about a person — their character, their feelings, and whether you are compatible. "Everything you need to know" is a strong, confident way of saying that no other information is necessary. Used to argue that a single moment can tell you more than a long conversation.',
      meaning_ko: '이 문장은 첫 키스 하나로 상대방에 대한 모든 중요한 것 — 성격, 감정, 궁합 여부 — 을 즉시 알 수 있다는 뜻입니다. "Everything you need to know"는 다른 정보는 필요 없다는 강하고 자신 있는 표현입니다. 긴 대화보다 한 순간이 더 많은 것을 알려줄 수 있다고 주장할 때 씁니다.',
      example: 'A: "How do you know if someone is right for you?" B: "Trust me — everything you need to know is in that first kiss."',
      example_ko: 'A: "그 사람이 나한테 맞는지 어떻게 알아?" B: "믿어봐 — 첫 키스에 다 담겨 있어."',
      context: 'Rachel opens the episode with this line at Central Perk, sparking a debate between the girls and the guys about what kissing really means — one of the most memorable cold opens of the series.',
      context_ko: '레이철이 센트럴 퍽에서 이 대사로 에피소드를 시작하며 키스의 의미를 두고 남녀 사이에 논쟁을 불러일으킵니다. 시리즈에서 가장 기억에 남는 오프닝 장면 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X1'
    },
    {
      phrase: 'That is not a happy hi.',
      partOfSpeech: 'expression',
      meaning: 'A sharp, observant remark that reads someone\'s emotional state from the way they said a single word. The structure "That is not a [adjective] [word]" is used to call out that someone\'s tone does not match a normal, casual greeting. It\'s a quick and caring way of asking "What\'s wrong?" without asking it directly.',
      meaning_ko: '단 한 마디를 말하는 방식에서 상대의 감정 상태를 꿰뚫어보는 예리한 관찰 표현입니다. "That is not a [형용사] [단어]" 구조는 상대의 어조가 평범하고 가벼운 인사와 다르다는 것을 지적할 때 씁니다. "무슨 일 있어?"라고 직접 묻지 않고 빠르고 따뜻하게 물어보는 방식입니다.',
      example: 'A: "Hey..." B: "That is not a happy hey. Sit down and tell me what happened."',
      example_ko: 'A: "야..." B: "그거 기분 좋은 \'야\'가 아닌데. 앉아서 무슨 일인지 말해봐."',
      context: 'Ross walks in and says only "Hi" — and Monica immediately reads his entire emotional state from just that one word. A perfect example of how close friends communicate without needing full sentences.',
      context_ko: '로스가 들어오며 그냥 "Hi"라고만 말하는데, 모니카가 그 한 마디만으로 로스의 감정 상태를 바로 읽어냅니다. 절친한 친구끼리 완전한 문장 없이도 소통하는 완벽한 예시입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X4'
    },
    {
      phrase: 'I don\'t wanna give them any more ammunition than they already have.',
      partOfSpeech: 'expression',
      meaning: '"Ammunition" is used figuratively here — it means material, evidence, or reasons that someone can use to criticize or attack you. "Give ammunition" means to hand someone something they can use against you. Used when you are already in a vulnerable position and want to avoid making it worse.',
      meaning_ko: '여기서 "ammunition(탄약)"은 비유적으로 쓰였습니다. 누군가가 당신을 비판하거나 공격하는 데 쓸 수 있는 재료, 증거, 이유를 뜻합니다. "Give ammunition"은 상대에게 나를 불리하게 만들 구실을 주다는 의미입니다. 이미 취약한 상황에서 더 나빠지지 않으려 할 때 씁니다.',
      example: 'A: "Should I mention that I was late last week when I ask for a raise?" B: "No way — don\'t give them any more ammunition than they already have."',
      example_ko: 'A: "연봉 인상을 요청할 때 지난주에 지각했던 것도 언급해야 할까?" B: "절대 안 돼 — 이미 충분히 불리한데 구실을 더 주지 마."',
      context: 'Monica says this while frantically cleaning before her parents arrive. She already knows her mother will find fault with everything — so every imperfection she can fix is one less weapon in her mother\'s hands.',
      context_ko: '모니카가 부모님이 오기 전 미친 듯이 청소하며 하는 말입니다. 엄마가 모든 것에 트집을 잡는다는 걸 이미 알기 때문에 — 고칠 수 있는 흠집 하나하나가 엄마가 쓸 수 있는 무기를 하나씩 줄이는 셈입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X3'
    },
    {
      phrase: 'You may wanna steer clear of the word "dumped."',
      partOfSpeech: 'expression',
      meaning: '"Steer clear of" means to deliberately avoid something — to stay away from it intentionally. The phrase comes from sailing: to steer a ship away from rocks or obstacles. In everyday English, it is used as advice to avoid a topic, word, person, or situation that could cause trouble.',
      meaning_ko: '"Steer clear of"는 무언가를 의도적으로 피하다 — 일부러 멀리하다는 뜻입니다. 이 표현은 항해에서 유래했습니다: 암초나 장애물에서 배를 멀리 조종하다. 일상 영어에서 문제를 일으킬 수 있는 주제, 단어, 사람, 상황을 피하라는 조언으로 씁니다.',
      example: 'A: "I\'m having coffee with my ex tomorrow." B: "You may wanna steer clear of any mention of the breakup."',
      example_ko: 'A: "내일 전 남자친구랑 커피 마셔." B: "헤어진 얘기는 아예 꺼내지 않는 게 좋을 것 같아."',
      context: 'Ross advises Rachel before she meets Barry to return the engagement ring — gently pointing out that calling herself "dumped" will only make the encounter more painful and awkward for everyone.',
      context_ko: '로스가 레이철에게 배리를 만나 약혼 반지를 돌려주러 가기 전 조언하는 장면 — "차였다"는 표현을 쓰면 만남 전체가 모두에게 더 아프고 어색해질 뿐이라고 부드럽게 알려줍니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X11'
    },
    {
      phrase: 'That\'s not why we bought the ticket.',
      partOfSpeech: 'expression',
      meaning: 'Used as part of Chandler\'s metaphor comparing kissing to a concert opening act. "That\'s not why we bought the ticket" means: that is not the main reason we are here, or the main thing we came for. In everyday English, it is used to clarify what someone\'s real priority or main goal is.',
      meaning_ko: '챈들러가 키스를 콘서트 오프닝 공연에 비유하는 비유의 일부로 쓰인 표현입니다. "That\'s not why we bought the ticket"은 그게 우리가 여기 온 주된 이유가 아니다, 우리가 원하는 주목적이 아니다라는 뜻입니다. 일상 영어에서 누군가의 진짜 우선순위나 핵심 목표를 분명히 할 때 씁니다.',
      example: 'A: "The food at the game was amazing." B: "Sure, but that\'s not why we bought the ticket."',
      example_ko: 'A: "경기장 음식이 정말 맛있었어." B: "그렇긴 한데, 그게 우리가 티켓을 산 이유는 아니잖아."',
      context: 'Ross says this while backing up Chandler\'s analogy. It is a rare moment where Ross agrees with Chandler completely — and the girls are deeply unimpressed.',
      context_ko: '로스가 챈들러의 비유를 거들며 하는 말입니다. 로스가 챈들러에게 완전히 동의하는 드문 순간이고, 여자들은 전혀 감동받지 않습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X2'
    },
    {
      phrase: 'Basically it\'s entirely up to me.',
      partOfSpeech: 'expression',
      meaning: '"It\'s up to someone" means it is that person\'s decision to make — the responsibility belongs to them alone. Adding "entirely" makes it absolute: no one else has a say. "Basically" softens the opening slightly, as if Ross is still processing the weight of what he is saying. Used to express full personal freedom — or full personal burden.',
      meaning_ko: '"It\'s up to someone"은 그 사람이 결정할 일이라는 뜻으로, 책임이 그 사람에게 있다는 의미입니다. "entirely"를 더하면 완전히 절대적이 됩니다: 다른 사람은 발언권이 없습니다. "Basically"는 로스가 자신이 하는 말의 무게를 아직 소화하고 있는 듯 살짝 완화시켜 줍니다. 완전한 개인의 자유 — 혹은 완전한 개인의 짐을 표현할 때 씁니다.',
      example: 'A: "Did your parents say you had to move back home?" B: "No, they left it open. Basically it\'s entirely up to me."',
      example_ko: 'A: "부모님이 집으로 돌아와야 한다고 했어?" B: "아니, 그냥 열어두셨어. 기본적으로는 완전히 내가 결정할 문제야."',
      context: 'Ross explains to the gang that Carol and Susan want him involved — but if he\'s not comfortable, he doesn\'t have to be. The phrase carries enormous weight because Ross clearly has no idea yet what he actually wants.',
      context_ko: '로스가 친구들에게 캐롤과 수잔이 그의 참여를 원하지만 불편하면 안 해도 된다고 설명하는 장면. 로스가 자신이 실제로 무엇을 원하는지 전혀 모르는 상태라 이 표현이 더 묵직하게 들립니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X6'
    },
    {
      phrase: 'I don\'t have a restaurant, I work in a restaurant.',
      partOfSpeech: 'expression',
      meaning: 'This line teaches a key grammatical distinction: "I have a restaurant" means you own it, while "I work in a restaurant" means you are employed there. The preposition "in" signals that you are a worker, not the owner. This difference is important in everyday English when describing your job or workplace.',
      meaning_ko: '이 대사는 핵심 문법적 차이를 가르쳐 줍니다: "I have a restaurant"은 소유를 뜻하고, "I work in a restaurant"은 그곳에 고용되어 일한다는 뜻입니다. 전치사 "in"은 소유자가 아닌 직원임을 나타냅니다. 직업이나 일하는 곳을 설명할 때 일상 영어에서 중요한 차이입니다.',
      example: 'A: "Oh, you run a café?" B: "No, I work in a café. My boss runs it."',
      example_ko: 'A: "아, 카페 운영하세요?" B: "아니요, 카페에서 일해요. 사장님이 운영하시죠."',
      context: 'Mrs. Geller casually tells someone Monica "has a restaurant," and Monica immediately corrects her. It\'s a small moment, but it captures the whole Geller family dynamic — Judy inflates Ross\'s world while quietly minimizing Monica\'s.',
      context_ko: '젤러 부인이 아무렇지 않게 모니카가 "레스토랑을 갖고 있다"고 말하자 모니카가 즉시 정정하는 장면. 작은 순간이지만 젤러 가족의 역학 전체를 담고 있습니다 — 주디는 로스의 세계는 부풀리면서 조용히 모니카의 세계는 축소합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X8'
    },
    {
      phrase: 'I know they say you can\'t change your parents.',
      partOfSpeech: 'expression',
      meaning: '"They say" introduces a widely accepted belief or common wisdom without naming a specific source — like "people say" or "it\'s commonly said that." The full sentence acknowledges a frustrating truth: no matter how much you want your parents to be different, they are who they are, and that won\'t change.',
      meaning_ko: '"They say"는 특정 출처를 밝히지 않고 널리 받아들여지는 믿음이나 일반적인 지혜를 소개할 때 씁니다 — "사람들이 그러는데" 또는 "흔히들 ~라고 하잖아"와 비슷합니다. 이 문장 전체는 짜증스러운 진실을 인정합니다: 부모가 달라지길 아무리 바라도, 그들은 그런 사람들이며 그건 바뀌지 않는다는 것.',
      example: 'A: "My dad still treats me like I\'m twelve." B: "I know they say you can\'t change your parents. You just learn to work around them."',
      example_ko: 'A: "아빠는 아직도 나를 열두 살처럼 대해." B: "부모님은 바꿀 수 없다고 하잖아. 그냥 그 안에서 방법을 찾는 거지."',
      context: 'Monica says this at Central Perk after dinner, exhausted from another round of parental favouritism. Her punch line — "if you could, I\'d want yours" directed at Ross — is one of the episode\'s best-timed jokes.',
      context_ko: '저녁 식사 후 센트럴 퍽에서 또 한 번의 부모님 편애에 지친 모니카가 하는 말입니다. 로스를 향한 "내 부모 말고 네 부모를 갖고 싶어"라는 마무리 대사는 에피소드에서 타이밍이 가장 좋은 농담 중 하나입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X10'
    },
    {
      phrase: 'When did it get so complicated?',
      partOfSpeech: 'expression',
      meaning: 'A rhetorical question expressing nostalgia and emotional overwhelm. The speaker is not really asking for a specific answer — they are reflecting on how life has become unexpectedly messy compared to how simple it once felt. Often used at a moment when the gap between the past and the present feels very large.',
      meaning_ko: '향수와 감정적 압도감을 표현하는 수사적 질문입니다. 화자는 실제로 특정 답을 구하는 게 아니라 — 삶이 예전에는 얼마나 단순했는지와 비교해 예상치 못하게 복잡해진 것을 회상합니다. 과거와 현재 사이의 간격이 크게 느껴지는 순간에 자주 씁니다.',
      example: 'A: "I\'ve got the lease, the lawyer, telling my parents — all this week." B: "Ugh. When did it all get so complicated?"',
      example_ko: 'A: "이번 주에 임대차 계약, 변호사, 부모님께 말씀드리는 것까지 다 해야 해." B: "휴. 언제부터 이렇게 다 복잡해진 거야?"',
      context: 'Rachel says this quietly to Ross while they are alone cleaning up after everyone leaves. It\'s a rare still moment between them — and a sudden window into how heavy adulthood feels for both of them.',
      context_ko: '다들 떠난 뒤 레이철과 로스가 단둘이 정리하면서 레이철이 조용히 하는 말입니다. 두 사람 사이의 드물게 조용한 순간 — 그리고 둘 다에게 어른의 삶이 얼마나 무거운지 갑자기 드러나는 창입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X12'
    },
    {
      phrase: 'Do that for another two hours, you might be where I am right about now.',
      partOfSpeech: 'expression',
      meaning: '"Right about now" means at this exact moment, right now. The full sentence means: if you keep reacting like that for two more hours, you will finally reach the level of shock and disbelief I\'ve already been at. It\'s a darkly funny way of acknowledging someone\'s reaction while implying they still don\'t fully grasp the situation.',
      meaning_ko: '"Right about now"는 바로 지금 이 순간을 뜻합니다. 전체 문장의 의미는: 지금처럼 계속 반응하면 두 시간 후쯤엔 내가 지금 있는 충격과 혼란의 상태에 도달할 거라는 것입니다. 상대방의 반응을 인정하면서도 아직 상황을 완전히 이해하지 못하고 있다는 것을 어둡고 유머러스하게 표현하는 방식입니다.',
      example: 'A: "Wait — you quit your job AND moved out the same day?!" B: "Do that for another hour, you might be where I was yesterday."',
      example_ko: 'A: "잠깐 — 같은 날에 직장도 그만두고 이사도 했다고?!" B: "그 반응 한 시간만 더 하면 내가 어제 있던 상태가 어떤 건지 알 거야."',
      context: 'Monica is stuttering and stammering in shock after Ross announces Carol\'s pregnancy. Ross responds with this line in perfect deadpan — he\'s been sitting with this news long enough that Monica\'s reaction almost looks mild to him.',
      context_ko: '로스가 캐롤의 임신을 알리자 모니카가 충격에 말을 더듬는 장면. 로스는 이미 이 소식을 충분히 소화한 터라 모니카의 반응이 오히려 약해 보일 지경에서 이 대사를 완벽한 무표정으로 던집니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X5'
    },
    {
      phrase: 'What\'s that supposed to mean?',
      partOfSpeech: 'expression',
      meaning: 'Used to challenge a remark that sounds harmless on the surface but feels like a hidden criticism or insult. The speaker is saying: "I know there\'s a dig in that comment, and I want you to admit it." It\'s more confrontational than "What do you mean?" — it implies you already know the real meaning and are calling the person out.',
      meaning_ko: '겉으로는 아무렇지 않게 들리지만 숨겨진 비판이나 비꼬임이 담긴 것 같은 말에 도전할 때 씁니다. 화자는 이렇게 말하는 겁니다: "그 말에 따끔한 의도가 담겨 있다는 거 알아, 인정해봐." "What do you mean?"보다 더 대결적입니다 — 이미 진짜 의미를 알고 상대를 몰아붙이는 느낌입니다.',
      example: 'A: "Well, at least you gave it your best shot." B: "What\'s that supposed to mean? Are you saying I failed?"',
      example_ko: 'A: "뭐, 적어도 최선을 다한 건 맞잖아." B: "그게 무슨 말이야? 내가 실패했다는 거야?"',
      context: 'Mrs. Geller says "at least she had the chance to leave a man at the altar" about Rachel — and Monica immediately fires back. Monica knows every one of her mother\'s comments has a second layer aimed at her.',
      context_ko: '젤러 부인이 레이철에 대해 "적어도 제단 앞에서 남자를 떠날 기회는 있었잖아"라고 말하자 모니카가 즉각 받아치는 장면. 모니카는 엄마의 모든 말에 자신을 향한 두 번째 의도가 담겨 있다는 것을 압니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X9'

    {
      phrase: 'Things change, roll with the punches.',
      partOfSpeech: 'expression',
      meaning: '"Roll with the punches" means to adapt flexibly to difficult or unexpected situations rather than resisting them. The metaphor comes from boxing: a skilled fighter moves with the force of a punch instead of absorbing it head-on, reducing the damage. In life, it means staying resilient and adjusting when things don\'t go your way.',
      meaning_ko: '"Roll with the punches"는 어렵거나 예상치 못한 상황에 저항하기보다 유연하게 적응하다는 뜻입니다. 비유는 복싱에서 왔습니다: 능숙한 선수는 주먹의 힘에 맞서 정면으로 맞지 않고 함께 움직여서 충격을 줄입니다. 삶에서는 일이 뜻대로 되지 않을 때 회복력을 유지하며 적응하다는 의미입니다.',
      example: 'A: "The whole schedule fell apart at the last minute." B: "I know, but what can you do? You just have to roll with the punches."',
      example_ko: 'A: "일정 전체가 마지막 순간에 틀어졌어." B: "알아, 근데 어쩌겠어? 그냥 유연하게 대처해야지."',
      context: 'Ross says this to Carol and Susan at the clinic during their argument about the baby\'s name — but the irony is unmissable. Ross himself is the person in the room least capable of rolling with the punches of his new reality.',
      context_ko: '로스가 클리닉에서 아기 이름을 두고 캐롤, 수잔과 논쟁하며 이 말을 하는 장면. 하지만 아이러니가 뚜렷합니다. 로스야말로 그 자리에서 자신의 새로운 현실에 가장 유연하게 대처하지 못하는 사람입니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X13'
    },
    {
      phrase: 'No matter what I do, I\'m still gonna be a father.',
      partOfSpeech: 'expression',
      meaning: '"No matter what I do" means regardless of any action I take or any choice I make — the result is the same either way. It expresses an unavoidable reality that cannot be changed by any decision. Used when acknowledging that a certain outcome is fixed and beyond one\'s control.',
      meaning_ko: '"No matter what I do"는 내가 어떤 행동을 하거나 어떤 선택을 해도 결과는 같다는 뜻입니다. 어떤 결정으로도 바꿀 수 없는 피할 수 없는 현실을 표현합니다. 특정 결과가 고정되어 있고 자신의 통제 밖에 있다는 것을 인정할 때 씁니다.',
      example: 'A: "Are you going to contest the ownership?" B: "I\'ve thought about it. But no matter what I do, the debt is still mine."',
      example_ko: 'A: "소유권에 이의를 제기할 거야?" B: "생각해봤어. 하지만 내가 어떻게 해도 빚은 내 거야."',
      context: 'Ross says this quietly after the laughter settles, and the mood in the room shifts completely. It is the emotional centre of the scene — not funny at all, just honest and a little terrifying.',
      context_ko: '웃음이 가라앉은 후 로스가 조용히 이 말을 하는 장면. 방 안의 분위기가 완전히 바뀝니다. 이 장면의 감정적 중심 — 전혀 웃기지 않고 그냥 솔직하고 약간 무섭습니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X7'
    },
    {
      phrase: 'I don\'t think I can be involved in this particular thing right now.',
      partOfSpeech: 'expression',
      meaning: '"This particular thing" is a deliberately vague, distancing phrase. Instead of naming the painful situation directly, the speaker steps back and refers to it as just "this thing." Used when someone needs to emotionally withdraw but cannot fully put their feelings into words. It is honest, but also reveals that the speaker is overwhelmed.',
      meaning_ko: '"This particular thing"은 의도적으로 모호하게 거리를 두는 표현입니다. 고통스러운 상황을 직접 이름 붙이는 대신 화자가 한 발 물러서며 그냥 "이것"이라고 표현합니다. 누군가가 감정적으로 빠져나와야 하지만 자신의 감정을 완전히 말로 표현할 수 없을 때 씁니다. 솔직하지만 동시에 화자가 압도당하고 있음을 드러냅니다.',
      example: 'A: "Are you coming to the baby shower?" B: "I don\'t think I can be involved in this particular thing right now. I\'m sorry."',
      example_ko: 'A: "베이비 샤워에 올 거야?" B: "지금은 이 일에 참여하기가 좀 힘들 것 같아. 미안해."',
      context: 'Ross says this at the clinic and turns to leave — but then the sound of the sonogram stops him cold. It is the emotional turning point of the entire episode, and this line makes his vulnerability completely visible.',
      context_ko: '로스가 클리닉에서 이 말을 하고 나가려는 순간 — 초음파 소리가 그를 그 자리에 멈추게 합니다. 에피소드 전체의 감정적 전환점이며, 이 대사는 로스의 취약함을 완전히 드러냅니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X14'
    },
    {
      phrase: 'I know it was a cheap shot, but I feel SO much better now.',
      partOfSpeech: 'expression',
      meaning: 'A "cheap shot" is an unfair, low, or mean remark — one that takes advantage of someone\'s weakness rather than making a fair point. Saying "I know it was a cheap shot" shows self-awareness: the speaker knows the comment was not noble. But "I feel so much better now" reveals they did it for emotional release, not to be fair.',
      meaning_ko: '"Cheap shot"은 정당한 주장이 아니라 상대방의 약점을 이용하는 불공정하고 비열한 발언입니다. "I know it was a cheap shot"이라고 하는 것은 자기 인식을 보여줍니다: 화자는 그 말이 고상하지 않다는 걸 압니다. 그러나 "I feel so much better now"는 공정하게 하려는 게 아니라 감정 해소를 위해 했다는 것을 드러냅니다.',
      example: 'A: "I know that was a cheap shot, but after everything he did, I feel SO much better now." B: "I\'m not going to judge you for that."',
      example_ko: 'A: "그게 비열한 말인 거 알아, 근데 그 사람이 한 것들 생각하면 진짜 속이 다 풀렸어." B: "뭐라 할 수 없네."',
      context: 'Rachel ends the episode by slamming down the phone after telling Mindy — who went on Rachel\'s honeymoon with Barry — that she hopes their future kids have "his old hairline and your old nose." She owns it completely.',
      context_ko: '레이철이 에피소드 마지막에 배리와 신혼여행을 간 민디에게 미래의 아이들이 "그의 예전 이마선과 네 예전 코를 닮길 바란다"고 말하고 전화를 끊는 장면. 레이철은 자신이 한 말을 완전히 인정합니다.',
      youtubeUrl: 'https://www.youtube.com/watch?v=REPLACE_S1E2X15'
    }
  ]
  };

  var S_NUM = 1;
  var E_NUM = 2;
  var TOTAL = 15;

  function goHome() { window.location.href = '../../index.html'; }

  function buildExpressions() {
    var isKo = getLang() === 'ko';
    var dataExprs = EP_DATA.expressions || [];
    var list = document.getElementById('exprList');
    var html = '';
    for (var i = 0; i < TOTAL; i++) {
      var x   = (i < dataExprs.length) ? dataExprs[i] : null;
      var num = i + 1;
      var bmId  = 'expr-s' + S_NUM + 'e' + E_NUM + 'x' + num;
      var bmUrl = 'friends/episodes/s' + S_NUM + 'e' + E_NUM + '.html#slot' + num;
      if (x) {
        var isLive = x.youtubeUrl && x.youtubeUrl.indexOf('REPLACE') === -1 && x.youtubeUrl.length > 25;
        var ytBtn = isLive
          ? '<a class="btn-youtube" href="' + x.youtubeUrl + '" target="_blank" rel="noopener">' + t('expr.watch') + '</a>'
          : '<button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        var pos = x.partOfSpeech
          ? '<span style="font-size:0.7rem;color:var(--accent3);font-weight:700;margin-left:8px;text-transform:uppercase;letter-spacing:1px">' + escHtml(x.partOfSpeech) + '</span>'
          : '';
        var meaning = (isKo && x.meaning_ko) ? x.meaning_ko : x.meaning;
        var example = (isKo && x.example_ko) ? x.example_ko : x.example;
        var context = (isKo && x.context_ko) ? x.context_ko : x.context;
        var exprNum = isKo
          ? ('표현 ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM)
          : ('Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM);
        html += '<div class="expr-card" id="slot' + num + '">';
        html += '<div class="expr-num">' + exprNum + '</div>';
        html += '<div class="expr-phrase">&ldquo;' + escHtml(x.phrase) + '&rdquo;' + pos + '</div>';
        html += '<div class="expr-meaning">' + escHtml(meaning) + '</div>';
        html += '<div class="expr-example">' + escHtml(example) + '</div>';
        if (context) html += '<div class="expr-context">&#128205; ' + escHtml(context) + '</div>';
        html += '<div class="expr-actions">' + ytBtn;
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      } else {
        html += '<div class="expr-card placeholder-slot" id="slot' + num + '">';
        html += '<div class="expr-num">Expression ' + num + ' &middot; S' + S_NUM + 'E' + E_NUM + '</div>';
        html += '<div class="expr-phrase" style="color:var(--muted)">&#128172; Expression ' + num + '</div>';
        html += '<div class="expr-meaning" style="color:var(--muted)">Add this expression to EP_DATA.expressions in the page source.</div>';
        html += '<div class="expr-actions"><button class="btn-youtube pending">' + t('expr.coming') + '</button>';
        html += '<button class="btn-bm" data-bm-id="' + bmId + '" onclick="handleExprBm(' + num + ')">' + t('bm.bookmark') + '</button>';
        html += '</div></div>';
      }
    }
    list.innerHTML = html;
  }

  function handleExprBm(num) {
    toggleBookmark('expression','expr-s'+S_NUM+'e'+E_NUM+'x'+num,'💬 S'+S_NUM+'E'+E_NUM+' Expr'+num,'friends/episodes/s'+S_NUM+'e'+E_NUM+'.html#slot'+num);
  }

  window.addEventListener('DOMContentLoaded', function() {
    checkTermsGuard();
    buildExpressions();
    if (window.location.hash) {
      setTimeout(function() {
        var el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    }
  });
</script>
</body>
</html>
